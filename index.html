<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <title>Quay video + Overlay text (Không record chữ) - MP4</title>
  <!-- Sử dụng ffmpeg.wasm nhẹ để chuyển webm sang mp4 -->
  <script src="https://cdn.jsdelivr.net/npm/@ffmpeg/ffmpeg@0.12.10/dist/ffmpeg.min.js"></script>
  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      font-family: system-ui, -apple-system, 'Segoe UI', Roboto, 'Helvetica Neue', sans-serif;
      background: #0b0e14;
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      padding: 16px;
      color: #eef2fb;
    }

    .app {
      max-width: 1400px;
      width: 100%;
      background: #151a22;
      border-radius: 32px;
      box-shadow: 0 25px 40px -8px rgba(0, 0, 0, 0.6);
      overflow: hidden;
      padding: 20px;
      border: 1px solid #2c3540;
    }

    h2 {
      font-weight: 500;
      letter-spacing: -0.01em;
      display: flex;
      align-items: center;
      gap: 8px;
      margin-bottom: 16px;
      color: #d0d9e8;
    }

    /* --- Video Container với tỉ lệ động --- */
    .video-wrapper {
      position: relative;
      width: 100%;
      border-radius: 24px;
      overflow: hidden;
      background: #0a0e14;
      box-shadow: inset 0 0 0 1px rgba(255, 255, 255, 0.05), 0 10px 25px -5px #00000080;
      margin-bottom: 16px;
      transition: aspect-ratio 0.2s;
    }

    #videoPreview {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
      background: #0a0c10;
    }

    /* Placeholder khi chưa có camera */
    .camera-placeholder {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      background: linear-gradient(135deg, #1a2330 0%, #0f151c 100%);
      color: #8ba0bc;
      pointer-events: none;
    }

    .camera-placeholder.hidden {
      display: none;
    }

    .camera-placeholder-icon {
      font-size: 64px;
      margin-bottom: 16px;
      opacity: 0.6;
    }

    /* Overlay layer — KHÔNG record */
    .overlay-layer {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      pointer-events: none;
    }

    .draggable-text {
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      pointer-events: auto;
      cursor: grab;
      user-select: none;
      background: transparent;
      display: inline-block;
      white-space: pre-wrap;
      word-break: break-word;
      max-width: 90%;
      text-shadow: 0 2px 8px rgba(0,0,0,0.7);
      transition: box-shadow 0.1s;
      border-radius: 8px;
      padding: 4px 8px;
    }

    .draggable-text:active {
      cursor: grabbing;
    }

    #overlayTextDisplay {
      font-weight: 700;
      line-height: 1.3;
      text-align: center;
      backdrop-filter: blur(0px);
      background-color: transparent;
      display: block;
    }

    /* Controls */
    .control-panel {
      display: flex;
      flex-wrap: wrap;
      gap: 12px 16px;
      align-items: center;
      margin-bottom: 20px;
      background: #1e252f;
      padding: 16px 18px;
      border-radius: 48px;
      backdrop-filter: blur(4px);
      border: 1px solid #353f4b;
    }

    .btn {
      background: #2b3643;
      border: none;
      color: white;
      padding: 10px 20px;
      border-radius: 40px;
      font-weight: 500;
      font-size: 1rem;
      cursor: pointer;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 6px;
      box-shadow: 0 4px 8px rgba(0,0,0,0.3);
      transition: all 0.15s;
      border: 1px solid #45515e;
      flex: 0 0 auto;
    }

    .btn-primary {
      background: #3b82f6;
      border-color: #8bb4fe;
      color: white;
      box-shadow: 0 6px 12px #1e3a8a40;
    }

    .btn-danger {
      background: #b91c1c;
      border-color: #f87171;
    }

    .btn-success {
      background: #10b981;
      border-color: #6ee7b7;
    }

    .btn-outline {
      background: transparent;
      border: 1px solid #5f6c7c;
      box-shadow: none;
    }

    .btn:disabled {
      opacity: 0.5;
      pointer-events: none;
      filter: grayscale(0.5);
    }

    .timer {
      margin-left: auto;
      font-family: 'JetBrains Mono', monospace;
      background: #0f151c;
      padding: 6px 18px;
      border-radius: 40px;
      border: 1px solid #3e4a58;
      color: #a5d8ff;
      font-weight: 600;
      letter-spacing: 1px;
    }

    /* Aspect ratio selector */
    .aspect-selector {
      display: flex;
      gap: 8px;
      background: #0f151c;
      padding: 6px;
      border-radius: 40px;
      border: 1px solid #3e4a58;
    }

    .aspect-btn {
      background: transparent;
      border: none;
      color: #9ab3d0;
      padding: 6px 14px;
      border-radius: 30px;
      font-weight: 500;
      cursor: pointer;
      transition: 0.15s;
      font-size: 0.9rem;
    }

    .aspect-btn.active {
      background: #3b82f6;
      color: white;
    }

    /* Text settings */
    .overlay-toolbar {
      display: flex;
      flex-wrap: wrap;
      align-items: center;
      gap: 16px 24px;
      background: #1a212a;
      padding: 14px 20px;
      border-radius: 30px;
      margin-bottom: 10px;
      border: 1px solid #2f3a46;
    }

    .text-input-area {
      flex: 2 1 260px;
      display: flex;
      gap: 8px;
      align-items: center;
    }

    #overlayInput {
      background: #0e141c;
      border: 1px solid #3c4a5a;
      color: white;
      padding: 10px 16px;
      border-radius: 40px;
      font-size: 1rem;
      width: 100%;
      outline: none;
      transition: 0.2s;
    }

    #overlayInput:focus {
      border-color: #3b82f6;
      box-shadow: 0 0 0 3px #1e3a8a60;
    }

    .slider-group {
      display: flex;
      align-items: center;
      gap: 12px;
      flex-wrap: wrap;
    }

    .slider-label {
      display: flex;
      align-items: center;
      gap: 8px;
      color: #b9c7dc;
    }

    input[type="range"] {
      width: 120px;
      background: #2d3845;
      height: 5px;
      border-radius: 10px;
      accent-color: #3b82f6;
    }

    input[type="color"] {
      width: 42px;
      height: 42px;
      border: 2px solid #495a6e;
      border-radius: 30px;
      background: transparent;
      cursor: pointer;
      padding: 2px;
    }

    /* Filename input */
    .filename-section {
      display: flex;
      align-items: center;
      gap: 12px;
      margin-top: 10px;
    }

    #filenameInput {
      background: #0e141c;
      border: 1px solid #3c4a5a;
      color: white;
      padding: 10px 16px;
      border-radius: 40px;
      font-size: 0.95rem;
      flex: 1;
      outline: none;
    }

    .toggle-overlay {
      margin-left: auto;
    }

    .footer-note {
      display: flex;
      justify-content: space-between;
      color: #8899b0;
      font-size: 0.85rem;
      margin-top: 6px;
    }

    /* Progress bar cho chuyển đổi MP4 */
    .conversion-progress {
      margin-top: 10px;
      height: 4px;
      background: #2a3645;
      border-radius: 4px;
      overflow: hidden;
      display: none;
    }

    .progress-bar {
      height: 100%;
      background: #3b82f6;
      width: 0%;
      transition: width 0.3s;
    }

    /* Status indicator */
    .camera-status {
      display: flex;
      align-items: center;
      gap: 8px;
      margin-left: 12px;
    }

    .status-dot {
      width: 10px;
      height: 10px;
      border-radius: 50%;
      background: #ef4444;
    }

    .status-dot.active {
      background: #10b981;
      animation: pulse 1.5s infinite;
    }

    @keyframes pulse {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.5; }
    }

    /* Mobile */
    @media (max-width: 640px) {
      body { padding: 8px; }
      .app { padding: 14px; border-radius: 24px; }
      .control-panel { border-radius: 30px; padding: 14px; }
      .btn { padding: 10px 16px; font-size: 0.9rem; }
      .timer { padding: 6px 12px; }
      .overlay-toolbar { flex-direction: column; align-items: stretch; }
      .toggle-overlay { margin-left: 0; }
      .aspect-selector { flex-wrap: wrap; }
    }

    .badge {
      background: #2e3b4b;
      padding: 2px 8px;
      border-radius: 20px;
      font-size: 0.8rem;
      color: #bdd3ff;
    }

    .hidden-overlay .draggable-text {
      display: none !important;
    }
  </style>
</head>
<body>
<div class="app">
  <h2>
    <span>🎬 Video Booth Pro</span>
    <span class="badge">MP4 + Tỉ lệ tùy chọn</span>
    <div class="camera-status">
      <span class="status-dot" id="cameraStatusDot"></span>
      <span style="font-size: 0.85rem; color: #9ab3d0;" id="cameraStatusText">Chưa kết nối</span>
    </div>
  </h2>

  <!-- Video preview area -->
  <div class="video-wrapper" id="videoWrapper" style="aspect-ratio: 16/9">
    <video id="videoPreview" autoplay playsinline muted></video>
    
    <!-- Placeholder khi chưa có camera -->
    <div class="camera-placeholder" id="cameraPlaceholder">
      <div class="camera-placeholder-icon">📷</div>
      <div style="font-size: 1.2rem; margin-bottom: 8px;">Camera chưa được kích hoạt</div>
      <div style="font-size: 0.9rem;">Nhấn "Bắt đầu quay" để cấp quyền camera</div>
    </div>

    <!-- Overlay text layer -->
    <div class="overlay-layer" id="overlayLayer">
      <div class="draggable-text" id="draggableTextContainer">
        <div id="overlayTextDisplay">✨ Nhập text</div>
      </div>
    </div>
  </div>

  <!-- Aspect ratio selector -->
  <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 16px;">
    <div class="aspect-selector">
      <button class="aspect-btn active" data-aspect="16/9">📺 16:9</button>
      <button class="aspect-btn" data-aspect="9/16">📱 9:16</button>
      <button class="aspect-btn" data-aspect="1/1">⬛ 1:1</button>
      <button class="aspect-btn" data-aspect="3/4">📐 3:4</button>
      <button class="aspect-btn" data-aspect="full">🖥️ Full</button>
    </div>
  </div>

  <!-- Recording controls -->
  <div class="control-panel">
    <button class="btn btn-primary" id="startBtn">⏺ Bắt đầu quay</button>
    <button class="btn btn-danger" id="stopBtn" disabled>⏹ Dừng quay</button>
    <button class="btn btn-success" id="downloadBtn" disabled>⬇ Tải MP4</button>
    <div class="timer" id="timerDisplay">00:00</div>
  </div>

  <!-- Filename input -->
  <div class="filename-section">
    <label style="color: #b9c7dc;">📝 Tên file:</label>
    <input type="text" id="filenameInput" placeholder="video_cua_toi" value="video_overlay">
    <span style="color: #6b7f94;">.mp4</span>
  </div>

  <!-- Conversion progress -->
  <div class="conversion-progress" id="conversionProgress">
    <div class="progress-bar" id="progressBar"></div>
  </div>

  <!-- Overlay customization -->
  <div class="overlay-toolbar">
    <div class="text-input-area">
      <input type="text" id="overlayInput" placeholder="Nhập text hiển thị..." value="Hello 🎥" maxlength="60">
    </div>
    <div class="slider-group">
      <div class="slider-label">
        <span>🔤 Size</span>
        <input type="range" id="fontSizeSlider" min="16" max="120" value="48" step="1">
        <span id="fontSizeValue">48px</span>
      </div>
      <div class="slider-label">
        <span>🎨</span>
        <input type="color" id="colorPicker" value="#ffffff">
      </div>
    </div>
    <button class="btn btn-outline toggle-overlay" id="toggleOverlayBtn">👁 Ẩn overlay</button>
  </div>
  <div class="footer-note">
    <span>🖱️ Kéo thả text • Tỉ lệ khung • MP4 sạch không chữ</span>
    <span>⚡ Nhấn Start để bật camera</span>
  </div>
</div>

<script>
  (function(){
    "use strict";

    // --- Khởi tạo FFmpeg ---
    const { createFFmpeg, fetchFile } = FFmpeg;
    const ffmpeg = createFFmpeg({ 
      log: false,
      progress: ({ ratio }) => {
        const progressBar = document.getElementById('progressBar');
        progressBar.style.width = (ratio * 100) + '%';
      }
    });

    // --- DOM elements ---
    const videoPreview = document.getElementById('videoPreview');
    const videoWrapper = document.getElementById('videoWrapper');
    const cameraPlaceholder = document.getElementById('cameraPlaceholder');
    const cameraStatusDot = document.getElementById('cameraStatusDot');
    const cameraStatusText = document.getElementById('cameraStatusText');
    const startBtn = document.getElementById('startBtn');
    const stopBtn = document.getElementById('stopBtn');
    const downloadBtn = document.getElementById('downloadBtn');
    const timerDisplay = document.getElementById('timerDisplay');
    const filenameInput = document.getElementById('filenameInput');
    const conversionProgress = document.getElementById('conversionProgress');

    // Overlay elements
    const draggableContainer = document.getElementById('draggableTextContainer');
    const overlayTextDisplay = document.getElementById('overlayTextDisplay');
    const overlayInput = document.getElementById('overlayInput');
    const fontSizeSlider = document.getElementById('fontSizeSlider');
    const fontSizeValue = document.getElementById('fontSizeValue');
    const colorPicker = document.getElementById('colorPicker');
    const toggleOverlayBtn = document.getElementById('toggleOverlayBtn');

    // Aspect ratio buttons
    const aspectBtns = document.querySelectorAll('.aspect-btn');

    // --- State ---
    let mediaStream = null;
    let mediaRecorder = null;
    let recordedChunks = [];
    let recordingStartTime = null;
    let timerInterval = null;
    let isRecording = false;
    let overlayVisible = true;
    let isDragging = false;
    let dragOffsetX = 0, dragOffsetY = 0;
    let currentAspectRatio = '16/9';
    let webmBlob = null;
    let ffmpegLoaded = false;
    let cameraActive = false;

    // --- Helper functions ---
    function updateCameraStatus(active) {
      cameraActive = active;
      if (active) {
        cameraStatusDot.classList.add('active');
        cameraStatusText.textContent = 'Camera đang hoạt động';
        cameraPlaceholder.classList.add('hidden');
      } else {
        cameraStatusDot.classList.remove('active');
        cameraStatusText.textContent = 'Chưa kết nối';
        cameraPlaceholder.classList.remove('hidden');
      }
    }

    // --- Khởi tạo FFmpeg ---
    async function loadFFmpeg() {
      if (!ffmpegLoaded) {
        conversionProgress.style.display = 'block';
        await ffmpeg.load();
        ffmpegLoaded = true;
        conversionProgress.style.display = 'none';
      }
    }

    // --- Helper: format time ---
    function formatTime(seconds) {
      const mins = Math.floor(seconds / 60);
      const secs = Math.floor(seconds % 60);
      return `${mins.toString().padStart(2, '0')}:${secs.toString().padStart(2, '0')}`;
    }

    function updateTimer() {
      if (!recordingStartTime) return;
      const elapsed = (Date.now() - recordingStartTime) / 1000;
      timerDisplay.textContent = formatTime(elapsed);
    }

    function startTimer() {
      recordingStartTime = Date.now();
      updateTimer();
      timerInterval = setInterval(updateTimer, 200);
    }

    function stopTimer() {
      if (timerInterval) clearInterval(timerInterval);
      recordingStartTime = null;
      timerDisplay.textContent = '00:00';
    }

    // --- Camera access - CHỈ GỌI KHI NHẤN START ---
    async function requestCamera() {
      try {
        // Dừng track cũ nếu có
        if (mediaStream) {
          mediaStream.getTracks().forEach(t => t.stop());
        }

        let constraints = { 
          audio: true, 
          video: {} 
        };
        
        // Áp dụng tỉ lệ cho camera
        if (currentAspectRatio !== 'full') {
          const [w, h] = currentAspectRatio.split('/').map(Number);
          constraints.video = {
            width: { ideal: 1280 },
            height: { ideal: 720 },
            aspectRatio: { ideal: w / h }
          };
        } else {
          constraints.video = {
            width: { ideal: 1920 },
            height: { ideal: 1080 }
          };
        }

        mediaStream = await navigator.mediaDevices.getUserMedia(constraints);
        videoPreview.srcObject = mediaStream;
        await videoPreview.play();
        
        updateCameraStatus(true);
        return true;
      } catch (err) {
        console.error('Lỗi camera:', err);
        let errorMessage = 'Không thể truy cập camera/microphone.';
        if (err.name === 'NotAllowedError') {
          errorMessage = 'Bạn đã từ chối quyền truy cập camera/microphone. Vui lòng cấp quyền trong trình duyệt.';
        } else if (err.name === 'NotFoundError') {
          errorMessage = 'Không tìm thấy camera/microphone trên thiết bị.';
        }
        alert(errorMessage);
        updateCameraStatus(false);
        return false;
      }
    }

    // --- Thay đổi tỉ lệ khung ---
    function setAspectRatio(ratio) {
      currentAspectRatio = ratio;
      
      // Cập nhật active button
      aspectBtns.forEach(btn => {
        btn.classList.remove('active');
        if (btn.dataset.aspect === ratio) {
          btn.classList.add('active');
        }
      });

      // Cập nhật CSS aspect-ratio
      if (ratio === 'full') {
        videoWrapper.style.aspectRatio = 'auto';
        videoWrapper.style.height = '500px';
      } else {
        videoWrapper.style.height = 'auto';
        const [w, h] = ratio.split('/').map(Number);
        videoWrapper.style.aspectRatio = `${w}/${h}`;
      }

      // Nếu camera đang active, cập nhật lại stream với tỉ lệ mới
      if (cameraActive) {
        requestCamera();
      }
    }

    // --- Bắt đầu quay (bao gồm request camera nếu chưa có) ---
    async function handleStartRecording() {
      // Nếu chưa có camera, request trước
      if (!cameraActive) {
        startBtn.textContent = '📷 Đang kết nối...';
        startBtn.disabled = true;
        
        const success = await requestCamera();
        
        startBtn.textContent = '⏺ Bắt đầu quay';
        startBtn.disabled = false;
        
        if (!success) {
          return; // Không thành công thì dừng
        }
      }

      // Bắt đầu quay
      if (!mediaStream) {
        alert('Không có luồng camera để quay');
        return;
      }

      recordedChunks = [];
      try {
        const options = { mimeType: 'video/webm;codecs=vp8,opus' };
        if (!MediaRecorder.isTypeSupported(options.mimeType)) {
          options.mimeType = 'video/webm';
        }
        mediaRecorder = new MediaRecorder(mediaStream, options);
      } catch (e) {
        mediaRecorder = new MediaRecorder(mediaStream);
      }

      mediaRecorder.ondataavailable = (event) => {
        if (event.data && event.data.size > 0) {
          recordedChunks.push(event.data);
        }
      };

      mediaRecorder.onstop = async () => {
        webmBlob = new Blob(recordedChunks, { type: 'video/webm' });
        downloadBtn.disabled = false;
        isRecording = false;
        startBtn.disabled = false;
        stopBtn.disabled = true;
        stopTimer();
      };

      mediaRecorder.start();
      isRecording = true;
      startBtn.disabled = true;
      stopBtn.disabled = false;
      downloadBtn.disabled = true;
      startTimer();
    }

    function stopRecording() {
      if (mediaRecorder && mediaRecorder.state !== 'inactive') {
        mediaRecorder.stop();
      }
    }

    // --- Chuyển đổi WebM sang MP4 và tải xuống ---
    async function downloadAsMP4() {
      if (!webmBlob) {
        alert('Chưa có video để tải');
        return;
      }

      const filename = filenameInput.value.trim() || 'video';
      const finalFilename = `${filename}.mp4`;

      try {
        downloadBtn.disabled = true;
        downloadBtn.textContent = '⏳ Đang chuyển MP4...';
        conversionProgress.style.display = 'block';
        document.getElementById('progressBar').style.width = '0%';

        await loadFFmpeg();

        ffmpeg.FS('writeFile', 'input.webm', await fetchFile(webmBlob));

        await ffmpeg.run(
          '-i', 'input.webm',
          '-c:v', 'libx264',
          '-preset', 'fast',
          '-crf', '23',
          '-c:a', 'aac',
          '-b:a', '128k',
          '-movflags', '+faststart',
          'output.mp4'
        );

        const data = ffmpeg.FS('readFile', 'output.mp4');
        const mp4Blob = new Blob([data.buffer], { type: 'video/mp4' });

        const url = URL.createObjectURL(mp4Blob);
        const a = document.createElement('a');
        a.href = url;
        a.download = finalFilename;
        a.click();
        URL.revokeObjectURL(url);

        ffmpeg.FS('unlink', 'input.webm');
        ffmpeg.FS('unlink', 'output.mp4');

      } catch (error) {
        console.error('Lỗi chuyển đổi:', error);
        alert('Lỗi khi chuyển đổi MP4. Đang tải WebM thay thế...');
        
        const url = URL.createObjectURL(webmBlob);
        const a = document.createElement('a');
        a.href = url;
        a.download = `${filename}.webm`;
        a.click();
        URL.revokeObjectURL(url);
      } finally {
        downloadBtn.disabled = false;
        downloadBtn.textContent = '⬇ Tải MP4';
        conversionProgress.style.display = 'none';
      }
    }

    // --- Overlay text sync ---
    function updateOverlayStyle() {
      overlayTextDisplay.textContent = overlayInput.value || ' ';
      overlayTextDisplay.style.fontSize = fontSizeSlider.value + 'px';
      overlayTextDisplay.style.color = colorPicker.value;
      fontSizeValue.textContent = fontSizeSlider.value + 'px';
      draggableContainer.style.opacity = '0.92';
    }

    // --- Drag & Drop ---
    const STORAGE_KEY = 'videoOverlay_position_v2';
    
    function setInitialPositionFromStorage() {
      const saved = localStorage.getItem(STORAGE_KEY);
      if (saved) {
        try {
          const { left, top } = JSON.parse(saved);
          draggableContainer.style.left = left + 'px';
          draggableContainer.style.top = top + 'px';
          draggableContainer.style.transform = 'none';
        } catch (e) {}
      }
    }

    function savePositionToStorage() {
      const left = parseFloat(draggableContainer.style.left) || 0;
      const top = parseFloat(draggableContainer.style.top) || 0;
      localStorage.setItem(STORAGE_KEY, JSON.stringify({ left, top }));
    }

    function onDragStart(e) {
      e.preventDefault();
      const clientX = e.touches ? e.touches[0].clientX : e.clientX;
      const clientY = e.touches ? e.touches[0].clientY : e.clientY;

      const rect = draggableContainer.getBoundingClientRect();
      const wrapperRect = videoWrapper.getBoundingClientRect();

      dragOffsetX = clientX - rect.left;
      dragOffsetY = clientY - rect.top;

      const currentLeft = rect.left - wrapperRect.left;
      const currentTop = rect.top - wrapperRect.top;

      draggableContainer.style.left = currentLeft + 'px';
      draggableContainer.style.top = currentTop + 'px';
      draggableContainer.style.transform = 'none';

      isDragging = true;
      draggableContainer.style.cursor = 'grabbing';

      window.addEventListener('mousemove', onDragMove);
      window.addEventListener('touchmove', onDragMove, { passive: false });
      window.addEventListener('mouseup', onDragEnd);
      window.addEventListener('touchend', onDragEnd);
    }

    function onDragMove(e) {
      if (!isDragging) return;
      e.preventDefault();
      const clientX = e.touches ? e.touches[0].clientX : e.clientX;
      const clientY = e.touches ? e.touches[0].clientY : e.clientY;

      const wrapperRect = videoWrapper.getBoundingClientRect();
      let newLeft = clientX - dragOffsetX - wrapperRect.left;
      let newTop = clientY - dragOffsetY - wrapperRect.top;

      const elemRect = draggableContainer.getBoundingClientRect();
      const maxLeft = wrapperRect.width - elemRect.width;
      const maxTop = wrapperRect.height - elemRect.height;

      newLeft = Math.max(0, Math.min(newLeft, maxLeft));
      newTop = Math.max(0, Math.min(newTop, maxTop));

      draggableContainer.style.left = newLeft + 'px';
      draggableContainer.style.top = newTop + 'px';
    }

    function onDragEnd() {
      if (isDragging) {
        isDragging = false;
        draggableContainer.style.cursor = 'grab';
        savePositionToStorage();

        window.removeEventListener('mousemove', onDragMove);
        window.removeEventListener('touchmove', onDragMove);
        window.removeEventListener('mouseup', onDragEnd);
        window.removeEventListener('touchend', onDragEnd);
      }
    }

    function toggleOverlay() {
      overlayVisible = !overlayVisible;
      if (overlayVisible) {
        videoWrapper.classList.remove('hidden-overlay');
        toggleOverlayBtn.innerHTML = '👁 Ẩn overlay';
      } else {
        videoWrapper.classList.add('hidden-overlay');
        toggleOverlayBtn.innerHTML = '👁‍🗨 Hiện overlay';
      }
    }

    // --- Dọn dẹp khi rời trang ---
    function cleanup() {
      if (mediaStream) {
        mediaStream.getTracks().forEach(track => track.stop());
      }
      if (timerInterval) {
        clearInterval(timerInterval);
      }
    }

    // --- Khởi tạo ---
    function init() {
      // Không tự động request camera nữa
      updateCameraStatus(false);
      
      updateOverlayStyle();
      setInitialPositionFromStorage();

      // Event listeners
      startBtn.addEventListener('click', handleStartRecording);
      stopBtn.addEventListener('click', stopRecording);
      downloadBtn.addEventListener('click', downloadAsMP4);

      overlayInput.addEventListener('input', updateOverlayStyle);
      fontSizeSlider.addEventListener('input', updateOverlayStyle);
      colorPicker.addEventListener('input', updateOverlayStyle);
      toggleOverlayBtn.addEventListener('click', toggleOverlay);

      // Aspect ratio
      aspectBtns.forEach(btn => {
        btn.addEventListener('click', () => {
          setAspectRatio(btn.dataset.aspect);
        });
      });

      // Drag events
      draggableContainer.addEventListener('mousedown', onDragStart);
      draggableContainer.addEventListener('touchstart', onDragStart, { passive: false });
      draggableContainer.addEventListener('dragstart', (e) => e.preventDefault());

      // Cleanup khi rời trang
      window.addEventListener('beforeunload', cleanup);
    }

    init();
  })();
</script>
</body>
</html>
