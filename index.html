<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <title>DevCam Pro • Máy Quay Video</title>
  <style>
    :root {
      --bg: #0a0a0f;
      --bg2: #111118;
      --bg3: #1a1a25;
      --text: #e0e0e0;
      --text2: #a0a0b8;
      --accent: #00d4ff;
      --accent2: #a855f7;
      --accent3: #ff2d55;
      --glass: rgba(20, 20, 35, 0.7);
      --glass2: rgba(30, 30, 50, 0.6);
      --border: rgba(255, 255, 255, 0.08);
      --glow: 0 0 20px rgba(0,212,255,0.3), 0 0 60px rgba(0,212,255,0.1);
      --glow-purple: 0 0 20px rgba(168,85,247,0.3), 0 0 40px rgba(168,85,247,0.1);
      --glow-red: 0 0 15px rgba(255,45,85,0.5), 0 0 30px rgba(255,45,85,0.2);
      --radius: 14px;
      --radius-sm: 10px;
      --transition: 0.3s cubic-bezier(0.4, 0, 0.2, 1);
      --font: 'SF Mono', 'Fira Code', 'Cascadia Code', 'Consolas', monospace;
      --shadow: 0 8px 32px rgba(0,0,0,0.4);
    }
    :root.light {
      --bg: #f0f2f5;
      --bg2: #ffffff;
      --bg3: #e8eaef;
      --text: #1a1a2e;
      --text2: #555570;
      --accent: #0066cc;
      --accent2: #7c3aed;
      --accent3: #e11d48;
      --glass: rgba(255,255,255,0.75);
      --glass2: rgba(255,255,255,0.6);
      --border: rgba(0,0,0,0.1);
      --glow: 0 0 20px rgba(0,102,204,0.2), 0 0 50px rgba(0,102,204,0.08);
      --glow-purple: 0 0 20px rgba(124,58,237,0.2), 0 0 40px rgba(124,58,237,0.08);
      --glow-red: 0 0 15px rgba(225,29,72,0.4), 0 0 30px rgba(225,29,72,0.15);
      --shadow: 0 8px 32px rgba(0,0,0,0.1);
    }
    * { margin:0; padding:0; box-sizing:border-box; }
    body {
      font-family: var(--font);
      background: var(--bg);
      color: var(--text);
      height: 100vh; overflow: hidden;
      transition: background var(--transition), color var(--transition);
      user-select: none; -webkit-user-select: none; touch-action: manipulation;
    }
    ::-webkit-scrollbar { width:5px; height:5px; }
    ::-webkit-scrollbar-track { background:transparent; }
    ::-webkit-scrollbar-thumb { background:var(--accent); border-radius:10px; }

    #loadingScreen {
      position:fixed; inset:0; z-index:10000; background:var(--bg);
      display:flex; flex-direction:column; align-items:center; justify-content:center;
      transition: opacity 0.5s, visibility 0.5s;
    }
    #loadingScreen.hidden { opacity:0; visibility:hidden; pointer-events:none; }
    .loader-ring { width:60px; height:60px; border:3px solid var(--border); border-top-color:var(--accent); border-radius:50%; animation:spin 0.8s linear infinite; }
    .loader-text { margin-top:16px; font-size:13px; letter-spacing:3px; color:var(--accent); text-transform:uppercase; animation:pulse-text 1.5s infinite; }
    @keyframes spin { to{transform:rotate(360deg);} }
    @keyframes pulse-text { 0%,100%{opacity:0.5;} 50%{opacity:1;} }

    #app { display:flex; flex-direction:column; height:100vh; }
    #header {
      display:flex; align-items:center; justify-content:space-between; padding:8px 16px;
      background:var(--glass); backdrop-filter:blur(20px); -webkit-backdrop-filter:blur(20px);
      border-bottom:1px solid var(--border); z-index:100; gap:8px; flex-shrink:0; flex-wrap:wrap;
    }
    .logo { font-size:18px; font-weight:700; letter-spacing:1px; background:linear-gradient(135deg,var(--accent),var(--accent2)); -webkit-background-clip:text; -webkit-text-fill-color:transparent; background-clip:text; }
    .status-dot { width:8px; height:8px; border-radius:50%; background:#22c55e; box-shadow:0 0 8px #22c55e; animation:status-pulse 2s infinite; flex-shrink:0; }
    .status-dot.recording { background:#ff2d55; box-shadow:0 0 14px #ff2d55; animation:blink-red 0.6s infinite; }
    .status-dot.paused { background:#f59e0b; box-shadow:0 0 8px #f59e0b; animation:blink-yellow 1s infinite; }
    @keyframes status-pulse { 0%,100%{box-shadow:0 0 6px #22c55e;} 50%{box-shadow:0 0 16px #22c55e, 0 0 28px rgba(34,197,94,0.5);} }
    @keyframes blink-red { 0%,100%{opacity:1;} 50%{opacity:0.3;} }
    @keyframes blink-yellow { 0%,100%{opacity:1;} 50%{opacity:0.5;} }

    .btn {
      padding:8px 14px; border-radius:25px; border:1px solid var(--border); background:var(--glass2);
      color:var(--text); cursor:pointer; font-family:var(--font); font-size:11px; letter-spacing:0.5px;
      transition:all var(--transition); backdrop-filter:blur(10px); -webkit-backdrop-filter:blur(10px);
      display:inline-flex; align-items:center; gap:5px; white-space:nowrap;
    }
    .btn:active { transform:scale(0.96); }
    .btn.accent { background:rgba(0,212,255,0.15); border-color:var(--accent); color:var(--accent); }
    .btn.accent:hover { box-shadow:var(--glow); }
    .btn.danger { background:rgba(255,45,85,0.15); border-color:var(--accent3); color:var(--accent3); }
    .btn.purple { background:rgba(168,85,247,0.12); border-color:var(--accent2); color:var(--accent2); }
    .btn-icon { width:36px; height:36px; border-radius:50%; padding:0; justify-content:center; }

    #mainContent { display:flex; flex:1; overflow:hidden; }
    #sidebar {
      width:290px; background:var(--glass); backdrop-filter:blur(20px); -webkit-backdrop-filter:blur(20px);
      border-right:1px solid var(--border); padding:12px; display:flex; flex-direction:column; gap:10px;
      overflow-y:auto; flex-shrink:0; z-index:50; transition:transform 0.3s;
    }
    #sidebar h3 { font-size:10px; text-transform:uppercase; letter-spacing:2px; color:var(--text2); }

    .text-card {
      background:var(--glass2); border:1px solid var(--border); border-radius:var(--radius-sm);
      padding:10px; display:flex; flex-direction:column; gap:6px;
    }
    .text-card.active { border-color:var(--accent); box-shadow:var(--glow); }
    .text-card textarea {
      background:var(--bg3); border:1px solid var(--border); border-radius:10px; color:var(--text);
      padding:8px; font-family:var(--font); font-size:12px; resize:vertical; min-height:60px;
      outline:none; transition:0.2s;
    }
    .text-card textarea:focus { border-color:var(--accent); }
    .row { display:flex; gap:5px; align-items:center; flex-wrap:wrap; }
    .text-card input[type="color"] { width:30px; height:30px; border-radius:50%; border:2px solid var(--border); padding:0; background:transparent; cursor:pointer; }
    .text-card input[type="range"] { flex:1; accent-color:var(--accent); height:4px; }
    .btn-xs { padding:3px 8px; font-size:10px; border-radius:12px; }

    #cameraArea { flex:1; display:flex; align-items:center; justify-content:center; background:#000; position:relative; }
    #previewWrapper { width:100%; max-width:100%; height:100%; display:flex; align-items:center; justify-content:center; }
    #previewContainer {
      position:relative; width:100%; max-width:900px; background:#000; overflow:hidden;
      box-shadow:var(--shadow), var(--glow); transition: aspect-ratio 0.3s, max-width 0.3s;
    }
    #previewContainer video { width:100%; height:100%; object-fit:cover; display:block; }
    #overlayCanvas { position:absolute; top:0; left:0; width:100%; height:100%; z-index:10; pointer-events:auto; }

    #recIndicator { position:absolute; top:10px; right:14px; display:flex; align-items:center; gap:6px; z-index:20; pointer-events:none; }
    #recIndicator.hidden { display:none; }
    .rec-dot { width:10px; height:10px; border-radius:50%; background:#ff2d55; box-shadow:0 0 12px #ff2d55; animation:blink-red 0.6s infinite; }
    .rec-time { font-size:13px; font-weight:600; color:#fff; letter-spacing:1px; text-shadow:0 0 8px red; }

    #dashboard { display:flex; gap:8px; padding:8px 16px; background:var(--glass); backdrop-filter:blur(16px); -webkit-backdrop-filter:blur(16px); border-top:1px solid var(--border); flex-wrap:wrap; justify-content:center; }
    .dash-card { background:var(--glass2); border:1px solid var(--border); border-radius:10px; padding:6px 12px; text-align:center; min-width:60px; }
    .dash-value { font-size:16px; font-weight:700; color:var(--accent); }
    .dash-label { font-size:8px; text-transform:uppercase; color:var(--text2); }

    #controlBar { display:flex; gap:8px; padding:10px 16px; flex-wrap:wrap; justify-content:center; background:var(--glass); backdrop-filter:blur(16px); border-top:1px solid var(--border); }
    #aspectBar { display:flex; gap:5px; justify-content:center; padding:5px; flex-wrap:wrap; }
    .aspect-btn { padding:4px 10px; font-size:10px; border-radius:15px; background:var(--glass2); border:1px solid var(--border); color:var(--text2); cursor:pointer; }
    .aspect-btn.active { border-color:var(--accent); color:var(--accent); background:rgba(0,212,255,0.1); }

    .modal-overlay { position:fixed; inset:0; z-index:500; background:rgba(0,0,0,0.8); backdrop-filter:blur(8px); display:flex; align-items:center; justify-content:center; }
    .modal-overlay.hidden { display:none; }
    .modal { background:var(--bg2); border:1px solid var(--border); border-radius:var(--radius); padding:20px; width:90%; max-width:700px; max-height:90vh; overflow-y:auto; }

    #fakeConsole { position:fixed; bottom:70px; right:16px; z-index:200; width:260px; max-height:160px; background:rgba(0,0,0,0.9); border:1px solid #0f0; border-radius:10px; padding:8px; font-size:10px; color:#0f0; overflow-y:auto; }
    #fakeConsole.hidden { display:none; }
    @media (max-width:768px) {
      #sidebar { position:fixed; left:0; top:0; bottom:0; transform:translateX(-100%); width:270px; z-index:300; }
      #sidebar.open { transform:translateX(0); }
      #sidebarToggle { display:inline-flex!important; }
      #previewContainer { max-width:100%; }
      .btn { padding:6px 10px; font-size:10px; }
      #fakeConsole { width:200px; bottom:60px; }
    }
    @media (min-width:769px) { #sidebarToggle { display:none!important; } }
  </style>
</head>
<body>
<div id="loadingScreen"><div class="loader-ring"></div><div class="loader-text">Đang khởi động DevCam Pro...</div></div>
<div id="toastContainer" style="position:fixed;top:16px;right:16px;z-index:1000;display:flex;flex-direction:column;gap:6px;"></div>

<div id="app">
  <header id="header">
    <div style="display:flex;align-items:center;gap:10px;">
      <button class="btn btn-icon" id="sidebarToggle" title="Menu">☰</button>
      <span class="logo">⚡ DevCam Pro</span>
      <span class="status-dot" id="statusDot" title="Trạng thái camera"></span>
    </div>
    <div style="display:flex;gap:6px;align-items:center;">
      <button class="btn btn-icon" id="btnMirror" title="Lật gương (mirror)">🪞</button>
      <button class="btn btn-icon" id="btnFullscreen" title="Toàn màn hình">⛶</button>
      <button class="btn" id="btnTheme"><span id="themeIcon">🌙</span> Giao diện</button>
      <button class="btn btn-icon" id="btnConsoleToggle" title="Bảng điều khiển nhà phát triển">⌨</button>
    </div>
  </header>

  <div id="mainContent">
    <aside id="sidebar">
      <h3>📝 Văn bản hiển thị</h3>
      <button class="btn accent" id="btnAddText" style="width:100%;">+ Thêm văn bản</button>
      <div id="textListContainer" style="display:flex;flex-direction:column;gap:8px;"></div>
      <div style="margin-top:auto;display:flex;gap:6px;">
        <button class="btn" id="btnSaveConfig" style="flex:1;">💾 Lưu cấu hình</button>
        <button class="btn danger" id="btnResetText" style="flex:1;">🔄 Xóa tất cả</button>
      </div>
    </aside>

    <div id="cameraArea">
      <div id="previewWrapper">
        <div id="previewContainer">
          <video id="videoPreview" autoplay playsinline muted></video>
          <canvas id="overlayCanvas"></canvas>
          <div id="recIndicator" class="hidden"><span class="rec-dot"></span><span class="rec-time" id="recTimeDisplay">00:00</span></div>
        </div>
      </div>
    </div>
  </div>

  <div id="aspectBar">
    <span style="color:var(--text2);font-size:10px;margin-right:4px;">Khung hình:</span>
    <button class="aspect-btn active" data-ratio="auto">Tự động</button>
    <button class="aspect-btn" data-ratio="1/1">1:1</button>
    <button class="aspect-btn" data-ratio="3/4">3:4</button>
    <button class="aspect-btn" data-ratio="19/6">19:6</button>
    <button class="aspect-btn" data-ratio="9/16">9:16</button>
    <button class="aspect-btn" data-ratio="16/9">16:9</button>
  </div>

  <div id="dashboard">
    <div class="dash-card"><div class="dash-value" id="dashTime">00:00</div><div class="dash-label">Thời gian</div></div>
    <div class="dash-card"><div class="dash-value" id="dashFPS">--</div><div class="dash-label">FPS</div></div>
    <div class="dash-card"><div class="dash-value" id="dashSize">0 MB</div><div class="dash-label">Dung lượng</div></div>
    <div class="dash-card"><div class="dash-value" id="dashStatus">Sẵn sàng</div><div class="dash-label">Trạng thái</div></div>
    <div class="dash-card"><div class="dash-value" id="dashCamLabel">Trước</div><div class="dash-label">Camera</div></div>
  </div>

  <div id="controlBar">
    <button class="btn accent" id="btnStart">⏺ Quay</button>
    <button class="btn" id="btnPause" disabled>⏸ Tạm dừng</button>
    <button class="btn" id="btnResume" disabled>▶ Tiếp tục</button>
    <button class="btn danger" id="btnStop" disabled>⏹ Dừng</button>
    <button class="btn purple" id="btnSwitch">🔄 Đổi camera</button>
    <button class="btn" id="btnReview" disabled>👁 Xem lại</button>
    <button class="btn accent" id="btnDownload" disabled>⬇ Xuất video</button>
  </div>
</div>

<div class="modal-overlay hidden" id="reviewModal">
  <div class="modal">
    <h3>🎬 Xem lại video</h3>
    <video id="reviewVideo" controls style="width:100%;border-radius:10px;"></video>
    <div class="timeline" id="reviewTimeline" style="height:6px;background:var(--bg3);margin:10px 0;border-radius:3px;cursor:pointer;"><div id="reviewTimelineFill" style="height:100%;background:var(--accent);border-radius:3px;width:0%;"></div></div>
    <div style="display:flex;justify-content:space-between;font-size:10px;"><span id="reviewCurrent">00:00</span><span id="reviewDuration">00:00</span></div>
    <div style="display:flex;gap:8px;margin-top:12px;">
      <button class="btn" id="btnReviewClose">Đóng</button>
      <button class="btn danger" id="btnDeleteVideo">🗑 Xóa & Quay lại</button>
      <button class="btn accent" id="btnReviewDownload">⬇ Tải xuống</button>
    </div>
  </div>
</div>

<div class="modal-overlay hidden" id="exportModal">
  <div class="modal" style="max-width:360px;">
    <h3>📦 Đang xuất video...</h3>
    <div style="height:6px;background:var(--bg3);border-radius:3px;margin:12px 0;"><div id="exportProgressFill" style="height:100%;background:linear-gradient(90deg,var(--accent),var(--accent2));border-radius:3px;width:0%;"></div></div>
    <p id="exportStatusText" style="font-size:12px;">Đang chuẩn bị...</p>
  </div>
</div>

<div id="fakeConsole"><div>> hệ thống sẵn sàng</div></div>

<script>
(() => {
  const $ = s => document.querySelector(s);
  const showToast = (msg) => {
    const t = document.createElement('div');
    t.className='toast'; t.textContent=msg; t.style.cssText='padding:10px 16px;border-radius:20px;background:var(--glass2);backdrop-filter:blur(12px);border:1px solid var(--border);color:var(--text);font-size:12px;animation:slideIn 0.3s ease, fadeOut 0.3s 2.5s forwards;';
    document.getElementById('toastContainer').appendChild(t);
    setTimeout(()=>t.remove(), 3000);
  };

  // state
  let mediaStream=null, mediaRecorder=null, recordedChunks=[], startTime=0, pauseTime=0, totalPause=0;
  let isRecording=false, isPaused=false, facing='user', recordedBlob=null, blobUrl=null;
  let textOverlays=[], selectedId=null, isDragging=false, dragOffX=0, dragOffY=0, textIdCnt=0;
  let animFrame=null, reviewInterval=null, fpsCount=0, fpsLast=performance.now(), currentFps=0;
  let isMirrored = (facing==='user');
  let currentRatio = 'auto';

  const video = $('#videoPreview');
  const canvas = $('#overlayCanvas');
  const ctx = canvas.getContext('2d');
  const recInd = $('#recIndicator');
  const recTimeDisp = $('#recTimeDisplay');
  const statusDot = $('#statusDot');
  const textList = $('#textListContainer');
  const reviewModal = $('#reviewModal');
  const reviewVid = $('#reviewVideo');
  const reviewFill = $('#reviewTimelineFill');
  const reviewCur = $('#reviewCurrent');
  const reviewDur = $('#reviewDuration');
  const exportModal = $('#exportModal');
  const exportFill = $('#exportProgressFill');
  const exportStat = $('#exportStatusText');
  const dashTime = $('#dashTime');
  const dashFps = $('#dashFPS');
  const dashSize = $('#dashSize');
  const dashStatus = $('#dashStatus');
  const dashCam = $('#dashCamLabel');
  const previewContainer = $('#previewContainer');

  // theme
  let dark = localStorage.getItem('devcam-theme')!=='light';
  function setTheme() {
    document.documentElement.classList.toggle('light', !dark);
    $('#themeIcon').textContent = dark?'🌙':'☀️';
    localStorage.setItem('devcam-theme', dark?'dark':'light');
  }
  setTheme();
  $('#btnTheme').addEventListener('click', ()=>{ dark=!dark; setTheme(); });

  // console
  const consoleEl = $('#fakeConsole');
  const log = (msg) => {
    const d = document.createElement('div'); d.textContent = '> '+msg; consoleEl.appendChild(d);
    consoleEl.scrollTop = consoleEl.scrollHeight;
    while(consoleEl.children.length>25) consoleEl.firstChild.remove();
  };
  $('#btnConsoleToggle').addEventListener('click', ()=> consoleEl.classList.toggle('hidden'));

  // camera
  async function startCamera(mode='user') {
    if(mediaStream) mediaStream.getTracks().forEach(t=>t.stop());
    try {
      mediaStream = await navigator.mediaDevices.getUserMedia({
        video:{ facingMode:mode, width:{ideal:1920}, height:{ideal:1080} },
        audio:{ echoCancellation:true, noiseSuppression:true }
      });
      video.srcObject = mediaStream;
      facing = mode;
      dashCam.textContent = mode==='user'?'Trước':'Sau';
      video.style.transform = isMirrored ? 'scaleX(-1)' : 'scaleX(1)';
      statusDot.classList.remove('recording','paused');
      updateCanvasSize();
      log('Camera '+mode);
      return true;
    } catch(e) {
      log('Lỗi camera');
      showToast('❌ Không thể truy cập camera');
      return false;
    }
  }

  function updateCanvasSize() {
    const rect = video.getBoundingClientRect();
    if(rect.width && rect.height) {
      canvas.width = rect.width;
      canvas.height = rect.height;
      canvas._w = rect.width;
      canvas._h = rect.height;
      textOverlays.forEach(t=>{
        if(t.xRatio!==undefined) t.x = t.xRatio * rect.width;
        if(t.yRatio!==undefined) t.y = t.yRatio * rect.height;
      });
    }
  }

  $('#btnMirror').addEventListener('click', ()=>{
    isMirrored = !isMirrored;
    video.style.transform = isMirrored ? 'scaleX(-1)' : 'scaleX(1)';
    showToast(isMirrored?'Đã bật lật gương':'Đã tắt lật gương');
    log('Lật gương '+(isMirrored?'bật':'tắt'));
  });

  async function switchCam() {
    if(isRecording && !isPaused) { showToast('⚠️ Vui lòng tạm dừng trước khi đổi camera'); return; }
    const newMode = facing==='user'?'environment':'user';
    await startCamera(newMode);
    isMirrored = (newMode==='user');
    video.style.transform = isMirrored ? 'scaleX(-1)' : 'scaleX(1)';
  }
  $('#btnSwitch').addEventListener('click', switchCam);

  // aspect ratio
  const aspectBtns = document.querySelectorAll('.aspect-btn');
  aspectBtns.forEach(b=>{
    b.addEventListener('click', ()=>{
      aspectBtns.forEach(b=>b.classList.remove('active'));
      b.classList.add('active');
      const ratio = b.dataset.ratio;
      currentRatio = ratio;
      if(ratio==='auto') {
        previewContainer.style.aspectRatio = '';
        previewContainer.style.maxWidth = '900px';
      } else {
        previewContainer.style.aspectRatio = ratio;
        previewContainer.style.maxWidth = '100%';
      }
      updateCanvasSize();
      log('Khung hình: '+ratio);
    });
  });

  // recording
  function getMime() {
    const types = ['video/webm;codecs=vp9,opus','video/webm;codecs=vp8,opus','video/webm'];
    for(const t of types) if(MediaRecorder.isTypeSupported(t)) return t;
    return 'video/webm';
  }
  function startRec() {
    if(!mediaStream) return showToast('❌ Chưa có camera');
    if(isRecording && !isPaused) return;
    if(isPaused) { resumeRec(); return; }
    recordedChunks=[]; totalPause=0;
    const mime = getMime();
    mediaRecorder = new MediaRecorder(mediaStream, {mimeType:mime, videoBitsPerSecond:5000000});
    mediaRecorder.ondataavailable = e => { if(e.data.size) recordedChunks.push(e.data); };
    mediaRecorder.onstop = () => {
      recordedBlob = new Blob(recordedChunks, {type:mime});
      if(blobUrl) URL.revokeObjectURL(blobUrl);
      blobUrl = URL.createObjectURL(recordedBlob);
      dashSize.textContent = (recordedBlob.size/1024/1024).toFixed(2)+' MB';
      updateBtnsAfterStop();
    };
    mediaRecorder.start(500);
    startTime = Date.now(); isRecording=true; isPaused=false;
    statusDot.classList.add('recording'); recInd.classList.remove('hidden');
    dashStatus.textContent='Đang quay';
    updateBtnsRecording();
    log('▶ Bắt đầu quay');
  }
  function pauseRec() {
    if(!mediaRecorder||mediaRecorder.state!=='recording') return;
    mediaRecorder.pause(); pauseTime=Date.now(); isPaused=true;
    statusDot.classList.replace('recording','paused');
    dashStatus.textContent='Tạm dừng'; updateBtnsPause();
  }
  function resumeRec() {
    if(!mediaRecorder||mediaRecorder.state!=='paused') return;
    mediaRecorder.resume(); totalPause+=Date.now()-pauseTime; isPaused=false;
    statusDot.classList.replace('paused','recording');
    dashStatus.textContent='Đang quay'; updateBtnsRecording();
  }
  function stopRec() {
    if(!mediaRecorder || (mediaRecorder.state!=='recording'&&mediaRecorder.state!=='paused')) return;
    if(isPaused) { totalPause+=Date.now()-pauseTime; mediaRecorder.resume(); }
    setTimeout(()=>{
      if(mediaRecorder&&mediaRecorder.state!=='inactive') mediaRecorder.stop();
      isRecording=isPaused=false;
      statusDot.classList.remove('recording','paused');
      recInd.classList.add('hidden');
      dashStatus.textContent='Có video mới';
      updateBtnsAfterStop();
      log('⏹ Đã dừng quay');
    },150);
  }
  function updateBtnsRecording() {
    $('#btnStart').disabled=true; $('#btnPause').disabled=false; $('#btnResume').disabled=true;
    $('#btnStop').disabled=false; $('#btnReview').disabled=true; $('#btnDownload').disabled=true;
  }
  function updateBtnsPause() {
    $('#btnStart').disabled=true; $('#btnPause').disabled=true; $('#btnResume').disabled=false;
    $('#btnStop').disabled=false;
  }
  function updateBtnsAfterStop() {
    $('#btnStart').disabled=false; $('#btnPause').disabled=true; $('#btnResume').disabled=true;
    $('#btnStop').disabled=true; $('#btnReview').disabled=false; $('#btnDownload').disabled=false;
  }
  function resetRecorder() {
    if(mediaRecorder&&mediaRecorder.state!=='inactive') mediaRecorder.stop();
    isRecording=isPaused=false; recordedChunks=[]; recordedBlob=null;
    if(blobUrl) URL.revokeObjectURL(blobUrl); blobUrl=null;
    statusDot.classList.remove('recording','paused'); recInd.classList.add('hidden');
    dashTime.textContent='00:00'; dashSize.textContent='0 MB'; dashStatus.textContent='Sẵn sàng';
    $('#btnStart').disabled=false; $('#btnPause').disabled=true; $('#btnResume').disabled=true;
    $('#btnStop').disabled=true; $('#btnReview').disabled=true; $('#btnDownload').disabled=true;
  }

  $('#btnStart').addEventListener('click', startRec);
  $('#btnPause').addEventListener('click', pauseRec);
  $('#btnResume').addEventListener('click', resumeRec);
  $('#btnStop').addEventListener('click', stopRec);

  // review
  function openReview() {
    if(!blobUrl) return showToast('❌ Chưa có video');
    reviewVid.src = blobUrl; reviewModal.classList.remove('hidden'); reviewVid.play().catch(()=>{});
    if(reviewInterval) clearInterval(reviewInterval);
    reviewInterval = setInterval(()=>{
      if(!reviewVid.duration) return;
      const pct = (reviewVid.currentTime/reviewVid.duration)*100;
      reviewFill.style.width = pct+'%';
      reviewCur.textContent = fmtTime(reviewVid.currentTime);
      reviewDur.textContent = fmtTime(reviewVid.duration);
    },200);
  }
  function closeReview() { reviewModal.classList.add('hidden'); reviewVid.pause(); if(reviewInterval) clearInterval(reviewInterval); }
  $('#btnReview').addEventListener('click', openReview);
  $('#btnReviewClose').addEventListener('click', closeReview);
  $('#btnDeleteVideo').addEventListener('click', ()=>{ closeReview(); resetRecorder(); showToast('Đã xóa video'); });
  $('#btnReviewDownload').addEventListener('click', ()=>{ closeReview(); download(); });
  document.getElementById('reviewTimeline').addEventListener('click', e=>{
    if(!reviewVid.duration) return;
    const rect = e.target.getBoundingClientRect();
    reviewVid.currentTime = ((e.clientX-rect.left)/rect.width)*reviewVid.duration;
  });

  function download() {
    if(!recordedBlob) return;
    exportModal.classList.remove('hidden'); exportFill.style.width='0%'; exportStat.textContent='Đang chuẩn bị...';
    let prog=0;
    const iv = setInterval(()=>{
      prog+=Math.random()*25+10; if(prog>95) prog=95;
      exportFill.style.width=prog+'%'; exportStat.textContent=`${Math.round(prog)}%`;
    },300);
    setTimeout(()=>{
      clearInterval(iv); exportFill.style.width='100%'; exportStat.textContent='Hoàn tất';
      const ts = new Date().toISOString().replace(/[:.]/g,'-').slice(0,19);
      const a = document.createElement('a'); a.href = URL.createObjectURL(recordedBlob);
      a.download = `DevCam_${ts}.mp4`; a.click();
      setTimeout(()=>exportModal.classList.add('hidden'),800);
    },1500);
  }
  $('#btnDownload').addEventListener('click', download);

  // text overlays (with paste button)
  function createOverlay(text='Văn bản', x=150, y=150, size=36, color='#ffffff', opacity=0.9) {
    const id = 't'+ (++textIdCnt);
    const w = canvas._w||640, h = canvas._h||360;
    const ov = {
      id, text, x, y, fontSize:size, color, opacity, visible:true,
      font: 'Impact, "Arial Black", sans-serif',
      xRatio: x/w, yRatio: y/h
    };
    textOverlays.push(ov);
    selectedId = id;
    renderTextCards();
    saveConfig();
    return ov;
  }

  function deleteOverlay(id) {
    textOverlays = textOverlays.filter(t=>t.id!==id);
    if(selectedId===id) selectedId = textOverlays.length? textOverlays[textOverlays.length-1].id : null;
    renderTextCards(); saveConfig();
  }

  function updateOverlay(id, props) {
    const t = textOverlays.find(t=>t.id===id);
    if(t) { Object.assign(t, props); renderTextCards(); saveConfig(); }
  }

  function moveLayer(id, dir) {
    const idx = textOverlays.findIndex(t=>t.id===id);
    if(idx===-1) return;
    if(dir==='up' && idx<textOverlays.length-1) {
      [textOverlays[idx], textOverlays[idx+1]] = [textOverlays[idx+1], textOverlays[idx]];
    } else if(dir==='down' && idx>0) {
      [textOverlays[idx], textOverlays[idx-1]] = [textOverlays[idx-1], textOverlays[idx]];
    }
    renderTextCards(); saveConfig();
  }

  async function pasteFromClipboard(textId) {
    try {
      const clipboardText = await navigator.clipboard.readText();
      if(clipboardText) {
        const textarea = document.querySelector(`.text-card[data-id="${textId}"] textarea`);
        if(textarea) {
          textarea.value = clipboardText;
          textarea.dispatchEvent(new Event('input'));
        }
        updateOverlay(textId, { text: clipboardText });
        showToast('📋 Đã dán văn bản từ clipboard');
        log('Dán văn bản cho '+textId);
      } else {
        showToast('📋 Clipboard trống');
      }
    } catch (err) {
      showToast('⚠️ Không thể truy cập clipboard. Hãy thử dán thủ công (Ctrl+V)');
      log('Lỗi clipboard: '+err);
    }
  }

  function renderTextCards() {
    textList.innerHTML = '';
    textOverlays.forEach(t => {
      const card = document.createElement('div');
      card.className = 'text-card' + (t.id===selectedId?' active':'');
      card.setAttribute('data-id', t.id);
      card.innerHTML = `
        <textarea data-field="text" placeholder="Nhập văn bản, có thể xuống dòng...">${t.text}</textarea>
        <div class="row">
          <button class="btn-xs" id="paste-btn-${t.id}" title="Dán văn bản từ clipboard">📋 Dán</button>
        </div>
        <div class="row">
          <input type="color" value="${t.color}" data-field="color" title="Màu chữ">
          <input type="range" min="12" max="100" value="${t.fontSize}" data-field="fontSize" style="flex:1;" title="Cỡ chữ">
          <span style="font-size:10px;">${t.fontSize}px</span>
        </div>
        <div class="row">
          <input type="range" min="0.1" max="1" step="0.05" value="${t.opacity}" data-field="opacity" style="flex:1;" title="Độ trong suốt">
          <span style="font-size:10px;">${Math.round(t.opacity*100)}%</span>
        </div>
        <div class="row" style="justify-content:space-between;">
          <label style="display:flex;align-items:center;gap:4px;font-size:10px;">
            <input type="checkbox" data-field="visible" ${t.visible?'checked':''}> Hiển thị
          </label>
          <button class="btn-xs" data-action="up" title="Đưa lên trước">▲</button>
          <button class="btn-xs" data-action="down" title="Đưa xuống sau">▼</button>
          <button class="btn-xs danger" data-action="del" title="Xóa">🗑</button>
        </div>
      `;

      card.querySelectorAll('input:not([type="checkbox"]), textarea').forEach(inp=>{
        inp.addEventListener('input', e=>{
          const field = e.target.dataset.field;
          let val = e.target.value;
          if(field==='fontSize') val = parseInt(val);
          if(field==='opacity') val = parseFloat(val);
          if(field==='visible') val = e.target.checked;
          updateOverlay(t.id, {[field]:val});
          if(field==='fontSize') card.querySelector('span').textContent = val+'px';
          if(field==='opacity') card.querySelectorAll('span')[1].textContent = Math.round(val*100)+'%';
        });
      });
      card.querySelector('input[type="checkbox"]').addEventListener('change', e=>{
        updateOverlay(t.id, {visible: e.target.checked});
      });
      card.querySelector(`#paste-btn-${t.id}`).addEventListener('click', e=>{
        e.stopPropagation();
        pasteFromClipboard(t.id);
      });
      card.querySelector('[data-action="up"]').addEventListener('click', e=>{ e.stopPropagation(); moveLayer(t.id,'up'); });
      card.querySelector('[data-action="down"]').addEventListener('click', e=>{ e.stopPropagation(); moveLayer(t.id,'down'); });
      card.querySelector('[data-action="del"]').addEventListener('click', e=>{ e.stopPropagation(); deleteOverlay(t.id); });
      card.addEventListener('click', ()=>{ selectedId=t.id; renderTextCards(); });
      textList.appendChild(card);
    });
  }

  function saveConfig() {
    const data = textOverlays.map(t=>({
      text:t.text, xRatio:t.xRatio, yRatio:t.yRatio, fontSize:t.fontSize,
      color:t.color, opacity:t.opacity, visible:t.visible
    }));
    localStorage.setItem('devcam-texts', JSON.stringify(data));
  }
  function loadConfig() {
    const raw = localStorage.getItem('devcam-texts');
    if(!raw) return false;
    try {
      const arr = JSON.parse(raw);
      textOverlays = arr.map(item=>{
        const id = 't'+ (++textIdCnt);
        const w = canvas._w||640, h = canvas._h||360;
        return {
          id, text:item.text, xRatio:item.xRatio, yRatio:item.yRatio,
          x: item.xRatio*w, y:item.yRatio*h, fontSize:item.fontSize,
          color:item.color, opacity:item.opacity, visible:item.visible,
          font:'Impact, "Arial Black", sans-serif'
        };
      });
      if(textOverlays.length) selectedId = textOverlays[0].id;
      renderTextCards();
      return true;
    } catch(e) { return false; }
  }

  $('#btnAddText').addEventListener('click', ()=>{
    const w = canvas._w||640, h=canvas._h||360;
    createOverlay('Văn bản\nmới', w*0.4, h*0.4, 36, '#fff', 0.9);
  });
  $('#btnSaveConfig').addEventListener('click', ()=>{ saveConfig(); showToast('💾 Đã lưu cấu hình văn bản'); });
  $('#btnResetText').addEventListener('click', ()=>{ textOverlays=[]; selectedId=null; renderTextCards(); saveConfig(); showToast('🔄 Đã xóa tất cả văn bản'); });

  // canvas drawing (multiline)
  function drawOverlays() {
    if(!canvas._w) updateCanvasSize();
    if(!canvas._w) return;
    ctx.clearRect(0,0,canvas._w,canvas._h);
    textOverlays.forEach(t=>{
      if(!t.visible) return;
      ctx.save();
      ctx.globalAlpha = t.opacity;
      ctx.fillStyle = t.color;
      ctx.font = `bold ${t.fontSize}px ${t.font}`;
      ctx.textAlign = 'center';
      ctx.textBaseline = 'middle';
      ctx.shadowColor = 'rgba(0,0,0,0.7)';
      ctx.shadowBlur = t.fontSize*0.25;
      const lines = t.text.split('\n');
      const lineHeight = t.fontSize * 1.2;
      const totalH = lines.length * lineHeight;
      const startY = t.y - totalH/2 + lineHeight/2;
      lines.forEach((line, i)=>{
        ctx.fillText(line, t.x, startY + i*lineHeight);
      });
      ctx.restore();
    });
    if(selectedId && !isDragging) {
      const sel = textOverlays.find(t=>t.id===selectedId);
      if(sel && sel.visible) {
        ctx.save(); ctx.strokeStyle='#00d4ff'; ctx.lineWidth=2; ctx.setLineDash([5,4]);
        const lines = sel.text.split('\n');
        const lh = sel.fontSize*1.2;
        const tw = Math.max(...lines.map(l=>ctx.measureText(l).width));
        const th = lines.length * lh;
        ctx.strokeRect(sel.x-tw/2-8, sel.y-th/2-6, tw+16, th+12);
        ctx.restore();
      }
    }
  }

  function renderLoop() {
    drawOverlays();
    fpsCount++;
    const now = performance.now();
    if(now-fpsLast>=1000) {
      currentFps = Math.round(fpsCount/((now-fpsLast)/1000));
      fpsCount=0; fpsLast=now;
      dashFps.textContent = currentFps;
    }
    animFrame = requestAnimationFrame(renderLoop);
  }

  // drag on canvas (touch + mouse)
  function getPos(e) {
    const rect = canvas.getBoundingClientRect();
    const sx = canvas._w/rect.width, sy = canvas._h/rect.height;
    return { x:(e.clientX-rect.left)*sx, y:(e.clientY-rect.top)*sy };
  }
  function hitTest(pos) {
    for(let i=textOverlays.length-1; i>=0; i--) {
      const t = textOverlays[i]; if(!t.visible) continue;
      ctx.save(); ctx.font = `bold ${t.fontSize}px ${t.font}`;
      const lines = t.text.split('\n');
      const lh = t.fontSize*1.2;
      const widths = lines.map(l=>ctx.measureText(l).width);
      const maxW = Math.max(...widths);
      const totalH = lines.length * lh;
      ctx.restore();
      const left=t.x-maxW/2, right=t.x+maxW/2, top=t.y-totalH/2, bottom=t.y+totalH/2;
      if(pos.x>=left && pos.x<=right && pos.y>=top && pos.y<=bottom) return t;
    }
    return null;
  }

  canvas.addEventListener('mousedown', e=>{
    const pos = getPos(e); const hit = hitTest(pos);
    if(hit) { selectedId=hit.id; isDragging=true; dragOffX=hit.x-pos.x; dragOffY=hit.y-pos.y; canvas.style.cursor='grabbing'; renderTextCards(); e.preventDefault(); }
  });
  canvas.addEventListener('touchstart', e=>{
    if(e.touches.length!==1) return;
    const pos = getPos(e.touches[0]); const hit = hitTest(pos);
    if(hit) { selectedId=hit.id; isDragging=true; dragOffX=hit.x-pos.x; dragOffY=hit.y-pos.y; renderTextCards(); e.preventDefault(); }
  }, {passive:false});
  window.addEventListener('mousemove', e=>{
    if(!isDragging) { canvas.style.cursor = hitTest(getPos(e))?'grab':'default'; return; }
    const pos = getPos(e); const t = textOverlays.find(t=>t.id===selectedId);
    if(t) {
      t.x = Math.min(canvas._w-10, Math.max(10, pos.x+dragOffX));
      t.y = Math.min(canvas._h-10, Math.max(10, pos.y+dragOffY));
      t.xRatio = t.x/canvas._w; t.yRatio = t.y/canvas._h;
    }
  });
  window.addEventListener('touchmove', e=>{
    if(!isDragging||e.touches.length!==1) return;
    const pos = getPos(e.touches[0]); const t = textOverlays.find(t=>t.id===selectedId);
    if(t) {
      t.x = Math.min(canvas._w-10, Math.max(10, pos.x+dragOffX));
      t.y = Math.min(canvas._h-10, Math.max(10, pos.y+dragOffY));
      t.xRatio = t.x/canvas._w; t.yRatio = t.y/canvas._h;
      e.preventDefault();
    }
  }, {passive:false});
  window.addEventListener('mouseup', ()=>{ if(isDragging){ isDragging=false; canvas.style.cursor='default'; saveConfig(); } });
  window.addEventListener('touchend', ()=>{ if(isDragging){ isDragging=false; saveConfig(); } });

  // time update
  function fmtTime(s) { if(!isFinite(s)||s<0) s=0; const m=Math.floor(s/60), sec=Math.floor(s%60); return String(m).padStart(2,'0')+':'+String(sec).padStart(2,'0'); }
  setInterval(()=>{
    if(isRecording && !isPaused) {
      const elapsed = (Date.now()-startTime-totalPause)/1000;
      recTimeDisp.textContent = dashTime.textContent = fmtTime(elapsed);
    } else if(isRecording && isPaused) {
      const elapsed = (pauseTime-startTime-totalPause)/1000;
      recTimeDisp.textContent = dashTime.textContent = fmtTime(Math.max(0,elapsed));
    }
  },200);

  // fullscreen
  $('#btnFullscreen').addEventListener('click', ()=>{
    if(!document.fullscreenElement) previewContainer.requestFullscreen().catch(()=>{});
    else document.exitFullscreen();
  });
  window.addEventListener('resize', ()=>{
    clearTimeout(window._resizeT);
    window._resizeT = setTimeout(updateCanvasSize, 200);
  });

  // sidebar mobile
  $('#sidebarToggle').addEventListener('click', ()=> document.getElementById('sidebar').classList.toggle('open'));

  // init
  (async function(){
    await startCamera('user');
    if(!loadConfig()) {
      createOverlay('DevCam\nPro', 200, 80, 40, '#ffffff', 0.85);
      createOverlay('Quay • Sáng tạo', 200, 150, 22, '#00d4ff', 0.8);
    }
    renderLoop();
    setTimeout(()=> document.getElementById('loadingScreen').classList.add('hidden'), 800);
    log('Sẵn sàng quay video');
    showToast('📷 Ứng dụng đã sẵn sàng');
  })();
})();
</script>
</body>
</html>
