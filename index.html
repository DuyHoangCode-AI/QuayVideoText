<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>DevCam Pro - Quay Video & Text Overlay</title>
    <style>
        :root {
            --bg: #0a0a0f;
            --bg2: #111118;
            --surface: #1a1a2e;
            --glass: rgba(20, 20, 35, 0.75);
            --glass2: rgba(25, 25, 45, 0.65);
            --text: #e0e0f0;
            --text2: #b0b0c8;
            --text3: #7878a0;
            --accent: #00d4ff;
            --accent2: #7b5cff;
            --accent3: #ff3d71;
            --neon: #00d4ff;
            --neon2: #b347ea;
            --border: rgba(255, 255, 255, 0.08);
            --border2: rgba(255, 255, 255, 0.14);
            --shadow: 0 8px 32px rgba(0, 0, 0, 0.5);
            --glow: 0 0 30px rgba(0, 212, 255, 0.25);
            --radius: 14px;
            --radius-sm: 10px;
            --radius-xs: 6px;
            --transition: 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            --font: 'Segoe UI', 'SF Pro Display', 'Inter', system-ui, -apple-system, sans-serif;
            --font-mono: 'JetBrains Mono', 'Fira Code', 'SF Mono', 'Consolas', monospace;
            --recording-pulse: #ff3d71;
            --success: #00e676;
        }

        [data-theme="light"] {
            --bg: #f5f5f8;
            --bg2: #eaeaef;
            --surface: #ffffff;
            --glass: rgba(255, 255, 255, 0.8);
            --glass2: rgba(255, 255, 255, 0.7);
            --text: #1a1a2e;
            --text2: #444460;
            --text3: #707090;
            --accent: #0088cc;
            --accent2: #6c3cff;
            --accent3: #d63060;
            --neon: #0088cc;
            --neon2: #6c3cff;
            --border: rgba(0, 0, 0, 0.08);
            --border2: rgba(0, 0, 0, 0.14);
            --shadow: 0 8px 32px rgba(0, 0, 0, 0.1);
            --glow: 0 0 30px rgba(0, 136, 204, 0.15);
            --recording-pulse: #e02050;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        html {
            font-size: 15px;
            scroll-behavior: smooth;
        }
        body {
            font-family: var(--font);
            background: var(--bg);
            color: var(--text);
            min-height: 100vh;
            overflow: hidden;
            transition: background var(--transition), color var(--transition);
            user-select: none;
            -webkit-user-select: none;
            -webkit-tap-highlight-color: transparent;
        }

        ::-webkit-scrollbar {
            width: 5px;
            height: 5px;
        }
        ::-webkit-scrollbar-track {
            background: transparent;
        }
        ::-webkit-scrollbar-thumb {
            background: var(--border2);
            border-radius: 10px;
        }

        #loading-screen {
            position: fixed;
            inset: 0;
            z-index: 9999;
            background: var(--bg);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            transition: opacity 0.5s, visibility 0.5s;
        }
        #loading-screen.hidden {
            opacity: 0;
            visibility: hidden;
            pointer-events: none;
        }
        .loader-ring {
            width: 60px;
            height: 60px;
            border: 3px solid var(--border);
            border-top-color: var(--accent);
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
            margin-bottom: 20px;
        }
        .loader-text {
            font-family: var(--font-mono);
            color: var(--accent);
            font-size: 0.9rem;
            letter-spacing: 2px;
            animation: pulse-text 1.5s ease-in-out infinite;
        }
        @keyframes spin {
            to {
                transform: rotate(360deg);
            }
        }
        @keyframes pulse-text {
            0%,
            100% {
                opacity: 1;
            }
            50% {
                opacity: 0.4;
            }
        }
        @keyframes recording-blink {
            0%,
            100% {
                opacity: 1;
                transform: scale(1);
            }
            50% {
                opacity: 0.3;
                transform: scale(1.3);
            }
        }
        @keyframes slide-up {
            from {
                opacity: 0;
                transform: translateY(30px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }
        @keyframes border-glow {
            0%,
            100% {
                border-color: var(--accent);
                box-shadow: 0 0 8px var(--neon);
            }
            50% {
                border-color: var(--accent2);
                box-shadow: 0 0 18px var(--neon2);
            }
        }

        .app-container {
            display: flex;
            flex-direction: column;
            height: 100vh;
            max-height: 100vh;
            overflow: hidden;
        }

        /* Header */
        .header {
            background: var(--glass);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border-bottom: 1px solid var(--border);
            padding: 10px 20px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            z-index: 100;
            flex-shrink: 0;
            transition: background var(--transition), border var(--transition);
        }
        .header-brand {
            display: flex;
            align-items: center;
            gap: 10px;
        }
        .header-logo {
            font-family: var(--font-mono);
            font-size: 1.3rem;
            font-weight: 700;
            color: var(--accent);
            letter-spacing: 1px;
            text-shadow: 0 0 20px var(--neon);
        }
        .header-dot {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background: var(--success);
            box-shadow: 0 0 8px var(--success);
            animation: recording-blink 2s infinite;
        }
        .theme-btn {
            width: 38px;
            height: 38px;
            border-radius: 50%;
            border: 1px solid var(--border2);
            background: var(--glass2);
            cursor: pointer;
            font-size: 1.2rem;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all var(--transition);
            color: var(--text);
            backdrop-filter: blur(10px);
        }
        .theme-btn:hover {
            border-color: var(--accent);
            box-shadow: var(--glow);
            transform: rotate(20deg);
        }

        /* Main layout */
        .main-content {
            display: flex;
            flex: 1;
            overflow: hidden;
            position: relative;
        }

        /* Camera area */
        .camera-area {
            flex: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            background: #000;
            position: relative;
            min-width: 0;
        }

        /* Khung chứa camera với tỉ lệ tùy chỉnh */
        .camera-wrapper {
            position: relative;
            width: 100%;
            height: 100%;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
        }
        .aspect-ratio-box {
            position: relative;
            width: 100%;
            height: 100%;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
        }
        /* Các class tỉ lệ khung */
        .ratio-1-1 {
            aspect-ratio: 1 / 1;
            max-height: 100%;
            max-width: 100%;
        }
        .ratio-4-3 {
            aspect-ratio: 4 / 3;
            max-height: 100%;
            max-width: 100%;
        }
        .ratio-3-4 {
            aspect-ratio: 3 / 4;
            max-height: 100%;
            max-width: 100%;
        }
        .ratio-16-9 {
            aspect-ratio: 16 / 9;
            max-height: 100%;
            max-width: 100%;
        }
        .ratio-9-16 {
            aspect-ratio: 9 / 16;
            max-height: 100%;
            max-width: 100%;
        }
        .ratio-full {
            aspect-ratio: auto;
            width: 100%;
            height: 100%;
        }
        video#camera-preview {
            width: 100%;
            height: 100%;
            object-fit: cover;
            background: #000;
            transition: transform 0.2s;
        }
        /* Lật gương nếu bật */
        video#camera-preview.mirror {
            transform: scaleX(-1);
        }

        /* Overlay text container */
        .overlay-container {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 10;
        }
        .overlay-container.active {
            pointer-events: auto;
        }
        .text-overlay-item {
            position: absolute;
            cursor: move;
            white-space: nowrap;
            user-select: none;
            -webkit-user-select: none;
            transform-origin: center center;
            pointer-events: auto;
            transition: box-shadow 0.15s;
            line-height: 1.2;
        }
        .text-overlay-item.selected {
            outline: 2px dashed var(--accent);
            outline-offset: 4px;
            box-shadow: 0 0 15px rgba(0, 212, 255, 0.5);
            z-index: 20 !important;
        }
        .resize-handle {
            position: absolute;
            width: 14px;
            height: 14px;
            background: var(--accent);
            border: 2px solid #fff;
            border-radius: 50%;
            cursor: nwse-resize;
            bottom: -8px;
            right: -8px;
            z-index: 25;
            display: none;
            box-shadow: 0 0 8px var(--neon);
        }
        .text-overlay-item.selected .resize-handle {
            display: block;
        }
        .rotate-handle {
            position: absolute;
            width: 20px;
            height: 20px;
            background: var(--accent2);
            border: 2px solid #fff;
            border-radius: 50%;
            cursor: grab;
            top: -28px;
            left: 50%;
            transform: translateX(-50%);
            z-index: 25;
            display: none;
            font-size: 10px;
            color: #fff;
            align-items: center;
            justify-content: center;
        }
        .text-overlay-item.selected .rotate-handle {
            display: flex;
        }
        .recording-indicator {
            position: absolute;
            top: 16px;
            right: 16px;
            display: flex;
            align-items: center;
            gap: 8px;
            background: rgba(0, 0, 0, 0.7);
            padding: 8px 14px;
            border-radius: 20px;
            z-index: 30;
            backdrop-filter: blur(6px);
            border: 1px solid var(--recording-pulse);
            opacity: 0;
            transition: opacity 0.3s;
            pointer-events: none;
        }
        .recording-indicator.active {
            opacity: 1;
            animation: border-glow 1.2s ease-in-out infinite;
        }
        .rec-dot {
            width: 12px;
            height: 12px;
            border-radius: 50%;
            background: var(--recording-pulse);
            animation: recording-blink 0.7s ease-in-out infinite;
        }
        .rec-time {
            font-family: var(--font-mono);
            color: #fff;
            font-size: 0.85rem;
            font-weight: 600;
        }
        .camera-switch-btn {
            position: absolute;
            bottom: 20px;
            right: 20px;
            width: 44px;
            height: 44px;
            border-radius: 50%;
            background: var(--glass);
            backdrop-filter: blur(10px);
            border: 1px solid var(--border2);
            color: #fff;
            cursor: pointer;
            z-index: 30;
            font-size: 1.3rem;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all var(--transition);
        }
        .camera-switch-btn:hover {
            border-color: var(--accent);
            box-shadow: var(--glow);
            transform: rotate(180deg);
        }
        .camera-label {
            position: absolute;
            top: 16px;
            left: 16px;
            background: var(--glass);
            backdrop-filter: blur(6px);
            padding: 6px 12px;
            border-radius: 16px;
            font-size: 0.7rem;
            color: var(--text2);
            z-index: 30;
            font-family: var(--font-mono);
            border: 1px solid var(--border);
            pointer-events: none;
        }

        /* Sidebar */
        .sidebar {
            width: 340px;
            background: var(--glass);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border-left: 1px solid var(--border);
            display: flex;
            flex-direction: column;
            overflow-y: auto;
            flex-shrink: 0;
            z-index: 50;
            padding: 16px;
            gap: 14px;
            transition: all var(--transition);
        }
        .sidebar-section {
            background: var(--surface);
            border-radius: var(--radius-sm);
            padding: 14px;
            border: 1px solid var(--border);
        }
        .sidebar-section h4 {
            font-family: var(--font-mono);
            font-size: 0.75rem;
            text-transform: uppercase;
            letter-spacing: 2px;
            color: var(--accent);
            margin-bottom: 10px;
            display: flex;
            align-items: center;
            gap: 6px;
        }
        .sidebar-section h4::before {
            content: '';
            width: 4px;
            height: 14px;
            background: var(--accent);
            border-radius: 2px;
            box-shadow: 0 0 8px var(--neon);
        }

        .btn {
            font-family: var(--font);
            font-size: 0.8rem;
            padding: 8px 16px;
            border-radius: var(--radius-xs);
            border: 1px solid var(--border2);
            background: var(--glass2);
            color: var(--text);
            cursor: pointer;
            transition: all var(--transition);
            backdrop-filter: blur(8px);
            -webkit-backdrop-filter: blur(8px);
            display: inline-flex;
            align-items: center;
            gap: 6px;
            white-space: nowrap;
            font-weight: 500;
        }
        .btn:hover {
            border-color: var(--accent);
            box-shadow: var(--glow);
            transform: translateY(-1px);
            color: var(--accent);
        }
        .btn.accent {
            background: var(--accent);
            color: #000;
            border: none;
            font-weight: 700;
            box-shadow: 0 0 20px rgba(0, 212, 255, 0.35);
        }
        .btn.danger {
            border-color: var(--accent3);
            color: var(--accent3);
        }
        .btn.sm {
            padding: 5px 10px;
            font-size: 0.7rem;
            border-radius: 4px;
        }
        .btn-group {
            display: flex;
            flex-wrap: wrap;
            gap: 6px;
        }

        input[type="text"],
        input[type="range"],
        input[type="color"],
        select {
            font-family: var(--font);
            background: var(--bg2);
            border: 1px solid var(--border);
            color: var(--text);
            border-radius: var(--radius-xs);
            padding: 6px 10px;
            font-size: 0.8rem;
            outline: none;
            transition: all var(--transition);
        }
        input[type="text"]:focus,
        select:focus {
            border-color: var(--accent);
            box-shadow: 0 0 8px rgba(0, 212, 255, 0.2);
        }
        input[type="range"] {
            -webkit-appearance: none;
            height: 6px;
            background: var(--border2);
            border-radius: 3px;
            cursor: pointer;
        }
        input[type="range"]::-webkit-slider-thumb {
            -webkit-appearance: none;
            width: 20px;
            height: 20px;
            border-radius: 50%;
            background: var(--accent);
            cursor: pointer;
            box-shadow: 0 0 10px var(--neon);
            border: 2px solid #fff;
        }
        .slider-group {
            display: flex;
            align-items: center;
            gap: 8px;
            margin: 4px 0;
        }
        .slider-group label {
            font-size: 0.7rem;
            color: var(--text3);
            min-width: 50px;
            font-family: var(--font-mono);
        }
        .slider-group .val {
            font-size: 0.7rem;
            color: var(--accent);
            min-width: 30px;
            text-align: right;
            font-family: var(--font-mono);
        }

        .layer-list {
            max-height: 140px;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
            gap: 4px;
        }
        .layer-item {
            display: flex;
            align-items: center;
            gap: 6px;
            padding: 6px 10px;
            background: var(--bg2);
            border-radius: 4px;
            cursor: pointer;
            font-size: 0.75rem;
            border: 1px solid transparent;
            font-family: var(--font-mono);
            transition: all var(--transition);
        }
        .layer-item.active {
            border-color: var(--accent);
            box-shadow: 0 0 8px rgba(0, 212, 255, 0.2);
        }
        .layer-name {
            flex: 1;
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
        }
        .layer-del {
            cursor: pointer;
            color: var(--accent3);
            padding: 2px 6px;
            border-radius: 3px;
        }
        .layer-del:hover {
            background: var(--accent3);
            color: #fff;
        }

        /* Control bar */
        .control-bar {
            background: var(--glass);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border-top: 1px solid var(--border);
            padding: 10px 20px;
            display: flex;
            align-items: center;
            gap: 10px;
            flex-wrap: wrap;
            z-index: 100;
            flex-shrink: 0;
            justify-content: center;
            transition: all var(--transition);
        }
        .record-btn {
            width: 56px;
            height: 56px;
            border-radius: 50%;
            border: 3px solid var(--accent3);
            background: transparent;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all var(--transition);
            position: relative;
        }
        .record-btn .inner {
            width: 28px;
            height: 28px;
            border-radius: 50%;
            background: var(--accent3);
            box-shadow: 0 0 15px rgba(255, 60, 110, 0.5);
            transition: all var(--transition);
        }
        .record-btn.recording .inner {
            border-radius: 4px;
            width: 20px;
            height: 20px;
            animation: recording-blink 0.7s ease-in-out infinite;
        }
        .stats-bar {
            display: flex;
            gap: 16px;
            font-family: var(--font-mono);
            font-size: 0.7rem;
            color: var(--text3);
            align-items: center;
            flex-wrap: wrap;
        }
        .stat-item {
            display: flex;
            align-items: center;
            gap: 4px;
            background: var(--surface);
            padding: 5px 10px;
            border-radius: 12px;
            border: 1px solid var(--border);
        }

        .toast-container {
            position: fixed;
            top: 20px;
            right: 20px;
            z-index: 10000;
            display: flex;
            flex-direction: column;
            gap: 8px;
        }
        .toast {
            background: var(--surface);
            border: 1px solid var(--border2);
            padding: 12px 18px;
            border-radius: var(--radius-sm);
            font-size: 0.8rem;
            color: var(--text);
            box-shadow: var(--shadow);
            animation: slide-up 0.35s ease-out;
            backdrop-filter: blur(10px);
            font-family: var(--font-mono);
            max-width: 350px;
        }
        .toast.success {
            border-left: 3px solid var(--success);
        }
        .toast.error {
            border-left: 3px solid var(--accent3);
        }

        .modal-overlay {
            position: fixed;
            inset: 0;
            background: rgba(0, 0, 0, 0.7);
            z-index: 500;
            display: flex;
            align-items: center;
            justify-content: center;
            backdrop-filter: blur(4px);
        }
        .modal {
            background: var(--surface);
            border-radius: var(--radius);
            border: 1px solid var(--border2);
            padding: 24px;
            max-width: 90vw;
            max-height: 85vh;
            overflow-y: auto;
            box-shadow: var(--shadow), var(--glow);
        }
        #review-video {
            width: 100%;
            border-radius: var(--radius-sm);
            background: #000;
            max-height: 50vh;
        }

        .mini-console {
            background: #0a0a10;
            border-radius: var(--radius-sm);
            padding: 10px;
            font-family: var(--font-mono);
            font-size: 0.65rem;
            color: #0f0;
            max-height: 100px;
            overflow-y: auto;
            border: 1px solid #1a3a1a;
            line-height: 1.5;
        }

        @media (max-width: 900px) {
            .main-content {
                flex-direction: column;
            }
            .sidebar {
                width: 100%;
                max-height: 40vh;
                border-left: none;
                border-top: 1px solid var(--border);
            }
            .control-bar {
                gap: 6px;
                padding: 8px 10px;
            }
            .record-btn {
                width: 44px;
                height: 44px;
            }
            .record-btn .inner {
                width: 22px;
                height: 22px;
            }
            .record-btn.recording .inner {
                width: 16px;
                height: 16px;
            }
        }
    </style>
</head>
<body data-theme="dark">

    <!-- Loading -->
    <div id="loading-screen">
        <div class="loader-ring"></div>
        <div class="loader-text">INITIALIZING DEVCAM PRO...</div>
    </div>

    <!-- Toast -->
    <div class="toast-container" id="toast-container"></div>

    <!-- App -->
    <div class="app-container" id="app-container" style="opacity:0; transition: opacity 0.6s;">
        <!-- Header -->
        <header class="header">
            <div class="header-brand">
                <span class="header-logo">&lt;DEVCAM/&gt;</span>
                <span class="header-dot" id="status-dot"></span>
            </div>
            <div style="display:flex;align-items:center;gap:16px;font-size:0.75rem;color:var(--text3);">
                <span id="cam-label-header">📷 Camera Ready</span>
                <span>🎤 Mic On</span>
            </div>
            <button class="theme-btn" id="theme-toggle" title="Chuyển theme">🌓</button>
        </header>

        <!-- Main -->
        <div class="main-content">
            <div class="camera-area">
                <div class="camera-wrapper" id="camera-wrapper">
                    <!-- Hộp tỉ lệ khung hình -->
                    <div class="aspect-ratio-box ratio-full" id="aspect-box">
                        <video id="camera-preview" autoplay playsinline muted></video>
                    </div>
                    <!-- Overlay text -->
                    <div class="overlay-container active" id="overlay-container"></div>
                    <!-- Recording indicator -->
                    <div class="recording-indicator" id="recording-indicator">
                        <span class="rec-dot"></span>
                        <span class="rec-time" id="rec-time-display">00:00</span>
                    </div>
                    <!-- Nút đổi cam -->
                    <button class="camera-switch-btn" id="cam-switch-btn" title="Đổi camera">🔄</button>
                    <div class="camera-label" id="camera-label">📷 Camera Trước</div>
                </div>
            </div>

            <!-- Sidebar -->
            <aside class="sidebar">
                <!-- Khung hình & Gương -->
                <div class="sidebar-section">
                    <h4>📐 Tỉ lệ khung hình</h4>
                    <select id="aspect-ratio-select" style="width:100%;margin-bottom:8px;">
                        <option value="full">Full (lấp đầy)</option>
                        <option value="1-1">1:1 (Vuông)</option>

                    <div style="display:flex;align-items:center;gap:8px;">

                <!-- Text overlay -->
                <div class="sidebar-section">

                        <label>Opacity</label><input type="range" id="opacity-slider" min="10" max="100" value="100"><span class="val" id="opacity-val">100%</span>

                        <label>Đậm</label><input type="range" id="weight-slider" min="100" max="900" step="100" value="700"><span class="val" id="weight-val">700</span>

                        <label style="font-size:0.7rem;">Màu</label><input type="color" id="color-picker" value="#ffffff">

                            <option value="'Segoe UI', sans-serif">Segoe UI</option>
                            <option value="'JetBrains Mono', monospace">JetBrains Mono</option>

                        <button class="btn sm" id="btn-align-center">⬤</button>
                        <button class="btn sm" id="btn-align-right">➡</button>

                    <div class="btn-group">
                        <button class="btn sm" id="btn-shadow">✨ Shadow</button>
                        <button class="btn sm" id="btn-glow">💫 Glow</button>
                        <button class="btn sm" id="btn-bg-blur">🧊 Nền Blur</button>
                    </div>

                <!-- Layer manager -->
                <div class="sidebar-section">
                    <h4>📑 Layer</h4>
                    <div class="layer-list" id="layer-list">
                        <span style="font-size:0.7rem;color:var(--text3);">Chưa có layer</span>
                    </div>
                </div>

                <!-- Console -->
                <div class="sidebar-section">
                    <h4>💻 Console</h4>
                    <div class="mini-console" id="mini-console">
                        <div>&gt; DevCam Pro ready</div>
                    </div>
                </div>
            </aside>
        </div>

        <!-- Control bar -->
        <div class="control-bar">
            <button class="record-btn" id="btn-record" title="Bắt đầu / Dừng quay"><span class="inner"></span></button>
            <button class="btn" id="btn-pause">⏸ Tạm dừng</button>
            <button class="btn" id="btn-resume" style="display:none">▶ Tiếp tục</button>
            <button class="btn danger" id="btn-stop">⏹ Dừng</button>
            <button class="btn" id="btn-view-video">👁 Xem lại</button>
            <button class="btn accent" id="btn-download">⬇ Xuất MP4</button>
            <button class="btn" id="btn-clear-video">🗑 Xóa</button>
            <div style="flex:1;min-width:10px;"></div>
            <div class="stats-bar">
                <span>⏱<span id="live-time">00:00</span></span>
                <span>FPS:<span id="live-fps">0</span></span>
                <span>💾<span id="live-size">0 KB</span></span>
            </div>
        </div>

    <!-- Review modal -->
    <div class="modal-overlay" id="review-modal" style="display:none">
        <div class="modal">
            <h3>🎬 Video Review</h3>
            <video id="review-video" controls playsinline></video>
            <div style="display:flex;gap:8px;margin-top:12px;justify-content:flex-end;">
                <button class="btn" id="btn-close-review">Đóng</button>
                <button class="btn accent" id="btn-download-from-review">⬇ Tải MP4</button>
            </div>
        </div>
    </div>

    <script>
        (function() {
            // ==================== TOAST ====================
            const Toast = {
                container: document.getElementById('toast-container'),
                show(msg, type = 'info', duration = 3000) {
                    const el = document.createElement('div');
                    el.className = `toast ${type}`;
                    el.innerHTML = `<span>${type==='success'?'✅':type==='error'?'❌':'ℹ️'}</span> ${msg}`;
                    this.container.appendChild(el);
                    setTimeout(() => {
                        el.style.opacity = '0';
                        el.style.transform = 'translateX(50px)';
                        el.style.transition = '0.3s';
                        setTimeout(() => el.remove(), 300);
                    }, duration);
                }
            };

            // ==================== MINI CONSOLE ====================
            const MiniConsole = {
                el: document.getElementById('mini-console'),
                log(msg) {
                    const div = document.createElement('div');
                    div.textContent = `[${new Date().toLocaleTimeString()}] ${msg}`;
                    this.el.appendChild(div);
                    this.el.scrollTop = this.el.scrollHeight;
                    if (this.el.children.length > 30) this.el.children[0].remove();
                }
            };

            // ==================== CAMERA ====================
            const CameraManager = {
                stream: null,
                videoEl: document.getElementById('camera-preview'),
                facingMode: 'user',
                devices: [],

                async init() {
                    await this.getDevices();
                    await this.startStream();
                    MiniConsole.log('Camera ready');
                    return true;
                },
                async getDevices() {
                    try {
                        const tmp = await navigator.mediaDevices.getUserMedia({ video: true, audio: true });
                        tmp.getTracks().forEach(t => t.stop());
                    } catch (e) {}
                    const all = await navigator.mediaDevices.enumerateDevices();
                    this.devices = all.filter(d => d.kind === 'videoinput');
                },
                async startStream(deviceId = null) {
                    this.stopStream();
                    const constraints = {
                        video: {
                            width: { ideal: 1920 },
                            height: { ideal: 1080 },
                            frameRate: { ideal: 30 }
                        },
                        audio: true
                    };
                    if (deviceId) {
                        constraints.video.deviceId = { exact: deviceId };
                        const dev = this.devices.find(d => d.deviceId === deviceId);
                        if (dev) {
                            const label = (dev.label || '').toLowerCase();
                            this.facingMode = label.includes('back') || label.includes('rear') ||
                                label.includes('environment') ? 'environment' : 'user';
                        }
                    } else {
                        constraints.video.facingMode = this.facingMode;
                    }
                    this.stream = await navigator.mediaDevices.getUserMedia(constraints);
                    this.videoEl.srcObject = this.stream;
                    await this.videoEl.play();
                    this.updateLabel();
                },
                stopStream() {
                    if (this.stream) {
                        this.stream.getTracks().forEach(t => t.stop());
                        this.stream = null;
                        this.videoEl.srcObject = null;
                    }
                },
                async switchCamera() {
                    if (RecorderManager.isRecording && !RecorderManager.isPaused) {
                        Toast.show('Vui lòng tạm dừng trước khi đổi camera', 'warning');
                        return;
                    }
                    const wasRecording = RecorderManager.isRecording;
                    const chunks = wasRecording ? [...RecorderManager.chunks] : [];
                    if (wasRecording) RecorderManager.stopRecording(true);
                    this.facingMode = this.facingMode === 'user' ? 'environment' : 'user';
                    await this.startStream();
                    if (wasRecording) {
                        RecorderManager.chunks = chunks;
                        RecorderManager.startRecording(this.stream);
                    }
                    Toast.show(`Đã chuyển camera ${this.facingMode==='user'?'trước':'sau'}`, 'info');
                },
                updateLabel() {
                    document.getElementById('camera-label').textContent =
                        `📷 Camera ${this.facingMode==='user'?'Trước (Selfie)':'Sau (Rear)'}`;
                    document.getElementById('cam-label-header').textContent =
                        `📷 Camera ${this.facingMode==='user'?'Trước':'Sau'}`;
                },
                getStream() { return this.stream; }
            };

            // ==================== RECORDER ====================
            const RecorderManager = {
                mediaRecorder: null,
                chunks: [],
                isRecording: false,
                isPaused: false,
                startTime: 0,
                pausedDuration: 0,
                pauseStartTime: 0,
                recordedBlob: null,
                totalSize: 0,
                currentFps: 0,
                fpsCounter: 0,
                lastFpsTime: 0,
                fpsInterval: null,

                startRecording(stream) {
                    const mime = MediaRecorder.isTypeSupported('video/webm;codecs=vp9,opus') ?
                        'video/webm;codecs=vp9,opus' : 'video/webm';
                    this.mediaRecorder = new MediaRecorder(stream, { mimeType: mime, videoBitsPerSecond: 4000000 });
                    this.chunks = [];
                    this.isRecording = true;
                    this.isPaused = false;
                    this.startTime = Date.now();
                    this.pausedDuration = 0;
                    this.totalSize = 0;
                    this.recordedBlob = null;
                    this.currentFps = 0;
                    this.fpsCounter = 0;
                    this.lastFpsTime = performance.now();
                    this.mediaRecorder.ondataavailable = e => {
                        if (e.data.size > 0) {
                            this.chunks.push(e.data);
                            this.totalSize += e.data.size;
                            this.fpsCounter++;
                        }
                    };
                    this.mediaRecorder.onstop = () => {
                        if (this.chunks.length && !this._internalStop) {
                            this.recordedBlob = new Blob(this.chunks, { type: mime });
                        }
                        this._internalStop = false;
                    };
                    this.mediaRecorder.start(500);
                    document.getElementById('recording-indicator').classList.add('active');
                    document.getElementById('btn-record').classList.add('recording');
                    document.getElementById('btn-pause').style.display = '';
                    document.getElementById('btn-resume').style.display = 'none';
                    this.fpsInterval = setInterval(() => {
                        const now = performance.now();
                        const elapsed = (now - this.lastFpsTime) / 1000;
                        if (elapsed >= 1) {
                            this.currentFps = Math.round(this.fpsCounter / elapsed);
                            this.fpsCounter = 0;
                            this.lastFpsTime = now;
                        }
                    }, 1000);
                    MiniConsole.log('Recording started');
                },
                pauseRecording() {
                    if (!this.isRecording || this.isPaused) return;
                    this.mediaRecorder.pause();
                    this.isPaused = true;
                    this.pauseStartTime = Date.now();
                    document.getElementById('recording-indicator').classList.remove('active');
                    document.getElementById('btn-record').classList.remove('recording');
                    document.getElementById('btn-pause').style.display = 'none';
                    document.getElementById('btn-resume').style.display = '';
                    clearInterval(this.fpsInterval);
                },
                resumeRecording() {
                    if (!this.isRecording || !this.isPaused) return;
                    this.mediaRecorder.resume();
                    this.isPaused = false;
                    this.pausedDuration += Date.now() - this.pauseStartTime;
                    document.getElementById('recording-indicator').classList.add('active');
                    document.getElementById('btn-record').classList.add('recording');
                    document.getElementById('btn-pause').style.display = '';
                    document.getElementById('btn-resume').style.display = 'none';
                    this.lastFpsTime = performance.now();
                    this.fpsCounter = 0;
                    this.fpsInterval = setInterval(() => {
                        const now = performance.now();
                        const elapsed = (now - this.lastFpsTime) / 1000;
                        if (elapsed >= 1) {
                            this.currentFps = Math.round(this.fpsCounter / elapsed);
                            this.fpsCounter = 0;
                            this.lastFpsTime = now;
                        }
                    }, 1000);
                },
                stopRecording(internal = false) {
                    this._internalStop = internal;
                    if (this.mediaRecorder && (this.mediaRecorder.state === 'recording' || this.mediaRecorder
                            .state === 'paused')) {
                        if (this.isPaused) {
                            this.pausedDuration += Date.now() - this.pauseStartTime;
                            this.isPaused = false;
                        }
                        this.mediaRecorder.stop();
                    }
                    this.isRecording = false;
                    this.isPaused = false;
                    document.getElementById('recording-indicator').classList.remove('active');
                    document.getElementById('btn-record').classList.remove('recording');
                    document.getElementById('btn-pause').style.display = '';
                    document.getElementById('btn-resume').style.display = 'none';
                    clearInterval(this.fpsInterval);
                    if (!internal) MiniConsole.log('Recording stopped');
                },
                getElapsedSeconds() {
                    if (!this.isRecording) return 0;
                    let elapsed = Date.now() - this.startTime - this.pausedDuration;
                    if (this.isPaused) elapsed -= (Date.now() - this.pauseStartTime);
                    return Math.max(0, Math.floor(elapsed / 1000));
                },
                getBlob() {
                    return this.recordedBlob || (this.chunks.length ? new Blob(this.chunks) : null);
                },
                clearRecording() {
                    this.chunks = [];
                    this.recordedBlob = null;
                    this.totalSize = 0;
                    this.isRecording = false;
                    this.isPaused = false;
                    document.getElementById('recording-indicator').classList.remove('active');
                    document.getElementById('btn-record').classList.remove('recording');
                    document.getElementById('btn-pause').style.display = '';
                    document.getElementById('btn-resume').style.display = 'none';
                    clearInterval(this.fpsInterval);
                }
            };

            // ==================== TEXT OVERLAY ====================
            const TextOverlayManager = {
                container: document.getElementById('overlay-container'),
                wrapper: document.getElementById('camera-wrapper'),
                items: [],
                selectedId: null,
                idCounter: 0,

                addItem(text = 'New Text', x = 50, y = 50) {
                    const id = 'text-' + (++this.idCounter);
                    const item = {
                        id,
                        text,
                        x,
                        y,
                        fontSize: 36,
                        color: '#ffffff',
                        fontFamily: "'Segoe UI', sans-serif",
                        opacity: 1,
                        fontWeight: 700,
                        textAlign: 'left',
                        shadow: false,
                        glow: false,
                        bgBlur: false,
                        rotation: 0
                    };
                    this.items.push(item);
                    this.renderItem(item);
                    this.selectItem(id);
                    this.updateLayerList();
                    return item;
                },
                duplicateItem() {
                    if (!this.selectedId) return Toast.show('Chọn layer trước', 'warning');
                    const orig = this.items.find(i => i.id === this.selectedId);
                    if (!orig) return;
                    const item = this.addItem(orig.text + ' (copy)', orig.x + 30, orig.y + 30);
                    Object.assign(item, {
                        fontSize: orig.fontSize,
                        color: orig.color,
                        fontFamily: orig.fontFamily,
                        opacity: orig.opacity,
                        fontWeight: orig.fontWeight,
                        textAlign: orig.textAlign,
                        shadow: orig.shadow,
                        glow: orig.glow,
                        bgBlur: orig.bgBlur,
                        rotation: orig.rotation
                    });
                    this.updateItem(item.id);
                    this.selectItem(item.id);
                },
                deleteItem(id = null) {
                    const target = id || this.selectedId;
                    if (!target) return Toast.show('Chọn layer để xóa', 'warning');
                    document.getElementById(target)?.remove();
                    this.items = this.items.filter(i => i.id !== target);
                    if (this.selectedId === target) this.selectedId = null;
                    this.updateLayerList();
                },
                selectItem(id) {
                    document.querySelectorAll('.text-overlay-item.selected').forEach(el => el.classList.remove(
                        'selected'));
                    this.selectedId = id;
                    const el = document.getElementById(id);
                    if (el) el.classList.add('selected');
                    this.updateLayerList();
                    this.updateSidebarFromSelection();
                },
                renderItem(item) {
                    const old = document.getElementById(item.id);
                    if (old) old.remove();
                    const el = document.createElement('div');
                    el.id = item.id;
                    el.className = 'text-overlay-item';
                    el.textContent = item.text;
                    this.applyStyle(el, item);
                    const resizeHandle = document.createElement('div');
                    resizeHandle.className = 'resize-handle';
                    el.appendChild(resizeHandle);
                    const rotateHandle = document.createElement('div');
                    rotateHandle.className = 'rotate-handle';
                    rotateHandle.textContent = '↻';
                    el.appendChild(rotateHandle);
                    el.addEventListener('pointerdown', e => this.onDragStart(e, item.id));
                    resizeHandle.addEventListener('pointerdown', e => this.onResizeStart(e, item.id));
                    rotateHandle.addEventListener('pointerdown', e => this.onRotateStart(e, item.id));
                    el.addEventListener('click', e => { e.stopPropagation();
                        this.selectItem(item.id); });
                    this.container.appendChild(el);
                    if (this.selectedId === item.id) el.classList.add('selected');
                },
                applyStyle(el, item) {
                    el.style.cssText = `
                        left: ${item.x}px; top: ${item.y}px;
                        font-size: ${item.fontSize}px; color: ${item.color};
                        font-family: ${item.fontFamily}; opacity: ${item.opacity};
                        font-weight: ${item.fontWeight}; text-align: ${item.textAlign};
                        transform: rotate(${item.rotation}deg);
                        ${item.shadow ? 'text-shadow: 2px 2px 8px rgba(0,0,0,0.7);' : ''}
                        ${item.glow ? 'text-shadow: 0 0 15px ' + item.color + ', 0 0 30px ' + item.color + ';' : ''}
                        ${item.bgBlur ? 'background: rgba(0,0,0,0.35); backdrop-filter: blur(8px); -webkit-backdrop-filter: blur(8px); padding: 6px 12px; border-radius: 8px;' : ''}
                    `;
                },
                updateItem(id) {
                    const item = this.items.find(i => i.id === id);
                    if (!item) return;
                    const el = document.getElementById(id);
                    if (!el) { this.renderItem(item); return; }
                    el.textContent = item.text;
                    this.applyStyle(el, item);
                    if (this.selectedId === id) el.classList.add('selected');
                    else el.classList.remove('selected');
                },
                getItemById(id) { return this.items.find(i => i.id === id); },
                getSelectedItem() { return this.selectedId ? this.getItemById(this.selectedId) : null; },
                applyToSelected(prop, value) {
                    const item = this.getSelectedItem();
                    if (!item) return Toast.show('Chọn layer trước', 'warning');
                    item[prop] = value;
                    this.updateItem(item.id);
                },
                onDragStart(e, id) {
                    if (e.target.classList.contains('resize-handle') || e.target.classList.contains(
                        'rotate-handle')) return;
                    this.selectItem(id);
                    const item = this.getItemById(id);
                    if (!item) return;
                    const el = document.getElementById(id);
                    const rect = el.getBoundingClientRect();
                    this.dragOffset = { x: e.clientX - rect.left, y: e.clientY - rect.top };
                    this.dragItemId = id;
                    el.setPointerCapture(e.pointerId);
                    const move = ev => {
                        if (!this.dragItemId) return;
                        const wrapperRect = this.wrapper.getBoundingClientRect();
                        const nx = ev.clientX - wrapperRect.left - this.dragOffset.x;
                        const ny = ev.clientY - wrapperRect.top - this.dragOffset.y;
                        const it = this.getItemById(this.dragItemId);
                        if (it) { it.x = Math.max(0, Math.min(nx, wrapperRect.width - 50));
                            it.y = Math.max(0, Math.min(ny, wrapperRect.height - 20));
                            this.updateItem(it.id); }
                    };
                    const up = () => {
                        this.dragItemId = null;
                        el.removeEventListener('pointermove', move);
                        el.removeEventListener('pointerup', up);
                    };
                    el.addEventListener('pointermove', move);
                    el.addEventListener('pointerup', up);
                    e.preventDefault();
                },
                onResizeStart(e, id) {
                    this.selectItem(id);
                    const item = this.getItemById(id);
                    if (!item) return;
                    const el = document.getElementById(id);
                    this.resizeStart = { x: e.clientX, y: e.clientY, size: item.fontSize };
                    el.setPointerCapture(e.pointerId);
                    const move = ev => {
                        const dx = ev.clientX - this.resizeStart.x;
                        const dy = ev.clientY - this.resizeStart.y;
                        const ns = Math.max(12, Math.min(120, this.resizeStart.size + Math.max(dx, dy)));
                        const it = this.getItemById(id);
                        if (it) { it.fontSize = Math.round(ns);
                            this.updateItem(id);
                            this.updateSidebarFromSelection(); }
                    };
                    const up = () => {
                        el.removeEventListener('pointermove', move);
                        el.removeEventListener('pointerup', up);
                    };
                    el.addEventListener('pointermove', move);
                    el.addEventListener('pointerup', up);
                    e.stopPropagation();
                    e.preventDefault();
                },
                onRotateStart(e, id) {
                    this.selectItem(id);
                    const item = this.getItemById(id);
                    if (!item) return;
                    const el = document.getElementById(id);
                    const rect = el.getBoundingClientRect();
                    const cx = rect.left + rect.width / 2;
                    const cy = rect.top + rect.height / 2;
                    const startAngle = Math.atan2(e.clientY - cy, e.clientX - cx) * (180 / Math.PI);
                    this.rotateData = { id, startAngle, origRotation: item.rotation, cx, cy };
                    el.setPointerCapture(e.pointerId);
                    const move = ev => {
                        const ang = Math.atan2(ev.clientY - this.rotateData.cy, ev.clientX - this.rotateData
                            .cx) * (180 / Math.PI);
                        const it = this.getItemById(id);
                        if (it) { it.rotation = Math.round(this.rotateData.origRotation + (ang - this
                                .rotateData.startAngle)) % 360;
                            this.updateItem(id); }
                    };
                    const up = () => {
                        el.removeEventListener('pointermove', move);
                        el.removeEventListener('pointerup', up);
                    };
                    el.addEventListener('pointermove', move);
                    el.addEventListener('pointerup', up);
                    e.stopPropagation();
                    e.preventDefault();
                },
                updateLayerList() {
                    const list = document.getElementById('layer-list');
                    if (!this.items.length) {
                        list.innerHTML = '<span style="font-size:0.7rem;color:var(--text3);">Chưa có layer</span>';
                    } else {
                        list.innerHTML = this.items.map((item, idx) => `
                            <div class="layer-item ${item.id===this.selectedId?'active':''}" data-id="${item.id}">
                                <span>#${idx+1}</span>
                                <span class="layer-name">${item.text.substring(0,20)}</span>
                                <span class="layer-del" data-id="${item.id}">×</span>
                            </div>`).join('');
                        list.querySelectorAll('.layer-item').forEach(el => {
                            el.addEventListener('click', e => {
                                if (e.target.classList.contains('layer-del')) return;
                                this.selectItem(el.dataset.id);
                            });
                        });
                        list.querySelectorAll('.layer-del').forEach(el => {
                            el.addEventListener('click', e => {
                                e.stopPropagation();
                                this.deleteItem(el.dataset.id);
                            });
                        });
                    }
                },
                updateSidebarFromSelection() {
                    const item = this.getSelectedItem();
                    if (!item) return;
                    document.getElementById('text-input').value = item.text;
                    document.getElementById('font-size-slider').value = item.fontSize;
                    document.getElementById('font-size-val').textContent = item.fontSize + 'px';
                    document.getElementById('opacity-slider').value = Math.round(item.opacity * 100);
                    document.getElementById('opacity-val').textContent = Math.round(item.opacity * 100) + '%';
                    document.getElementById('weight-slider').value = item.fontWeight;
                    document.getElementById('weight-val').textContent = item.fontWeight;
                    document.getElementById('color-picker').value = item.color;
                }
            };

            // ==================== UI & Khung hình ====================
            const aspectBox = document.getElementById('aspect-box');
            const aspectSelect = document.getElementById('aspect-ratio-select');
            const mirrorToggle = document.getElementById('mirror-toggle');
            const videoEl = document.getElementById('camera-preview');

            function applyAspectRatio(ratio) {
                aspectBox.className = 'aspect-ratio-box';
                if (ratio !== 'full') aspectBox.classList.add('ratio-' + ratio);
            }

            function applyMirror(shouldMirror) {
                if (shouldMirror) videoEl.classList.add('mirror');
                else videoEl.classList.remove('mirror');
            }

            // ==================== INIT ====================
            async function init() {
                const theme = localStorage.getItem('devcam-theme') || 'dark';
                document.body.setAttribute('data-theme', theme);
                document.getElementById('theme-toggle').textContent = theme === 'dark' ? '🌙' : '☀️';

                // Camera
                try {
                    await CameraManager.init();
                } catch (e) {
                    document.getElementById('loading-screen').innerHTML =
                        '<div style="color:var(--accent3);padding:20px;">❌ Không thể truy cập camera</div>';
                    setTimeout(() => document.getElementById('loading-screen').classList.add('hidden'), 2000);
                    return;
                }

                // Khung hình & mirror mặc định
                applyAspectRatio('full');
                applyMirror(false);
                aspectSelect.addEventListener('change', e => applyAspectRatio(e.target.value));
                mirrorToggle.addEventListener('change', e => applyMirror(e.target.checked));

                // Text overlay mặc định
                TextOverlayManager.addItem('DevCam 🎬', 60, 40);

                // UI events
                document.getElementById('btn-record').onclick = () => {
                    if (RecorderManager.isRecording && !RecorderManager.isPaused) RecorderManager.stopRecording();
                    else if (RecorderManager.isRecording && RecorderManager.isPaused) RecorderManager
                    .resumeRecording();
                    else { const s = CameraManager.getStream(); if (s) RecorderManager.startRecording(s);
                        else Toast.show('Chưa có camera', 'error'); }
                };
                document.getElementById('btn-pause').onclick = () => RecorderManager.pauseRecording();
                document.getElementById('btn-resume').onclick = () => RecorderManager.resumeRecording();
                document.getElementById('btn-stop').onclick = () => RecorderManager.stopRecording();
                document.getElementById('cam-switch-btn').onclick = () => CameraManager.switchCamera();
                document.getElementById('btn-view-video').onclick = () => {
                    const blob = RecorderManager.getBlob();
                    if (!blob) return Toast.show('Chưa có video', 'warning');
                    const url = URL.createObjectURL(blob);
                    const rv = document.getElementById('review-video');
                    rv.src = url;
                    document.getElementById('review-modal').style.display = 'flex';
                };
                document.getElementById('btn-close-review').onclick = () => {
                    document.getElementById('review-modal').style.display = 'none';
                    const rv = document.getElementById('review-video');
                    if (rv.src.startsWith('blob:')) URL.revokeObjectURL(rv.src);
                    rv.src = '';
                };
                document.getElementById('btn-download').onclick = () => {
                    const blob = RecorderManager.getBlob();
                    if (!blob) return Toast.show('Chưa có video', 'warning');
                    const a = document.createElement('a');
                    a.href = URL.createObjectURL(blob);
                    a.download = `devcam_${Date.now()}.webm`;
                    a.click();
                    Toast.show('Đã tải video', 'success');
                };
                document.getElementById('btn-download-from-review').onclick = () => document.getElementById(
                    'btn-download').click();
                document.getElementById('btn-clear-video').onclick = () => {
                    RecorderManager.clearRecording();
                    document.getElementById('review-modal').style.display = 'none';
                };
                document.getElementById('theme-toggle').onclick = () => {
                    const cur = document.body.getAttribute('data-theme');
                    const next = cur === 'dark' ? 'light' : 'dark';
                    document.body.setAttribute('data-theme', next);
                    localStorage.setItem('devcam-theme', next);
                    document.getElementById('theme-toggle').textContent = next === 'dark' ? '🌙' : '☀️';
                };

                // Text events
                document.getElementById('btn-add-text').onclick = () => {
                    const txt = document.getElementById('text-input').value || 'New';
                    TextOverlayManager.addItem(txt, 100, 100);
                };
                document.getElementById('btn-duplicate-text').onclick = () => TextOverlayManager.duplicateItem();
                document.getElementById('btn-delete-text').onclick = () => TextOverlayManager.deleteItem();
                document.getElementById('text-input').oninput = e => TextOverlayManager.applyToSelected('text', e
                    .target.value);
                document.getElementById('font-size-slider').oninput = e => {
                    const v = +e.target.value;
                    document.getElementById('font-size-val').textContent = v + 'px';
                    TextOverlayManager.applyToSelected('fontSize', v);
                };
                document.getElementById('opacity-slider').oninput = e => {
                    const v = +e.target.value / 100;
                    document.getElementById('opacity-val').textContent = Math.round(v * 100) + '%';
                    TextOverlayManager.applyToSelected('opacity', v);
                };
                document.getElementById('weight-slider').oninput = e => {
                    const v = +e.target.value;
                    document.getElementById('weight-val').textContent = v;
                    TextOverlayManager.applyToSelected('fontWeight', v);
                };
                document.getElementById('color-picker').oninput = e => TextOverlayManager.applyToSelected('color',
                    e.target.value);
                document.getElementById('font-select').onchange = e => TextOverlayManager.applyToSelected(
                    'fontFamily', e.target.value);
                document.getElementById('btn-align-left').onclick = () => TextOverlayManager.applyToSelected(
                    'textAlign', 'left');
                document.getElementById('btn-align-center').onclick = () => TextOverlayManager.applyToSelected(
                    'textAlign', 'center');
                document.getElementById('btn-align-right').onclick = () => TextOverlayManager.applyToSelected(
                    'textAlign', 'right');
                document.getElementById('btn-shadow').onclick = () => {
                    const it = TextOverlayManager.getSelectedItem();
                    if (it) { it.shadow = !it.shadow;
                        TextOverlayManager.updateItem(it.id); }
                };
                document.getElementById('btn-glow').onclick = () => {
                    const it = TextOverlayManager.getSelectedItem();
                    if (it) { it.glow = !it.glow; if (it.glow) it.shadow = false;
                        TextOverlayManager.updateItem(it.id); }
                };
                document.getElementById('btn-bg-blur').onclick = () => {
                    const it = TextOverlayManager.getSelectedItem();
                    if (it) { it.bgBlur = !it.bgBlur;
                        TextOverlayManager.updateItem(it.id); }
                };
                document.getElementById('overlay-container').addEventListener('click', e => {
                    if (e.target === e.currentTarget) {
                        TextOverlayManager.selectedId = null;
                        document.querySelectorAll('.text-overlay-item.selected').forEach(el => el
                            .classList.remove('selected'));
                        TextOverlayManager.updateLayerList();
                    }
                });

                // Cập nhật dashboard
                setInterval(() => {
                    const sec = RecorderManager.getElapsedSeconds();
                    const time = `${String(Math.floor(sec/60)).padStart(2,'0')}:${String(sec%60).padStart(2,'0')}`;
                    document.getElementById('live-time').textContent = time;
                    document.getElementById('rec-time-display').textContent = time;
                    document.getElementById('live-fps').textContent = RecorderManager.currentFps;
                    const kb = RecorderManager.totalSize / 1024;
                    document.getElementById('live-size').textContent = kb > 1024 ? (kb / 1024).toFixed(1) +
                        ' MB' : kb.toFixed(1) + ' KB';
                }, 250);

                // Kết thúc loading
                document.getElementById('loading-screen').classList.add('hidden');
                document.getElementById('app-container').style.opacity = '1';
                MiniConsole.log('Sẵn sàng!');
            }

            init().catch(console.error);
        })();
    </script>
</body>
</html>
