<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
  <title>Pro Video Recorder | Dev Cinematic</title>
  <!-- Google Fonts cho các font chữ đa dạng -->
  <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&family=Cinzel:wght@400;700&family=Black+Ops+One&family=Caveat:wght@400;700&family=Orbitron:wght@400;700&family=Montserrat:wght@300;400;700&family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">
  <style>
    /* ========== CSS RESET & VARIABLES ========== */
    :root {
      --bg: #0a0a0f;
      --surface: rgba(20, 20, 35, 0.7);
      --surface-solid: #141423;
      --primary: #00f0ff;
      --primary-glow: 0 0 15px rgba(0, 240, 255, 0.5);
      --secondary: #b266ff;
      --accent: #ff2d55;
      --text: #e0e0f0;
      --text-secondary: #a0a0c0;
      --border: rgba(255, 255, 255, 0.1);
      --glass-bg: rgba(15, 15, 30, 0.65);
      --glass-border: rgba(255, 255, 255, 0.15);
      --neon-glow: 0 0 20px rgba(0, 240, 255, 0.4), 0 0 60px rgba(0, 240, 255, 0.15);
      --shadow-lg: 0 20px 50px rgba(0, 0, 0, 0.5);
      --radius: 16px;
      --radius-sm: 10px;
      --transition: 0.3s cubic-bezier(0.4, 0, 0.2, 1);
      --font-mono: 'JetBrains Mono', 'Courier New', monospace;
    }

    .light-mode {
      --bg: #f0f2f8;
      --surface: rgba(255, 255, 255, 0.75);
      --surface-solid: #ffffff;
      --primary: #0077cc;
      --primary-glow: 0 0 20px rgba(0, 119, 204, 0.3);
      --secondary: #7c3aed;
      --accent: #e11d48;
      --text: #1a1a2e;
      --text-secondary: #555577;
      --border: rgba(0, 0, 0, 0.12);
      --glass-bg: rgba(255, 255, 255, 0.7);
      --glass-border: rgba(0, 0, 0, 0.15);
      --neon-glow: 0 0 20px rgba(0, 119, 204, 0.25), 0 0 50px rgba(0, 119, 204, 0.1);
      --shadow-lg: 0 20px 50px rgba(0, 0, 0, 0.15);
    }

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    html {
      font-size: 16px;
      scroll-behavior: smooth;
    }
    body {
      font-family: 'Inter', 'Segoe UI', sans-serif;
      background: var(--bg);
      color: var(--text);
      overflow: hidden;
      height: 100vh;
      width: 100vw;
      user-select: none;
      -webkit-tap-highlight-color: transparent;
      transition: background var(--transition), color var(--transition);
    }

    /* Custom Scrollbar */
    ::-webkit-scrollbar {
      width: 5px;
    }
    ::-webkit-scrollbar-track {
      background: transparent;
    }
    ::-webkit-scrollbar-thumb {
      background: var(--primary);
      border-radius: 10px;
      opacity: 0.6;
    }

    /* ========== LOADING SCREEN ========== */
    #loadingScreen {
      position: fixed;
      inset: 0;
      z-index: 10000;
      background: var(--bg);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      transition: opacity 0.4s, visibility 0.4s;
    }
    #loadingScreen.hidden {
      opacity: 0;
      visibility: hidden;
      pointer-events: none;
    }
    .loader-ring {
      width: 80px;
      height: 80px;
      border-radius: 50%;
      border: 3px solid transparent;
      border-top-color: var(--primary);
      border-right-color: var(--secondary);
      animation: spin 1.2s linear infinite;
      box-shadow: var(--neon-glow);
    }
    @keyframes spin {
      to {
        transform: rotate(360deg);
      }
    }
    .loading-text {
      margin-top: 20px;
      font-family: 'Orbitron', sans-serif;
      font-size: 1.2rem;
      color: var(--primary);
      letter-spacing: 2px;
      text-shadow: var(--neon-glow);
    }

    /* ========== MAIN LAYOUT ========== */
    #appContainer {
      display: flex;
      height: 100vh;
      width: 100vw;
      position: relative;
    }

    /* Sidebar */
    #sidebar {
      width: 300px;
      min-width: 300px;
      background: var(--glass-bg);
      backdrop-filter: blur(25px);
      -webkit-backdrop-filter: blur(25px);
      border-right: 1px solid var(--glass-border);
      display: flex;
      flex-direction: column;
      z-index: 50;
      transition: transform var(--transition);
      box-shadow: var(--shadow-lg);
      border-radius: 0 var(--radius) var(--radius) 0;
      overflow-y: auto;
      overflow-x: hidden;
    }
    @media (max-width: 768px) {
      #sidebar {
        position: fixed;
        right: 0;
        top: 0;
        bottom: 0;
        transform: translateX(100%);
        width: 280px;
        min-width: 280px;
        border-radius: var(--radius) 0 0 var(--radius);
        z-index: 200;
      }
      #sidebar.open {
        transform: translateX(0);
      }
      #mobileSidebarToggle {
        display: flex !important;
      }
    }
    #mobileSidebarToggle {
      display: none;
      position: fixed;
      bottom: 110px;
      right: 20px;
      z-index: 150;
      width: 50px;
      height: 50px;
      border-radius: 50%;
      background: var(--surface);
      backdrop-filter: blur(20px);
      border: 1px solid var(--border);
      color: var(--primary);
      font-size: 1.5rem;
      cursor: pointer;
      align-items: center;
      justify-content: center;
      box-shadow: var(--neon-glow);
    }

    /* Sidebar Header */
    .sidebar-header {
      padding: 20px;
      border-bottom: 1px solid var(--border);
      font-family: 'Orbitron', sans-serif;
      font-size: 0.9rem;
      color: var(--primary);
      letter-spacing: 2px;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }
    .sidebar-section {
      padding: 15px 20px;
      border-bottom: 1px solid var(--border);
    }
    .section-title {
      font-size: 0.7rem;
      text-transform: uppercase;
      letter-spacing: 2px;
      color: var(--text-secondary);
      margin-bottom: 10px;
      font-family: 'Orbitron', sans-serif;
    }

    /* Layer Manager */
    .layer-item {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 8px 12px;
      margin: 4px 0;
      background: rgba(255, 255, 255, 0.03);
      border-radius: 8px;
      border: 1px solid transparent;
      cursor: pointer;
      transition: all var(--transition);
      font-size: 0.8rem;
    }
    .layer-item:hover {
      background: rgba(255, 255, 255, 0.06);
      border-color: var(--border);
    }
    .layer-item.selected {
      border-color: var(--primary);
      box-shadow: 0 0 10px rgba(0, 240, 255, 0.2);
    }
    .layer-item .layer-actions {
      margin-left: auto;
      display: flex;
      gap: 5px;
    }
    .layer-item button {
      background: transparent;
      border: none;
      color: var(--text-secondary);
      cursor: pointer;
      font-size: 0.75rem;
      padding: 2px 5px;
      border-radius: 4px;
    }
    .layer-item button:hover {
      color: var(--primary);
      background: rgba(0, 240, 255, 0.1);
    }

    /* Main Preview Area */
    #mainArea {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      position: relative;
      overflow: hidden;
    }
    #previewContainer {
      position: relative;
      display: flex;
      align-items: center;
      justify-content: center;
      background: #000;
      border-radius: var(--radius);
      overflow: hidden;
      box-shadow: var(--shadow-lg), var(--neon-glow);
      transition: all var(--transition);
      max-width: 90vw;
      max-height: 70vh;
    }
    #previewCanvas {
      display: block;
      width: 100%;
      height: 100%;
      object-fit: contain;
    }
    #overlayLayer {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      pointer-events: none;
      z-index: 10;
    }
    /* Text objects inside overlay */
    .text-object {
      position: absolute;
      cursor: move;
      pointer-events: auto;
      font-family: 'Montserrat', sans-serif;
      white-space: pre-wrap;
      word-break: break-word;
      text-shadow: inherit;
      transition: box-shadow 0.15s;
      line-height: 1.2;
      transform-origin: center;
    }
    .text-object.selected {
      outline: 2px dashed var(--primary);
      outline-offset: 4px;
      box-shadow: 0 0 25px rgba(0, 240, 255, 0.6);
    }
    .text-object .resize-handle {
      position: absolute;
      width: 14px;
      height: 14px;
      background: var(--primary);
      border-radius: 50%;
      border: 2px solid #000;
      pointer-events: auto;
      z-index: 20;
      cursor: nwse-resize;
      box-shadow: 0 0 8px var(--primary);
      bottom: -7px;
      right: -7px;
    }
    .text-object .rotate-handle {
      position: absolute;
      width: 20px;
      height: 20px;
      background: var(--secondary);
      border-radius: 50%;
      border: 2px solid #000;
      pointer-events: auto;
      z-index: 20;
      cursor: grab;
      box-shadow: 0 0 8px var(--secondary);
      top: -25px;
      left: 50%;
      transform: translateX(-50%);
    }
    .text-object .rotate-handle:active {
      cursor: grabbing;
    }

    /* Header */
    #header {
      position: absolute;
      top: 0;
      left: 0;
      right: 0;
      z-index: 60;
      padding: 12px 20px;
      background: var(--glass-bg);
      backdrop-filter: blur(30px);
      -webkit-backdrop-filter: blur(30px);
      border-bottom: 1px solid var(--glass-border);
      display: flex;
      align-items: center;
      gap: 10px;
      flex-wrap: wrap;
      box-shadow: 0 5px 30px rgba(0, 0, 0, 0.3);
    }
    .header-btn {
      background: rgba(255, 255, 255, 0.05);
      border: 1px solid var(--border);
      color: var(--text);
      padding: 8px 14px;
      border-radius: 25px;
      font-size: 0.8rem;
      cursor: pointer;
      transition: all var(--transition);
      backdrop-filter: blur(10px);
      font-family: 'Inter', sans-serif;
      white-space: nowrap;
      letter-spacing: 0.5px;
      display: flex;
      align-items: center;
      gap: 6px;
    }
    .header-btn:hover {
      background: rgba(0, 240, 255, 0.1);
      border-color: var(--primary);
      color: var(--primary);
      box-shadow: 0 0 15px rgba(0, 240, 255, 0.2);
    }
    .header-btn.active {
      background: var(--primary);
      color: #000;
      border-color: var(--primary);
      font-weight: 600;
      box-shadow: var(--neon-glow);
    }
    @media (max-width: 600px) {
      #header {
        padding: 8px 10px;
        gap: 6px;
      }
      .header-btn {
        padding: 6px 10px;
        font-size: 0.7rem;
      }
    }

    /* Bottom Control Bar */
    #controlBar {
      position: absolute;
      bottom: 20px;
      left: 50%;
      transform: translateX(-50%);
      z-index: 60;
      background: var(--glass-bg);
      backdrop-filter: blur(30px);
      -webkit-backdrop-filter: blur(30px);
      border: 1px solid var(--glass-border);
      border-radius: 50px;
      padding: 8px 16px;
      display: flex;
      align-items: center;
      gap: 10px;
      flex-wrap: wrap;
      box-shadow: var(--shadow-lg);
    }
    .ctrl-btn {
      width: 44px;
      height: 44px;
      border-radius: 50%;
      background: rgba(255, 255, 255, 0.05);
      border: 1px solid var(--border);
      color: var(--text);
      font-size: 1.2rem;
      cursor: pointer;
      transition: all var(--transition);
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .ctrl-btn:hover {
      background: rgba(0, 240, 255, 0.1);
      border-color: var(--primary);
      color: var(--primary);
      box-shadow: 0 0 12px rgba(0, 240, 255, 0.3);
    }
    .ctrl-btn.rec {
      background: var(--accent);
      border-color: var(--accent);
      color: #fff;
      animation: pulse-rec 1.5s infinite;
      box-shadow: 0 0 25px rgba(255, 45, 85, 0.6);
    }
    @keyframes pulse-rec {
      0%,
      100% {
        box-shadow: 0 0 15px rgba(255, 45, 85, 0.5);
      }
      50% {
        box-shadow: 0 0 35px rgba(255, 45, 85, 0.9);
      }
    }
    .rec-indicator {
      width: 12px;
      height: 12px;
      border-radius: 50%;
      background: #ff2d55;
      animation: blink 0.8s infinite;
      margin-right: 6px;
    }
    @keyframes blink {
      0%,
      100% {
        opacity: 1;
      }
      50% {
        opacity: 0.2;
      }
    }
    .status-badge {
      font-size: 0.75rem;
      color: var(--text-secondary);
      font-family: var(--font-mono);
      background: rgba(0, 0, 0, 0.3);
      padding: 4px 10px;
      border-radius: 20px;
    }

    /* Toast */
    #toastContainer {
      position: fixed;
      top: 20px;
      right: 20px;
      z-index: 5000;
      display: flex;
      flex-direction: column;
      gap: 8px;
    }
    .toast {
      background: var(--surface);
      backdrop-filter: blur(20px);
      border: 1px solid var(--border);
      padding: 12px 20px;
      border-radius: 30px;
      font-size: 0.85rem;
      color: var(--text);
      box-shadow: var(--shadow-lg);
      animation: slideIn 0.3s ease-out;
      font-family: 'Inter', sans-serif;
    }
    @keyframes slideIn {
      from {
        transform: translateX(100%);
        opacity: 0;
      }
      to {
        transform: translateX(0);
        opacity: 1;
      }
    }

    /* Fake Dev Console */
    #devConsole {
      position: fixed;
      bottom: 10px;
      left: 10px;
      z-index: 4000;
      background: rgba(0, 0, 0, 0.8);
      border: 1px solid rgba(0, 240, 255, 0.3);
      border-radius: 8px;
      padding: 8px 12px;
      font-family: var(--font-mono);
      font-size: 0.65rem;
      color: #00ff88;
      max-width: 280px;
      pointer-events: none;
      opacity: 0.8;
      backdrop-filter: blur(10px);
      display: flex;
      flex-direction: column;
      gap: 2px;
    }
    .console-line {
      opacity: 0.8;
      animation: fadeInLine 0.5s;
    }
    @keyframes fadeInLine {
      from {
        opacity: 0;
        transform: translateY(5px);
      }
      to {
        opacity: 0.8;
        transform: translateY(0);
      }
    }

    /* Modal */
    .modal-overlay {
      position: fixed;
      inset: 0;
      background: rgba(0, 0, 0, 0.7);
      z-index: 3000;
      display: flex;
      align-items: center;
      justify-content: center;
      backdrop-filter: blur(5px);
    }
    .modal-content {
      background: var(--surface-solid);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 25px;
      box-shadow: var(--shadow-lg), var(--neon-glow);
      max-width: 500px;
      width: 90%;
      color: var(--text);
    }

    /* Progress bar */
    .progress-bar {
      height: 6px;
      background: rgba(255, 255, 255, 0.1);
      border-radius: 10px;
      overflow: hidden;
      margin: 10px 0;
    }
    .progress-fill {
      height: 100%;
      background: var(--primary);
      border-radius: 10px;
      transition: width 0.3s;
      box-shadow: 0 0 10px var(--primary);
    }

    /* Dropdown */
    select {
      background: rgba(0, 0, 0, 0.4);
      color: var(--text);
      border: 1px solid var(--border);
      padding: 6px 12px;
      border-radius: 20px;
      font-size: 0.8rem;
      cursor: pointer;
      backdrop-filter: blur(10px);
      font-family: 'Inter', sans-serif;
    }
    select option {
      background: #1a1a2e;
      color: #fff;
    }

    /* Text editor inputs */
    .input-group {
      display: flex;
      flex-direction: column;
      gap: 4px;
      margin-bottom: 8px;
    }
    .input-group label {
      font-size: 0.7rem;
      text-transform: uppercase;
      color: var(--text-secondary);
      letter-spacing: 1px;
    }
    .input-group input[type="text"],
    .input-group input[type="number"],
    .input-group input[type="color"],
    .input-group input[type="range"] {
      background: rgba(0, 0, 0, 0.3);
      border: 1px solid var(--border);
      color: var(--text);
      padding: 6px 10px;
      border-radius: 8px;
      font-size: 0.8rem;
    }
    .input-group input[type="color"] {
      width: 40px;
      height: 30px;
      padding: 2px;
    }

    /* Neon Glow effect for selected */
    .glow-neon {
      box-shadow: 0 0 20px rgba(0, 240, 255, 0.5), 0 0 50px rgba(0, 240, 255, 0.2);
      border-color: var(--primary);
    }
  </style>
</head>
<body>
  <!-- Loading Screen -->
  <div id="loadingScreen">
    <div class="loader-ring"></div>
    <div class="loading-text">INITIALIZING PRO RECORDER</div>
  </div>

  <!-- Toast Container -->
  <div id="toastContainer"></div>

  <!-- Fake Dev Console -->
  <div id="devConsole">
    <div class="console-line">> system init...</div>
    <div class="console-line">> camera module: pending</div>
    <div class="console-line">> overlay engine: ready</div>
  </div>

  <!-- Mobile Sidebar Toggle -->
  <button id="mobileSidebarToggle" title="Editor">☰</button>

  <!-- Main App Container -->
  <div id="appContainer">
    <!-- Sidebar -->
    <div id="sidebar">
      <div class="sidebar-header">
        <span>⚡ EDITOR</span>
        <button id="closeSidebarBtn" style="background:none;border:none;color:var(--text);font-size:1.2rem;cursor:pointer;">✕</button>
      </div>
      <!-- Layer Manager -->
      <div class="sidebar-section">
        <div class="section-title">📐 Layers</div>
        <div id="layerList">
          <div style="color:var(--text-secondary);font-size:0.7rem;padding:8px;">Chưa có object nào</div>
        </div>
        <button class="header-btn" id="addTextBtn" style="margin-top:8px;width:100%;justify-content:center;">+ Thêm Text</button>
      </div>
      <!-- Text Editor -->
      <div class="sidebar-section" id="textEditorPanel" style="display:none;">
        <div class="section-title">✎ Edit Text</div>
        <div class="input-group">
          <label>Nội dung</label>
          <input type="text" id="textContentInput" placeholder="Nhập text...">
        </div>
        <div style="display:flex;gap:6px;flex-wrap:wrap;">
          <button class="header-btn" id="pasteTextBtn" style="font-size:0.7rem;">📋 Paste</button>
          <button class="header-btn" id="duplicateTextBtn" style="font-size:0.7rem;">⧉ Nhân bản</button>
          <button class="header-btn" id="deleteTextBtn" style="font-size:0.7rem;color:var(--accent);">🗑 Xoá</button>
        </div>
        <div class="input-group" style="margin-top:8px;">
          <label>Font</label>
          <select id="fontSelect">
            <option value="Montserrat">Modern (Montserrat)</option>
            <option value="Press Start 2P">Dev (Press Start)</option>
            <option value="Cinzel">Cinematic (Cinzel)</option>
            <option value="Black Ops One">Bold (Black Ops)</option>
            <option value="Caveat">Handwriting (Caveat)</option>
            <option value="Orbitron">Futuristic (Orbitron)</option>
          </select>
        </div>
        <div style="display:flex;gap:8px;flex-wrap:wrap;">
          <div class="input-group" style="flex:1;">
            <label>Size</label>
            <input type="range" id="fontSizeSlider" min="12" max="120" value="28">
            <span id="fontSizeValue" style="font-size:0.7rem;">28px</span>
          </div>
          <div class="input-group" style="flex:1;">
            <label>Màu</label>
            <input type="color" id="colorPicker" value="#ffffff">
          </div>
        </div>
        <div style="display:flex;gap:8px;flex-wrap:wrap;">
          <div class="input-group" style="flex:1;">
            <label>Opacity</label>
            <input type="range" id="opacitySlider" min="0.1" max="1" step="0.05" value="1">
          </div>
          <div class="input-group" style="flex:1;">
            <label>Độ đậm</label>
            <select id="weightSelect">
              <option value="300">Light</option>
              <option value="400" selected>Regular</option>
              <option value="600">Semi-Bold</option>
              <option value="700">Bold</option>
            </select>
          </div>
        </div>
        <div style="display:flex;gap:8px;flex-wrap:wrap;">
          <div class="input-group" style="flex:1;">
            <label>Shadow</label>
            <input type="range" id="shadowSlider" min="0" max="30" value="0">
          </div>
          <div class="input-group" style="flex:1;">
            <label>Glow</label>
            <input type="range" id="glowSlider" min="0" max="30" value="0">
          </div>
        </div>
        <div style="display:flex;gap:8px;flex-wrap:wrap;">
          <div class="input-group" style="flex:1;">
            <label>Spacing chữ</label>
            <input type="range" id="letterSpacingSlider" min="-2" max="15" value="0" step="0.5">
          </div>
          <div class="input-group" style="flex:1;">
            <label>Căn lề</label>
            <select id="alignSelect">
              <option value="left">Trái</option>
              <option value="center">Giữa</option>
              <option value="right">Phải</option>
            </select>
          </div>
        </div>
        <button class="header-btn" id="uppercaseToggle" style="width:100%;margin-top:4px;">Aa ⇄ AA (Viết hoa)</button>
      </div>
      <!-- Overlay Frames -->
      <div class="sidebar-section">
        <div class="section-title">🖼 Overlay Khung</div>
        <select id="frameSelect" style="width:100%;">
          <option value="none">Không khung</option>
          <option value="cinematic">Cinematic (21:9 bars)</option>
          <option value="neon">Neon Border</option>
          <option value="minimal">Minimal Line</option>
          <option value="livestream">Livestream (đỏ + chat)</option>
        </select>
      </div>
      <!-- Undo/Redo -->
      <div class="sidebar-section">
        <div class="section-title">↩ History</div>
        <div style="display:flex;gap:6px;">
          <button class="header-btn" id="undoBtn" style="flex:1;">↩ Undo</button>
          <button class="header-btn" id="redoBtn" style="flex:1;">↪ Redo</button>
        </div>

    <!-- Main Preview Area -->
    <div id="mainArea">
      <div id="previewContainer" style="aspect-ratio:16/9; width:100%; max-width:800px;">

      <option value="16:9">16:9</option>
      <option value="3:4">3:4</option>
      <option value="1:1">1:1</option>
    </select>
    <button class="header-btn" id="themeToggle">🌓 Theme</button>
    <button class="header-btn" id="sidebarToggleBtn">☰ Editor</button>

  <!-- Bottom Control Bar -->
  <div id="controlBar">
    <span class="rec-indicator" id="recIndicator" style="display:none;"></span>
    <span class="status-badge" id="timerDisplay">00:00</span>

    <span class="status-badge" id="sizeDisplay">0 MB</span>

    <button class="ctrl-btn" id="pauseRecordBtn" title="Tạm dừng">⏸</button>
    <button class="ctrl-btn" id="resumeRecordBtn" title="Tiếp tục">▶</button>
    <button class="ctrl-btn" id="stopRecordBtn" title="Dừng quay">⏹</button>
    <button class="ctrl-btn" id="downloadBtn" title="Tải video">⬇</button>
    <button class="ctrl-btn" id="deleteVideoBtn" title="Xoá video">🗑</button>
    <button class="ctrl-btn" id="playPreviewBtn" title="Xem lại">👁</button>
  </div>

  <!-- Video Player Modal -->
  <div id="playerModal" class="modal-overlay" style="display:none;">
    <div class="modal-content" style="max-width:700px;">
      <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:15px;">
        <h3 style="font-family:'Orbitron';color:var(--primary);">Video Preview</h3>
        <button id="closePlayerBtn" style="background:none;border:none;color:var(--text);font-size:1.5rem;cursor:pointer;">✕</button>
      </div>
      <video id="previewVideo" controls style="width:100%;border-radius:10px;"></video>
      <div style="margin-top:10px;display:flex;gap:10px;">
        <button class="header-btn" id="fullscreenVideoBtn">📺 Fullscreen</button>
      </div>
    </div>
  </div>

  <!-- Export Progress Modal -->
  <div id="exportModal" class="modal-overlay" style="display:none;">
    <div class="modal-content" style="text-align:center;">
      <div class="loader-ring" style="margin:0 auto 20px;"></div>
      <h3 style="font-family:'Orbitron';color:var(--primary);">Đang xuất video...</h3>
      <div class="progress-bar"><div id="exportProgressFill" class="progress-fill" style="width:0%;"></div></div>
      <p id="exportStatus" style="font-size:0.8rem;color:var(--text-secondary);">0%</p>
    </div>
  </div>

  <script>
    (function() {
      // ==================== MODULE: Dev Console ====================
      const devConsole = document.getElementById('devConsole');
      function logToConsole(msg) {
        const line = document.createElement('div');
        line.className = 'console-line';
        line.textContent = `> ${msg}`;
        devConsole.appendChild(line);
        if (devConsole.children.length > 8) devConsole.removeChild(devConsole.firstChild);
        devConsole.scrollTop = devConsole.scrollHeight;
      }
      logToConsole('App booting...');

      // ==================== MODULE: Toast Notification ====================
      function showToast(msg, duration = 2500) {
        const container = document.getElementById('toastContainer');
        const toast = document.createElement('div');
        toast.className = 'toast';
        toast.textContent = msg;
        container.appendChild(toast);
        setTimeout(() => {
          toast.style.opacity = '0';
          toast.style.transform = 'translateX(100%)';
          toast.style.transition = '0.3s';
          setTimeout(() => toast.remove(), 300);
        }, duration);
      }

      // ==================== MODULE: Theme ====================
      const themeToggle = document.getElementById('themeToggle');
      let isDark = true;
      themeToggle.addEventListener('click', () => {
        isDark = !isDark;
        document.body.classList.toggle('light-mode', !isDark);
        themeToggle.textContent = isDark ? '🌓 Theme' : '☀️ Theme';
        showToast(isDark ? 'Dark Mode' : 'Light Mode');
        logToConsole(`Theme: ${isDark ? 'dark' : 'light'}`);
      });

      // ==================== MODULE: Undo/Redo Manager ====================
      class UndoManager {
        constructor() {
          this.undoStack = [];
          this.redoStack = [];
          this.maxSteps = 50;
        }
        saveState(state) {
          this.undoStack.push(JSON.parse(JSON.stringify(state)));
          if (this.undoStack.length > this.maxSteps) this.undoStack.shift();
          this.redoStack = [];
        }
        undo(currentStateProvider) {
          if (this.undoStack.length === 0) return null;
          const current = currentStateProvider();
          this.redoStack.push(JSON.parse(JSON.stringify(current)));
          return this.undoStack.pop();
        }
        redo(currentStateProvider) {
          if (this.redoStack.length === 0) return null;
          const current = currentStateProvider();
          this.undoStack.push(JSON.parse(JSON.stringify(current)));
          return this.redoStack.pop();
        }
        clear() {
          this.undoStack = [];
          this.redoStack = [];
        }
      }
      const undoManager = new UndoManager();

      // ==================== MODULE: Text Objects State ====================
      let textObjects = []; // { id, text, x, y, width, height, rotation, font, size, color, opacity, shadow, glow, letterSpacing, fontWeight, align, uppercase, visible, locked }
      let selectedTextId = null;
      let objectIdCounter = 0;

      function getTextObjectsState() {
        return textObjects.map(obj => ({ ...obj }));
      }
      function restoreTextObjectsState(state) {
        textObjects = state.map(obj => ({ ...obj }));
        renderAllTextObjects();
        updateLayerList();
      }
      function saveUndoState() {
        undoManager.saveState(getTextObjectsState());
      }

      // ==================== MODULE: Camera & Canvas ====================
      const previewCanvas = document.getElementById('previewCanvas');
      const ctx = previewCanvas.getContext('2d');
      const previewContainer = document.getElementById('previewContainer');
      const overlayLayer = document.getElementById('overlayLayer');
      const frameOverlay = document.getElementById('frameOverlay');

      let currentStream = null;
      let videoElement = document.createElement('video');
      videoElement.autoplay = true;
      videoElement.playsInline = true;
      videoElement.muted = true;
      let facingMode = 'user'; // 'user' (trước) hoặc 'environment' (sau)
      let currentRatio = '16:9';
      let orientation = 'landscape'; // 'landscape' hoặc 'portrait'
      let isMirroring = (facingMode === 'user'); // camera trước cần mirror preview

      // Tỉ lệ khung hình map
      const ratioMap = {
        '16:9': { w: 16, h: 9 },
        '3:4': { w: 3, h: 4 },
        '1:1': { w: 1, h: 1 }
      };

      function updatePreviewContainerSize() {
        const ratio = ratioMap[currentRatio];
        let containerWidth, containerHeight;
        const maxWidth = Math.min(window.innerWidth * 0.9, 800);
        const maxHeight = window.innerHeight * 0.7;
        if (orientation === 'portrait') {
          // Dọc: hoán đổi w/h
          containerHeight = Math.min(maxHeight, maxWidth * (ratio.h / ratio.w));
          containerWidth = containerHeight * (ratio.w / ratio.h);
        } else {
          containerWidth = Math.min(maxWidth, maxHeight * (ratio.w / ratio.h));
          containerHeight = containerWidth * (ratio.h / ratio.w);
        }
        previewContainer.style.width = containerWidth + 'px';
        previewContainer.style.height = containerHeight + 'px';
        previewContainer.style.aspectRatio = `${ratio.w}/${ratio.h}`;
        // Cập nhật canvas
        previewCanvas.width = containerWidth;
        previewCanvas.height = containerHeight;
        overlayLayer.style.width = containerWidth + 'px';
        overlayLayer.style.height = containerHeight + 'px';
      }

      async function startCamera() {
        if (currentStream) {
          currentStream.getTracks().forEach(track => track.stop());
        }
        const constraints = {
          video: {
            facingMode: facingMode,
            width: { ideal: 1920 },
            height: { ideal: 1080 },
          },
          audio: true
        };
        try {
          currentStream = await navigator.mediaDevices.getUserMedia(constraints);
          videoElement.srcObject = currentStream;
          await videoElement.play();
          isMirroring = (facingMode === 'user');
          logToConsole(`Camera: ${facingMode}, mirror=${isMirroring}`);
          showToast(`Camera ${facingMode === 'user' ? 'trước' : 'sau'} đã sẵn sàng`);
          updatePreviewContainerSize();
          requestAnimationFrame(drawFrame);
        } catch (err) {
          console.error('Camera error:', err);
          showToast('Không thể truy cập camera');
          logToConsole('Camera error: ' + err.message);
        }
      }

      function drawFrame() {
        if (!currentStream || videoElement.readyState < 2) {
          requestAnimationFrame(drawFrame);
          return;
        }
        const cw = previewCanvas.width;
        const ch = previewCanvas.height;
        ctx.clearRect(0, 0, cw, ch);
        ctx.save();
        // Nếu camera trước, mirror preview
        if (isMirroring) {
          ctx.translate(cw, 0);
          ctx.scale(-1, 1);
        }
        // Vẽ video lấp đầy canvas (crop giữa)
        const vw = videoElement.videoWidth;
        const vh = videoElement.videoHeight;
        if (vw && vh) {
          const scale = Math.max(cw / vw, ch / vh);
          const sw = cw / scale;
          const sh = ch / scale;
          const sx = (vw - sw) / 2;
          const sy = (vh - sh) / 2;
          ctx.drawImage(videoElement, sx, sy, sw, sh, 0, 0, cw, ch);
        }
        ctx.restore();
        requestAnimationFrame(drawFrame);
      }

      // Đổi camera
      document.getElementById('switchCameraBtn').addEventListener('click', () => {
        facingMode = facingMode === 'user' ? 'environment' : 'user';
        startCamera();
      });

      // Đổi orientation
      document.getElementById('orientationBtn').addEventListener('click', () => {
        orientation = orientation === 'landscape' ? 'portrait' : 'landscape';
        updatePreviewContainerSize();
        showToast(orientation === 'portrait' ? 'Chế độ dọc' : 'Chế độ ngang');
      });

      // Đổi tỉ lệ
      document.getElementById('ratioSelect').addEventListener('change', (e) => {
        currentRatio = e.target.value;
        updatePreviewContainerSize();
        showToast(`Tỉ lệ ${currentRatio}`);
        // Animation mượt
        previewContainer.style.transition = 'width 0.4s ease, height 0.4s ease';
        setTimeout(() => { previewContainer.style.transition = ''; }, 400);
      });

      // ==================== MODULE: MediaRecorder ====================
      let mediaRecorder = null;
      let recordedChunks = [];
      let recordingStartTime = 0;
      let recordingTimerInterval = null;
      let isPaused = false;
      let totalPausedDuration = 0;
      let pauseStartTime = 0;
      let lastRecordedBlob = null;
      let exportQuality = 'hd'; // 'hd' hoặc 'fhd'

      const timerDisplay = document.getElementById('timerDisplay');
      const fpsDisplay = document.getElementById('fpsDisplay');
      const sizeDisplay = document.getElementById('sizeDisplay');
      const recIndicator = document.getElementById('recIndicator');
      const startRecordBtn = document.getElementById('startRecordBtn');
      const pauseRecordBtn = document.getElementById('pauseRecordBtn');
      const resumeRecordBtn = document.getElementById('resumeRecordBtn');
      const stopRecordBtn = document.getElementById('stopRecordBtn');
      const downloadBtn = document.getElementById('downloadBtn');
      const deleteVideoBtn = document.getElementById('deleteVideoBtn');
      const playPreviewBtn = document.getElementById('playPreviewBtn');

      function updateRecordingUI() {
        if (!mediaRecord || mediaRecorder.state === 'inactive') {
          recIndicator.style.display = 'none';
          startRecordBtn.style.display = '';
          pauseRecordBtn.style.display = 'none';
          resumeRecordBtn.style.display = 'none';
          stopRecordBtn.style.display = 'none';
          clearInterval(recordingTimerInterval);
        } else if (mediaRecorder.state === 'recording' && !isPaused) {
          recIndicator.style.display = 'inline-block';
          startRecordBtn.style.display = 'none';
          pauseRecordBtn.style.display = '';
          resumeRecordBtn.style.display = 'none';
          stopRecordBtn.style.display = '';
        } else if (isPaused) {
          recIndicator.style.display = 'none';
          startRecordBtn.style.display = 'none';
          pauseRecordBtn.style.display = 'none';
          resumeRecordBtn.style.display = '';
          stopRecordBtn.style.display = '';
        }
      }

      function formatTime(seconds) {
        const m = Math.floor(seconds / 60);
        const s = Math.floor(seconds % 60);
        return `${m.toString().padStart(2,'0')}:${s.toString().padStart(2,'0')}`;
      }

      function updateTimer() {
        if (!mediaRecord || mediaRecorder.state === 'inactive' || isPaused) return;
        const elapsed = (Date.now() - recordingStartTime - totalPausedDuration) / 1000;
        timerDisplay.textContent = formatTime(elapsed);
        // Size
        const totalBits = recordedChunks.reduce((sum, chunk) => sum + chunk.size, 0);
        const mb = (totalBits / (1024 * 1024)).toFixed(2);
        sizeDisplay.textContent = mb + ' MB';
        // FPS estimate (không chính xác tuyệt đối)
        fpsDisplay.textContent = 'FPS: ~30';
      }

      async function startRecording() {
        if (!currentStream) {
          showToast('Chưa có camera');
          return;
        }
        recordedChunks = [];
        totalPausedDuration = 0;
        isPaused = false;
        // Tạo stream từ canvas để crop theo tỉ lệ? Ta sẽ ghi trực tiếp từ camera stream.
        // Để video export không có text overlay, ta ghi stream gốc, không qua canvas overlay.
        const mimeType = MediaRecorder.isTypeSupported('video/webm;codecs=vp9') ? 'video/webm;codecs=vp9' : 'video/webm';
        mediaRecorder = new MediaRecorder(currentStream, { mimeType, videoBitsPerSecond: 5000000 });
        mediaRecorder.ondataavailable = (e) => {
          if (e.data.size > 0) recordedChunks.push(e.data);
        };
        mediaRecorder.onstop = () => {
          const blob = new Blob(recordedChunks, { type: 'video/webm' });
          lastRecordedBlob = blob;
          updateRecordingUI();
          showToast('Đã dừng quay');
          logToConsole('Recording stopped');
          clearInterval(recordingTimerInterval);
        };
        mediaRecorder.start(1000);
        recordingStartTime = Date.now();
        recordingTimerInterval = setInterval(updateTimer, 200);
        updateRecordingUI();
        showToast('Bắt đầu quay');
        logToConsole('Recording started');
      }

      function pauseRecording() {
        if (mediaRecorder && mediaRecorder.state === 'recording' && !isPaused) {
          mediaRecorder.pause();
          isPaused = true;
          pauseStartTime = Date.now();
          updateRecordingUI();
          showToast('Tạm dừng quay');
        }
      }

      function resumeRecording() {
        if (mediaRecorder && isPaused) {
          mediaRecorder.resume();
          totalPausedDuration += (Date.now() - pauseStartTime);
          isPaused = false;
          updateRecordingUI();
          showToast('Tiếp tục quay');
        }
      }

      function stopRecording() {
        if (mediaRecorder && mediaRecorder.state !== 'inactive') {
          mediaRecorder.stop();
        }
      }

      startRecordBtn.addEventListener('click', startRecording);
      pauseRecordBtn.addEventListener('click', pauseRecording);
      resumeRecordBtn.addEventListener('click', resumeRecording);
      stopRecordBtn.addEventListener('click', stopRecording);

      // Download
      downloadBtn.addEventListener('click', () => {
        if (!lastRecordedBlob) {
          showToast('Chưa có video để tải');
          return;
        }
        const url = URL.createObjectURL(lastRecordedBlob);
        const a = document.createElement('a');
        const timestamp = new Date().toISOString().replace(/[:.]/g, '-');
        a.href = url;
        a.download = `prorec_${timestamp}.webm`;
        a.click();
        URL.revokeObjectURL(url);
        showToast('Đang tải video...');
      });

      // Delete
      deleteVideoBtn.addEventListener('click', () => {
        if (lastRecordedBlob) {
          lastRecordedBlob = null;
          recordedChunks = [];
          showToast('Đã xoá video tạm');
        }
      });

      // Play preview
      const playerModal = document.getElementById('playerModal');
      const previewVideo = document.getElementById('previewVideo');
      playPreviewBtn.addEventListener('click', () => {
        if (!lastRecordedBlob) {
          showToast('Chưa có video để xem');
          return;
        }
        const url = URL.createObjectURL(lastRecordedBlob);
        previewVideo.src = url;
        playerModal.style.display = 'flex';
      });
      document.getElementById('closePlayerBtn').addEventListener('click', () => {
        playerModal.style.display = 'none';
        previewVideo.pause();
        previewVideo.src = '';
      });
      document.getElementById('fullscreenVideoBtn').addEventListener('click', () => {
        if (previewVideo.requestFullscreen) previewVideo.requestFullscreen();
      });

      // ==================== MODULE: Text Overlay & Editing ====================
      function createTextObject(text = 'Nhập text...', x = 50, y = 50) {
        saveUndoState();
        const obj = {
          id: ++objectIdCounter,
          text,
          x,
          y,
          width: 200,
          height: 50,
          rotation: 0,
          font: 'Montserrat',
          size: 28,
          color: '#ffffff',
          opacity: 1,
          shadow: 0,
          glow: 0,
          letterSpacing: 0,
          fontWeight: '400',
          align: 'center',
          uppercase: false,
          visible: true,
          locked: false
        };
        textObjects.push(obj);
        renderAllTextObjects();
        updateLayerList();
        selectTextObject(obj.id);
        return obj;
      }

      function renderAllTextObjects() {
        overlayLayer.innerHTML = '';
        textObjects.forEach(obj => {
          if (!obj.visible) return;
          const div = document.createElement('div');
          div.className = 'text-object' + (selectedTextId === obj.id ? ' selected' : '');
          div.id = 'text-obj-' + obj.id;
          div.style.left = obj.x + 'px';
          div.style.top = obj.y + 'px';
          div.style.width = obj.width + 'px';
          div.style.minHeight = obj.height + 'px';
          div.style.transform = `rotate(${obj.rotation}deg)`;
          div.style.fontFamily = obj.font + ', sans-serif';
          div.style.fontSize = obj.size + 'px';
          div.style.color = obj.color;
          div.style.opacity = obj.opacity;
          div.style.fontWeight = obj.fontWeight;
          div.style.textAlign = obj.align;
          div.style.letterSpacing = obj.letterSpacing + 'px';
          div.style.textTransform = obj.uppercase ? 'uppercase' : 'none';
          let textShadowCSS = '';
          if (obj.shadow > 0) textShadowCSS += `${obj.shadow}px ${obj.shadow}px ${obj.shadow}px rgba(0,0,0,0.8)`;
          if (obj.glow > 0) {
            textShadowCSS += (textShadowCSS ? ',' : '') + `0 0 ${obj.glow}px ${obj.color}`;
          }
          div.style.textShadow = textShadowCSS || 'none';
          div.textContent = obj.text;
          div.setAttribute('data-id', obj.id);
          // Resize handle
          const resizeHandle = document.createElement('div');
          resizeHandle.className = 'resize-handle';
          div.appendChild(resizeHandle);
          // Rotate handle
          const rotateHandle = document.createElement('div');
          rotateHandle.className = 'rotate-handle';
          div.appendChild(rotateHandle);
          // Events
          div.addEventListener('pointerdown', (e) => onTextPointerDown(e, obj.id));
          overlayLayer.appendChild(div);
        });
        updateFrameOverlay();
      }

      function selectTextObject(id) {
        selectedTextId = id;
        renderAllTextObjects();
        updateLayerList();
        updateTextEditorPanel();
      }

      function updateTextEditorPanel() {
        const panel = document.getElementById('textEditorPanel');
        const obj = textObjects.find(o => o.id === selectedTextId);
        if (!obj) {
          panel.style.display = 'none';
          return;
        }
        panel.style.display = 'block';
        document.getElementById('textContentInput').value = obj.text;
        document.getElementById('fontSelect').value = obj.font;
        document.getElementById('fontSizeSlider').value = obj.size;
        document.getElementById('fontSizeValue').textContent = obj.size + 'px';
        document.getElementById('colorPicker').value = obj.color;
        document.getElementById('opacitySlider').value = obj.opacity;
        document.getElementById('weightSelect').value = obj.fontWeight;
        document.getElementById('shadowSlider').value = obj.shadow;
        document.getElementById('glowSlider').value = obj.glow;
        document.getElementById('letterSpacingSlider').value = obj.letterSpacing;
        document.getElementById('alignSelect').value = obj.align;
        document.getElementById('uppercaseToggle').textContent = obj.uppercase ? 'Aa → aa (Thường)' : 'Aa → AA (Hoa)';
      }

      function updateTextObjectProperty(prop, value) {
        const obj = textObjects.find(o => o.id === selectedTextId);
        if (!obj) return;
        saveUndoState();
        obj[prop] = value;
        renderAllTextObjects();
        updateTextEditorPanel();
      }

      // Event listeners cho text editor
      document.getElementById('textContentInput').addEventListener('input', function() {
        updateTextObjectProperty('text', this.value);
      });
      document.getElementById('fontSelect').addEventListener('change', function() {
        updateTextObjectProperty('font', this.value);
      });
      document.getElementById('fontSizeSlider').addEventListener('input', function() {
        document.getElementById('fontSizeValue').textContent = this.value + 'px';
        updateTextObjectProperty('size', parseInt(this.value));
      });
      document.getElementById('colorPicker').addEventListener('input', function() {
        updateTextObjectProperty('color', this.value);
      });
      document.getElementById('opacitySlider').addEventListener('input', function() {
        updateTextObjectProperty('opacity', parseFloat(this.value));
      });
      document.getElementById('weightSelect').addEventListener('change', function() {
        updateTextObjectProperty('fontWeight', this.value);
      });
      document.getElementById('shadowSlider').addEventListener('input', function() {
        updateTextObjectProperty('shadow', parseInt(this.value));
      });
      document.getElementById('glowSlider').addEventListener('input', function() {
        updateTextObjectProperty('glow', parseInt(this.value));
      });
      document.getElementById('letterSpacingSlider').addEventListener('input', function() {
        updateTextObjectProperty('letterSpacing', parseFloat(this.value));
      });
      document.getElementById('alignSelect').addEventListener('change', function() {
        updateTextObjectProperty('align', this.value);
      });
      document.getElementById('uppercaseToggle').addEventListener('click', function() {
        const obj = textObjects.find(o => o.id === selectedTextId);
        if (obj) {
          saveUndoState();
          obj.uppercase = !obj.uppercase;
          renderAllTextObjects();
          updateTextEditorPanel();
        }
      });
      document.getElementById('pasteTextBtn').addEventListener('click', async () => {
        try {
          const text = await navigator.clipboard.readText();
          if (text && selectedTextId) {
            updateTextObjectProperty('text', text);
            showToast('Đã dán văn bản');
          }
        } catch {
          showToast('Không thể đọc clipboard');
        }
      });
      document.getElementById('duplicateTextBtn').addEventListener('click', () => {
        const obj = textObjects.find(o => o.id === selectedTextId);
        if (obj) {
          saveUndoState();
          const newObj = createTextObject(obj.text, obj.x + 20, obj.y + 20);
          Object.assign(newObj, {
            font: obj.font,
            size: obj.size,
            color: obj.color,
            opacity: obj.opacity,
            shadow: obj.shadow,
            glow: obj.glow,
            letterSpacing: obj.letterSpacing,
            fontWeight: obj.fontWeight,
            align: obj.align,
            uppercase: obj.uppercase
          });
          renderAllTextObjects();
          updateLayerList();
          selectTextObject(newObj.id);
        }
      });
      document.getElementById('deleteTextBtn').addEventListener('click', () => {
        if (selectedTextId) {
          saveUndoState();
          textObjects = textObjects.filter(o => o.id !== selectedTextId);
          selectedTextId = null;
          renderAllTextObjects();
          updateLayerList();
          updateTextEditorPanel();
        }
      });
      document.getElementById('addTextBtn').addEventListener('click', () => {
        createTextObject();
      });

      // Keyboard shortcuts
      document.addEventListener('keydown', (e) => {
        if (e.ctrlKey && e.key === 'z') {
          e.preventDefault();
          const prev = undoManager.undo(() => getTextObjectsState());
          if (prev) {
            restoreTextObjectsState(prev);
            showToast('Undo');
          }
        }
        if (e.ctrlKey && e.key === 'y') {
          e.preventDefault();
          const next = undoManager.redo(() => getTextObjectsState());
          if (next) {
            restoreTextObjectsState(next);
            showToast('Redo');
          }
        }
        if (e.ctrlKey && e.key === 'v') {
          // paste handled by button, but also allow
        }
      });
      document.getElementById('undoBtn').addEventListener('click', () => {
        const prev = undoManager.undo(() => getTextObjectsState());
        if (prev) { restoreTextObjectsState(prev);
          showToast('Undo'); }
      });
      document.getElementById('redoBtn').addEventListener('click', () => {
        const next = undoManager.redo(() => getTextObjectsState());
        if (next) { restoreTextObjectsState(next);
          showToast('Redo'); }
      });

      // ==================== MODULE: Drag, Resize, Rotate Text ====================
      let dragState = null;
      function onTextPointerDown(e, id) {
        if (e.target.classList.contains('resize-handle')) {
          startResize(e, id);
          return;
        }
        if (e.target.classList.contains('rotate-handle')) {
          startRotate(e, id);
          return;
        }
        startDrag(e, id);
      }

      function startDrag(e, id) {
        const obj = textObjects.find(o => o.id === id);
        if (!obj || obj.locked) return;
        selectTextObject(id);
        saveUndoState();
        const rect = overlayLayer.getBoundingClientRect();
        const startX = e.clientX - rect.left;
        const startY = e.clientY - rect.top;
        dragState = {
          type: 'drag',
          id,
          startX,
          startY,
          origX: obj.x,
          origY: obj.y
        };
        e.target.setPointerCapture(e.pointerId);
        e.preventDefault();
      }

      function startResize(e, id) {
        const obj = textObjects.find(o => o.id === id);
        if (!obj || obj.locked) return;
        selectTextObject(id);
        saveUndoState();
        dragState = {
          type: 'resize',
          id,
          origWidth: obj.width,
          origHeight: obj.height,
          origX: obj.x,
          origY: obj.y,
          startClientX: e.clientX,
          startClientY: e.clientY
        };
        e.target.setPointerCapture(e.pointerId);
        e.preventDefault();
        e.stopPropagation();
      }

      function startRotate(e, id) {
        const obj = textObjects.find(o => o.id === id);
        if (!obj || obj.locked) return;
        selectTextObject(id);
        saveUndoState();
        const rect = overlayLayer.getBoundingClientRect();
        const centerX = rect.left + obj.x + obj.width / 2;
        const centerY = rect.top + obj.y + obj.height / 2;
        dragState = {
          type: 'rotate',
          id,
          centerX,
          centerY,
          origRotation: obj.rotation,
          startAngle: Math.atan2(e.clientY - centerY, e.clientX - centerX) * (180 / Math.PI)
        };
        e.target.setPointerCapture(e.pointerId);
        e.preventDefault();
        e.stopPropagation();
      }

      window.addEventListener('pointermove', (e) => {
        if (!dragState) return;
        const obj = textObjects.find(o => o.id === dragState.id);
        if (!obj) return;
        if (dragState.type === 'drag') {
          const rect = overlayLayer.getBoundingClientRect();
          const dx = e.clientX - rect.left - dragState.startX;
          const dy = e.clientY - rect.top - dragState.startY;
          obj.x = Math.max(0, Math.min(overlayLayer.clientWidth - obj.width, dragState.origX + dx));
          obj.y = Math.max(0, Math.min(overlayLayer.clientHeight - obj.height, dragState.origY + dy));
          renderAllTextObjects();
        } else if (dragState.type === 'resize') {
          const dx = e.clientX - dragState.startClientX;
          const dy = e.clientY - dragState.startClientY;
          obj.width = Math.max(30, dragState.origWidth + dx);
          obj.height = Math.max(20, dragState.origHeight + dy);
          renderAllTextObjects();
        } else if (dragState.type === 'rotate') {
          const angle = Math.atan2(e.clientY - dragState.centerY, e.clientX - dragState.centerX) * (180 / Math.PI);
          let delta = angle - dragState.startAngle;
          obj.rotation = dragState.origRotation + delta;
          renderAllTextObjects();
        }
      });

      window.addEventListener('pointerup', (e) => {
        if (dragState) {
          dragState = null;
        }
      });

      // ==================== MODULE: Layer Manager ====================
      function updateLayerList() {
        const list = document.getElementById('layerList');
        list.innerHTML = '';
        if (textObjects.length === 0) {
          list.innerHTML = '<div style="color:var(--text-secondary);font-size:0.7rem;padding:8px;">Chưa có object nào</div>';
          return;
        }
        textObjects.forEach((obj, index) => {
          const item = document.createElement('div');
          item.className = 'layer-item' + (selectedTextId === obj.id ? ' selected' : '');
          item.innerHTML = `
            <span style="flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;">${obj.text.substring(0,15)}</span>
            <div class="layer-actions">
              <button title="Ẩn/Hiện" class="toggle-vis-btn">${obj.visible ? '👁' : '👁‍🗨'}</button>
              <button title="Khoá/Mở" class="toggle-lock-btn">${obj.locked ? '🔒' : '🔓'}</button>
            </div>
          `;
          item.addEventListener('click', (e) => {
            if (e.target.tagName === 'BUTTON') return;
            selectTextObject(obj.id);
          });
          item.querySelector('.toggle-vis-btn').addEventListener('click', (e) => {
            e.stopPropagation();
            saveUndoState();
            obj.visible = !obj.visible;
            renderAllTextObjects();
            updateLayerList();
          });
          item.querySelector('.toggle-lock-btn').addEventListener('click', (e) => {
            e.stopPropagation();
            saveUndoState();
            obj.locked = !obj.locked;
            updateLayerList();
          });
          list.appendChild(item);
        });
      }

      // ==================== MODULE: Frame Overlay ====================
      function updateFrameOverlay() {
        const frame = document.getElementById('frameSelect').value;
        frameOverlay.innerHTML = '';
        if (frame === 'cinematic') {
          frameOverlay.innerHTML = `
            <div style="position:absolute;top:0;left:0;right:0;height:8%;background:rgba(0,0,0,0.8);"></div>
            <div style="position:absolute;bottom:0;left:0;right:0;height:8%;background:rgba(0,0,0,0.8);"></div>
          `;
        } else if (frame === 'neon') {
          frameOverlay.innerHTML = `
            <div style="position:absolute;inset:5px;border:3px solid var(--primary);border-radius:10px;box-shadow:0 0 20px var(--primary), inset 0 0 20px rgba(0,240,255,0.2);pointer-events:none;"></div>
          `;
        } else if (frame === 'minimal') {
          frameOverlay.innerHTML = `
            <div style="position:absolute;inset:10px;border:1px solid rgba(255,255,255,0.5);border-radius:4px;pointer-events:none;"></div>
          `;
        } else if (frame === 'livestream') {
          frameOverlay.innerHTML = `
            <div style="position:absolute;top:10px;left:10px;background:rgba(255,0,0,0.8);padding:4px 12px;border-radius:20px;font-size:0.7rem;color:#fff;">🔴 LIVE</div>
            <div style="position:absolute;bottom:10px;left:10px;right:10px;height:30px;background:rgba(0,0,0,0.5);border-radius:10px;display:flex;align-items:center;padding:0 10px;font-size:0.6rem;color:#ccc;">💬 Chat: ...</div>
          `;
        }
      }
      document.getElementById('frameSelect').addEventListener('change', updateFrameOverlay);

      // ==================== MODULE: Sidebar Toggle (Mobile) ====================
      const sidebar = document.getElementById('sidebar');
      const sidebarToggle = document.getElementById('sidebarToggleBtn');
      const mobileSidebarToggle = document.getElementById('mobileSidebarToggle');
      const closeSidebarBtn = document.getElementById('closeSidebarBtn');
      function openSidebar() { sidebar.classList.add('open'); }
      function closeSidebar() { sidebar.classList.remove('open'); }
      sidebarToggle.addEventListener('click', () => {
        sidebar.classList.toggle('open');
      });
      mobileSidebarToggle.addEventListener('click', openSidebar);
      closeSidebarBtn.addEventListener('click', closeSidebar);

      // ==================== MODULE: Export with Progress ====================
      const exportModal = document.getElementById('exportModal');
      const exportProgressFill = document.getElementById('exportProgressFill');
      const exportStatus = document.getElementById('exportStatus');

      // Nút export ẩn, thêm vào control bar? Thêm nút export riêng
      const exportBtn = document.createElement('button');
      exportBtn.className = 'ctrl-btn';
      exportBtn.title = 'Xuất video';
      exportBtn.innerHTML = '⬆';
      exportBtn.addEventListener('click', async () => {
        if (!lastRecordedBlob) {
          showToast('Chưa có video để xuất');
          return;
        }
        exportModal.style.display = 'flex';
        exportProgressFill.style.width = '0%';
        exportStatus.textContent = '0%';
        // Giả lập progress export (thực tế blob đã có sẵn, chỉ cần tải)
        let progress = 0;
        const interval = setInterval(() => {
          progress += Math.random() * 30;
          if (progress >= 100) {
            progress = 100;
            clearInterval(interval);
            exportProgressFill.style.width = '100%';
            exportStatus.textContent = '100% - Hoàn tất!';
            setTimeout(() => {
              exportModal.style.display = 'none';
              // Tải file
              const url = URL.createObjectURL(lastRecordedBlob);
              const a = document.createElement('a');
              const timestamp = new Date().toISOString().replace(/[:.]/g, '-');
              a.href = url;
              a.download = `prorec_${timestamp}.webm`;
              a.click();
              URL.revokeObjectURL(url);
              showToast('Xuất video thành công');
            }, 500);
          } else {
            exportProgressFill.style.width = progress + '%';
            exportStatus.textContent = Math.floor(progress) + '%';
          }
        }, 200);
      });
      document.getElementById('controlBar').appendChild(exportBtn);

      // ==================== MODULE: Init ====================
      function init() {
        updatePreviewContainerSize();
        startCamera().then(() => {
          // Ẩn loading screen
          setTimeout(() => {
            document.getElementById('loadingScreen').classList.add('hidden');
            logToConsole('System ready');
          }, 800);
        });
        updateRecordingUI();
        updateLayerList();
      }

      // Xử lý resize window
      window.addEventListener('resize', () => {
        updatePreviewContainerSize();
      });

      // Bắt đầu ứng dụng
      init();

      // Fake console logs
      setTimeout(() => logToConsole('MediaRecorder API: available'), 300);
      setTimeout(() => logToConsole('Canvas API: 2D context ready'), 500);
      setTimeout(() => logToConsole('LocalStorage: ' + (typeof localStorage !== 'undefined' ? 'enabled' : 'disabled')),
        700);
    })();
  </script>
