<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover, maximum-scale=1.0, minimum-scale=1.0">
  <title>Pro Video Recorder | Fixed UI</title>
  <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&family=Cinzel:wght@400;700&family=Black+Ops+One&family=Caveat:wght@400;700&family=Orbitron:wght@400;700&family=Montserrat:wght@300;400;700&family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg: #0a0a0f;
      --surface: rgba(20, 20, 35, 0.7);
      --primary: #00f0ff;
      --primary-glow: 0 0 15px rgba(0, 240, 255, 0.5);
      --secondary: #b266ff;
      --accent: #ff2d55;
      --text: #e0e0f0;
      --text-secondary: #a0a0c0;
      --border: rgba(255, 255, 255, 0.1);
      --glass-bg: rgba(15, 15, 30, 0.65);
      --radius: 16px;
      --transition: 0.3s cubic-bezier(0.4, 0, 0.2, 1);
      --header-height: 60px;
      --control-height: 80px;
    }
    .light-mode {
      --bg: #f0f2f8;
      --surface: rgba(255, 255, 255, 0.75);
      --primary: #0077cc;
      --secondary: #7c3aed;
      --accent: #e11d48;
      --text: #1a1a2e;
      --text-secondary: #555577;
      --border: rgba(0, 0, 0, 0.12);
      --glass-bg: rgba(255, 255, 255, 0.7);
    }
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: 'Inter', sans-serif;
      background: var(--bg);
      color: var(--text);
      height: 100vh;
      width: 100vw;
      overflow: hidden;
      user-select: none;
      -webkit-tap-highlight-color: transparent;
      transition: background var(--transition), color var(--transition);
      display: flex;
      flex-direction: column;
    }
    /* Custom Scrollbar */
    ::-webkit-scrollbar { width: 5px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: var(--primary); border-radius: 10px; }

    /* Fixed Header */
    #header {
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      z-index: 120;
      height: var(--header-height);
      padding: 0 16px;
      background: var(--glass-bg);
      backdrop-filter: blur(30px);
      -webkit-backdrop-filter: blur(30px);
      border-bottom: 1px solid rgba(255,255,255,0.15);
      display: flex;
      align-items: center;
      gap: 8px;
      flex-wrap: nowrap;
      box-shadow: 0 5px 30px rgba(0,0,0,0.3);
    }
    .header-btn {
      background: rgba(255,255,255,0.05);
      border: 1px solid var(--border);
      color: var(--text);
      padding: 6px 14px;
      border-radius: 25px;
      font-size: 0.8rem;
      cursor: pointer;
      transition: all var(--transition);
      backdrop-filter: blur(10px);
      white-space: nowrap;
      display: flex;
      align-items: center;
      gap: 6px;
      height: 36px;
    }
    .header-btn:hover {
      background: rgba(0,240,255,0.1);
      border-color: var(--primary);
      color: var(--primary);
      box-shadow: 0 0 15px rgba(0,240,255,0.2);
    }
    .header-btn.active {
      background: var(--primary);
      color: #000;
      border-color: var(--primary);
      font-weight: 600;
      box-shadow: var(--primary-glow);
    }

    /* Fixed Bottom Control Bar */
    #controlBar {
      position: fixed;
      bottom: 20px;
      left: 50%;
      transform: translateX(-50%);
      z-index: 120;
      height: var(--control-height);
      background: var(--glass-bg);
      backdrop-filter: blur(30px);
      -webkit-backdrop-filter: blur(30px);
      border: 1px solid rgba(255,255,255,0.2);
      border-radius: 50px;
      padding: 8px 20px;
      display: flex;
      align-items: center;
      gap: 10px;
      box-shadow: 0 10px 40px rgba(0,0,0,0.5);
      flex-wrap: nowrap;
    }
    .ctrl-btn {
      width: 46px;
      height: 46px;
      border-radius: 50%;
      background: rgba(255,255,255,0.05);
      border: 1px solid var(--border);
      color: var(--text);
      font-size: 1.3rem;
      cursor: pointer;
      transition: all var(--transition);
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .ctrl-btn:hover {
      background: rgba(0,240,255,0.1);
      border-color: var(--primary);
      color: var(--primary);
      box-shadow: 0 0 15px rgba(0,240,255,0.4);
    }
    .ctrl-btn.rec {
      background: var(--accent);
      border-color: var(--accent);
      color: #fff;
      animation: pulse-rec 1.2s infinite;
      box-shadow: 0 0 25px rgba(255,45,85,0.7);
    }
    @keyframes pulse-rec {
      0%,100%{ box-shadow: 0 0 20px rgba(255,45,85,0.6); }
      50%{ box-shadow: 0 0 45px rgba(255,45,85,1); }
    }
    .rec-indicator {
      width: 12px; height: 12px; border-radius: 50%; background: #ff2d55;
      animation: blink 0.8s infinite; margin-right: 5px;
    }
    @keyframes blink { 0%,100%{opacity:1;} 50%{opacity:0.2;} }
    .status-badge {
      font-size: 0.7rem;
      color: var(--text-secondary);
      font-family: 'JetBrains Mono', monospace;
      background: rgba(0,0,0,0.3);
      padding: 4px 10px;
      border-radius: 20px;
    }

    /* Main Layout */
    #appContainer {
      display: flex;
      flex: 1;
      padding-top: var(--header-height);
      padding-bottom: calc(var(--control-height) + 30px);
      height: 100vh;
      width: 100vw;
    }
    #mainArea {
      flex: 1;
      display: flex;
      align-items: center;
      justify-content: center;
      position: relative;
      overflow: hidden;
    }
    #previewContainer {
      position: relative;
      background: #000;
      border-radius: var(--radius);
      overflow: hidden;
      box-shadow: 0 0 30px rgba(0,240,255,0.2), 0 20px 50px rgba(0,0,0,0.5);
      transition: width 0.4s ease, height 0.4s ease;
    }
    #previewCanvas {
      display: block;
      width: 100%;
      height: 100%;
      object-fit: contain;
    }
    #overlayLayer {
      position: absolute;
      top: 0; left: 0;
      width: 100%; height: 100%;
      pointer-events: none;
      z-index: 10;
    }
    .text-object {
      position: absolute;
      cursor: move;
      pointer-events: auto;
      white-space: pre-wrap;
      word-break: break-word;
      line-height: 1.2;
      transform-origin: center;
    }
    .text-object.selected {
      outline: 2px dashed var(--primary);
      outline-offset: 4px;
      box-shadow: 0 0 25px rgba(0,240,255,0.6);
    }
    .text-object .resize-handle {
      position: absolute;
      width: 14px; height: 14px;
      background: var(--primary);
      border-radius: 50%;
      border: 2px solid #000;
      pointer-events: auto;
      z-index: 20;
      cursor: nwse-resize;
      box-shadow: 0 0 8px var(--primary);
      bottom: -7px; right: -7px;
    }
    .text-object .rotate-handle {
      position: absolute;
      width: 20px; height: 20px;
      background: var(--secondary);
      border-radius: 50%;
      border: 2px solid #000;
      pointer-events: auto;
      z-index: 20;
      cursor: grab;
      box-shadow: 0 0 8px var(--secondary);
      top: -25px; left: 50%;
      transform: translateX(-50%);
    }
    .text-object .rotate-handle:active { cursor: grabbing; }

    /* Sidebar */
    #sidebar {
      width: 300px;
      min-width: 300px;
      background: var(--glass-bg);
      backdrop-filter: blur(25px);
      border-left: 1px solid rgba(255,255,255,0.15);
      display: flex;
      flex-direction: column;
      z-index: 110;
      transition: transform var(--transition);
      box-shadow: -10px 0 30px rgba(0,0,0,0.4);
      border-radius: var(--radius) 0 0 var(--radius);
      overflow-y: auto;
      height: 100%;
    }
    @media (max-width: 768px) {
      #sidebar {
        position: fixed;
        right: 0;
        top: var(--header-height);
        bottom: 0;
        transform: translateX(100%);
        width: 280px;
        min-width: 280px;
        border-radius: var(--radius) 0 0 0;
        z-index: 200;
      }
      #sidebar.open { transform: translateX(0); }
      #mobileSidebarToggle { display: flex !important; }
    }
    #mobileSidebarToggle {
      display: none;
      position: fixed;
      bottom: 110px;
      right: 20px;
      z-index: 150;
      width: 50px; height: 50px;
      border-radius: 50%;
      background: var(--surface);
      backdrop-filter: blur(20px);
      border: 1px solid var(--border);
      color: var(--primary);
      font-size: 1.5rem;
      cursor: pointer;
      align-items: center;
      justify-content: center;
      box-shadow: 0 0 20px rgba(0,240,255,0.3);
    }
    .sidebar-header {
      padding: 20px;
      border-bottom: 1px solid var(--border);
      font-family: 'Orbitron', sans-serif;
      font-size: 0.9rem;
      color: var(--primary);
      letter-spacing: 2px;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }
    .sidebar-section {
      padding: 15px 20px;
      border-bottom: 1px solid var(--border);
    }
    .section-title {
      font-size: 0.7rem;
      text-transform: uppercase;
      letter-spacing: 2px;
      color: var(--text-secondary);
      margin-bottom: 10px;
      font-family: 'Orbitron', sans-serif;
    }
    .layer-item {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 8px 12px;
      margin: 4px 0;
      background: rgba(255,255,255,0.03);
      border-radius: 8px;
      border: 1px solid transparent;
      cursor: pointer;
      transition: all var(--transition);
      font-size: 0.8rem;
    }
    .layer-item:hover { background: rgba(255,255,255,0.06); border-color: var(--border); }
    .layer-item.selected { border-color: var(--primary); box-shadow: 0 0 10px rgba(0,240,255,0.2); }
    .layer-item .layer-actions { margin-left: auto; display: flex; gap: 5px; }
    .layer-item button {
      background: transparent; border: none; color: var(--text-secondary);
      cursor: pointer; font-size: 0.75rem; padding: 2px 5px; border-radius: 4px;
    }
    .layer-item button:hover { color: var(--primary); background: rgba(0,240,255,0.1); }

    /* Toast, Console, Modal giữ nguyên */
    #toastContainer { position: fixed; top: 20px; right: 20px; z-index: 5000; display: flex; flex-direction: column; gap: 8px; }
    .toast { background: var(--surface); backdrop-filter: blur(20px); border: 1px solid var(--border); padding: 12px 20px; border-radius: 30px; font-size: 0.85rem; color: var(--text); box-shadow: 0 10px 30px rgba(0,0,0,0.4); animation: slideIn 0.3s ease-out; }
    @keyframes slideIn { from{transform:translateX(100%);opacity:0} to{transform:translateX(0);opacity:1} }
    #devConsole {
      position: fixed; bottom: 10px; left: 10px; z-index: 4000; background: rgba(0,0,0,0.8);
      border: 1px solid rgba(0,240,255,0.3); border-radius: 8px; padding: 8px 12px;
      font-family: 'JetBrains Mono', monospace; font-size: 0.65rem; color: #00ff88;
      max-width: 280px; pointer-events: none; opacity: 0.8; backdrop-filter: blur(10px);
      display: flex; flex-direction: column; gap: 2px;
    }
    .modal-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.7); z-index: 3000; display: flex; align-items: center; justify-content: center; backdrop-filter: blur(5px); }
    .modal-content { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); padding: 25px; box-shadow: 0 20px 50px rgba(0,0,0,0.6); max-width: 500px; width: 90%; color: var(--text); }
    .progress-bar { height: 6px; background: rgba(255,255,255,0.1); border-radius: 10px; overflow: hidden; margin: 10px 0; }
    .progress-fill { height: 100%; background: var(--primary); border-radius: 10px; transition: width 0.3s; box-shadow: 0 0 10px var(--primary); }
    select, input[type="text"], input[type="number"], input[type="color"], input[type="range"] {
      background: rgba(0,0,0,0.3); border: 1px solid var(--border); color: var(--text); padding: 6px 10px; border-radius: 8px; font-size: 0.8rem;
    }
    select option { background: #1a1a2e; color: #fff; }
    .input-group { display: flex; flex-direction: column; gap: 4px; margin-bottom: 8px; }
    .input-group label { font-size: 0.7rem; text-transform: uppercase; color: var(--text-secondary); letter-spacing: 1px; }
    .glow-neon { box-shadow: 0 0 20px rgba(0,240,255,0.5), 0 0 50px rgba(0,240,255,0.2); border-color: var(--primary); }
  </style>
</head>
<body>
  <div id="loadingScreen" style="position:fixed;inset:0;z-index:10000;background:var(--bg);display:flex;flex-direction:column;align-items:center;justify-content:center;transition:opacity 0.4s;">
    <div class="loader-ring" style="width:80px;height:80px;border-radius:50%;border:3px solid transparent;border-top-color:var(--primary);border-right-color:var(--secondary);animation:spin 1.2s linear infinite;box-shadow:0 0 30px rgba(0,240,255,0.5);"></div>
    <div style="margin-top:20px;font-family:'Orbitron';font-size:1.2rem;color:var(--primary);letter-spacing:2px;">INITIALIZING</div>
  </div>
  <div id="toastContainer"></div>
  <div id="devConsole"><div>> system ready</div></div>
  <button id="mobileSidebarToggle" title="Editor">☰</button>

  <!-- App Container -->
  <div id="appContainer">
    <div id="mainArea">
      <div id="previewContainer" style="aspect-ratio:16/9; width:100%; max-width:800px;">
        <canvas id="previewCanvas"></canvas>
        <div id="overlayLayer"></div>
        <div id="frameOverlay" style="position:absolute;inset:0;pointer-events:none;z-index:5;"></div>
      </div>
    </div>
    <!-- Sidebar -->
    <div id="sidebar">
      <div class="sidebar-header"><span>⚡ EDITOR</span><button id="closeSidebarBtn" style="background:none;border:none;color:var(--text);font-size:1.2rem;cursor:pointer;">✕</button></div>
      <div class="sidebar-section">
        <div class="section-title">📐 Layers</div>
        <div id="layerList"><div style="color:var(--text-secondary);font-size:0.7rem;">Chưa có object</div></div>
        <button class="header-btn" id="addTextBtn" style="margin-top:8px;width:100%;justify-content:center;">+ Thêm Text</button>
      </div>
      <div class="sidebar-section" id="textEditorPanel" style="display:none;">
        <div class="section-title">✎ Edit Text</div>
        <div class="input-group"><label>Nội dung</label><input type="text" id="textContentInput" placeholder="Nhập text..."></div>
        <div style="display:flex;gap:6px;flex-wrap:wrap;">
          <button class="header-btn" id="pasteTextBtn">📋 Paste</button>
          <button class="header-btn" id="duplicateTextBtn">⧉ Nhân bản</button>
          <button class="header-btn" id="deleteTextBtn" style="color:var(--accent);">🗑 Xoá</button>
        </div>
        <div class="input-group" style="margin-top:8px;"><label>Font</label><select id="fontSelect"><option value="Montserrat">Modern</option><option value="Press Start 2P">Dev</option><option value="Cinzel">Cinematic</option><option value="Black Ops One">Bold</option><option value="Caveat">Handwriting</option><option value="Orbitron">Futuristic</option></select></div>
        <div style="display:flex;gap:8px;">
          <div class="input-group" style="flex:1;"><label>Size</label><input type="range" id="fontSizeSlider" min="12" max="120" value="28"><span id="fontSizeValue">28px</span></div>
          <div class="input-group" style="flex:1;"><label>Màu</label><input type="color" id="colorPicker" value="#ffffff"></div>
        </div>
        <div style="display:flex;gap:8px;">
          <div class="input-group" style="flex:1;"><label>Opacity</label><input type="range" id="opacitySlider" min="0.1" max="1" step="0.05" value="1"></div>
          <div class="input-group" style="flex:1;"><label>Độ đậm</label><select id="weightSelect"><option value="300">Light</option><option value="400" selected>Regular</option><option value="600">Semi-Bold</option><option value="700">Bold</option></select></div>
        </div>
        <div style="display:flex;gap:8px;">
          <div class="input-group" style="flex:1;"><label>Shadow</label><input type="range" id="shadowSlider" min="0" max="30" value="0"></div>
          <div class="input-group" style="flex:1;"><label>Glow</label><input type="range" id="glowSlider" min="0" max="30" value="0"></div>
        </div>
        <div style="display:flex;gap:8px;">
          <div class="input-group" style="flex:1;"><label>Spacing</label><input type="range" id="letterSpacingSlider" min="-2" max="15" value="0" step="0.5"></div>
          <div class="input-group" style="flex:1;"><label>Căn lề</label><select id="alignSelect"><option value="left">Trái</option><option value="center">Giữa</option><option value="right">Phải</option></select></div>
        </div>
        <button class="header-btn" id="uppercaseToggle" style="width:100%;margin-top:4px;">Aa ⇄ AA</button>
      </div>
      <div class="sidebar-section">
        <div class="section-title">🖼 Overlay Khung</div>
        <select id="frameSelect" style="width:100%;">
          <option value="none">Không khung</option>
          <option value="cinematic">Cinematic</option>
          <option value="neon">Neon Border</option>
          <option value="minimal">Minimal</option>
          <option value="livestream">Livestream</option>
        </select>
      </div>
      <div class="sidebar-section">
        <div class="section-title">↩ History</div>
        <div style="display:flex;gap:6px;">
          <button class="header-btn" id="undoBtn" style="flex:1;">↩ Undo</button>
          <button class="header-btn" id="redoBtn" style="flex:1;">↪ Redo</button>
        </div>
      </div>
    </div>
  </div>

  <!-- Fixed Header -->
  <div id="header">
    <span style="font-family:'Orbitron';font-size:1.1rem;color:var(--primary);text-shadow:0 0 20px rgba(0,240,255,0.5);margin-right:auto;">PRO REC</span>
    <button class="header-btn" id="switchCameraBtn">🔄 Đổi Cam</button>
    <button class="header-btn" id="orientationBtn">📱 Dọc/Ngang</button>
    <select id="ratioSelect">
      <option value="16:9">16:9</option>
      <option value="3:4">3:4</option>
      <option value="1:1">1:1</option>
    </select>
    <button class="header-btn" id="themeToggle">🌓 Theme</button>
    <button class="header-btn" id="sidebarToggleBtn">☰ Editor</button>
  </div>

  <!-- Fixed Bottom Control Bar -->
  <div id="controlBar">
    <span class="rec-indicator" id="recIndicator" style="display:none;"></span>
    <span class="status-badge" id="timerDisplay">00:00</span>
    <span class="status-badge" id="fpsDisplay">FPS: --</span>
    <span class="status-badge" id="sizeDisplay">0 MB</span>
    <button class="ctrl-btn" id="startRecordBtn" title="Bắt đầu">⏺</button>
    <button class="ctrl-btn" id="pauseRecordBtn" title="Tạm dừng">⏸</button>
    <button class="ctrl-btn" id="resumeRecordBtn" title="Tiếp tục">▶</button>
    <button class="ctrl-btn" id="stopRecordBtn" title="Dừng">⏹</button>
    <button class="ctrl-btn" id="downloadBtn" title="Tải xuống">⬇</button>
    <button class="ctrl-btn" id="deleteVideoBtn" title="Xoá video">🗑</button>
    <button class="ctrl-btn" id="playPreviewBtn" title="Xem lại">👁</button>
    <button class="ctrl-btn" id="exportBtnUI" title="Xuất MP4">⬆</button>
  </div>

  <!-- Player Modal -->
  <div id="playerModal" class="modal-overlay" style="display:none;">
    <div class="modal-content">
      <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:15px;">
        <h3 style="font-family:'Orbitron';color:var(--primary);">Video Preview</h3>
        <button id="closePlayerBtn" style="background:none;border:none;color:var(--text);font-size:1.5rem;cursor:pointer;">✕</button>
      </div>
      <video id="previewVideo" controls style="width:100%;border-radius:10px;"></video>
      <button class="header-btn" id="fullscreenVideoBtn" style="margin-top:10px;">📺 Fullscreen</button>
    </div>
  </div>

  <!-- Export Modal -->
  <div id="exportModal" class="modal-overlay" style="display:none;">
    <div class="modal-content" style="text-align:center;">
      <div class="loader-ring" style="margin:0 auto 20px;"></div>
      <h3 style="font-family:'Orbitron';color:var(--primary);">Đang xuất video...</h3>
      <div class="progress-bar"><div id="exportProgressFill" class="progress-fill" style="width:0%;"></div></div>
      <p id="exportStatus" style="font-size:0.8rem;color:var(--text-secondary);">0%</p>
    </div>
  </div>

  <script>
    (function() {
      // Toast
      function showToast(msg) {
        const c = document.getElementById('toastContainer');
        const t = document.createElement('div'); t.className='toast'; t.textContent=msg; c.appendChild(t);
        setTimeout(()=>{ t.style.opacity='0'; t.style.transform='translateX(100%)'; t.style.transition='0.3s'; setTimeout(()=>t.remove(),300); },2500);
      }
      // Console log
      const devConsole = document.getElementById('devConsole');
      function log(msg){ const d=document.createElement('div'); d.textContent='> '+msg; devConsole.appendChild(d); if(devConsole.children.length>6) devConsole.firstChild.remove(); }

      // Theme
      let dark = true;
      document.getElementById('themeToggle').addEventListener('click',()=>{
        dark=!dark; document.body.classList.toggle('light-mode',!dark);
        document.getElementById('themeToggle').textContent = dark?'🌓 Theme':'☀️ Theme';
      });

      // Undo Manager
      class UndoManager {
        constructor(){ this.undo=[]; this.redo=[]; }
        save(s){ this.undo.push(JSON.parse(JSON.stringify(s))); if(this.undo.length>50) this.undo.shift(); this.redo=[]; }
        undo(cur){ if(!this.undo.length) return null; this.redo.push(JSON.parse(JSON.stringify(cur))); return this.undo.pop(); }
        redo(cur){ if(!this.redo.length) return null; this.undo.push(JSON.parse(JSON.stringify(cur))); return this.redo.pop(); }
      }
      const undoMgr = new UndoManager();

      // Text Objects
      let textObjs = [], selectedId = null, idCounter = 0;
      function saveState(){ undoMgr.save(textObjs.map(o=>({...o}))); }
      function restoreState(s){ textObjs=s.map(o=>({...o})); renderAll(); updateLayers(); }
      function createObj(text='Text',x=40,y=40){
        saveState();
        const obj = { id:++idCounter, text, x, y, width:180, height:40, rotation:0, font:'Montserrat', size:28, color:'#fff', opacity:1, shadow:0, glow:0, letterSpacing:0, fontWeight:'400', align:'center', uppercase:false, visible:true, locked:false };
        textObjs.push(obj); renderAll(); updateLayers(); selectObj(obj.id); return obj;
      }
      function selectObj(id){ selectedId=id; renderAll(); updateLayers(); updateEditor(); }
      function updateEditor(){
        const p=document.getElementById('textEditorPanel');
        const o=textObjs.find(x=>x.id===selectedId);
        if(!o){ p.style.display='none'; return; }
        p.style.display='block';
        document.getElementById('textContentInput').value=o.text;
        document.getElementById('fontSelect').value=o.font;
        document.getElementById('fontSizeSlider').value=o.size; document.getElementById('fontSizeValue').textContent=o.size+'px';
        document.getElementById('colorPicker').value=o.color;
        document.getElementById('opacitySlider').value=o.opacity;
        document.getElementById('weightSelect').value=o.fontWeight;
        document.getElementById('shadowSlider').value=o.shadow;
        document.getElementById('glowSlider').value=o.glow;
        document.getElementById('letterSpacingSlider').value=o.letterSpacing;
        document.getElementById('alignSelect').value=o.align;
        document.getElementById('uppercaseToggle').textContent=o.uppercase?'Aa → aa':'Aa → AA';
      }
      function updateProp(prop,val){
        const o=textObjs.find(x=>x.id===selectedId); if(!o) return;
        saveState(); o[prop]=val; renderAll(); updateEditor();
      }
      function renderAll(){
        const layer=document.getElementById('overlayLayer'); layer.innerHTML='';
        textObjs.forEach(o=>{
          if(!o.visible) return;
          const d=document.createElement('div'); d.className='text-object'+(selectedId===o.id?' selected':'');
          d.id='txt-'+o.id; d.style.left=o.x+'px'; d.style.top=o.y+'px';
          d.style.width=o.width+'px'; d.style.minHeight=o.height+'px';
          d.style.transform=`rotate(${o.rotation}deg)`;
          d.style.fontFamily=o.font; d.style.fontSize=o.size+'px'; d.style.color=o.color;
          d.style.opacity=o.opacity; d.style.fontWeight=o.fontWeight;
          d.style.textAlign=o.align; d.style.letterSpacing=o.letterSpacing+'px';
          d.style.textTransform=o.uppercase?'uppercase':'none';
          let ts=''; if(o.shadow>0) ts+=`${o.shadow}px ${o.shadow}px ${o.shadow}px rgba(0,0,0,0.8)`;
          if(o.glow>0) ts+=(ts?',':'')+`0 0 ${o.glow}px ${o.color}`;
          d.style.textShadow=ts||'none'; d.textContent=o.text;
          const rh=document.createElement('div'); rh.className='resize-handle'; d.appendChild(rh);
          const roh=document.createElement('div'); roh.className='rotate-handle'; d.appendChild(roh);
          d.addEventListener('pointerdown',(e)=>onPointerDown(e,o.id));
          layer.appendChild(d);
        });
        updateFrameOverlay();
      }
      // Drag, Resize, Rotate giữ nguyên logic (rút gọn)
      let drag=null;
      function onPointerDown(e,id){
        const o=textObjs.find(x=>x.id===id); if(!o||o.locked) return;
        if(e.target.classList.contains('resize-handle')){ startResize(e,id); return; }
        if(e.target.classList.contains('rotate-handle')){ startRotate(e,id); return; }
        startDrag(e,id);
      }
      function startDrag(e,id){ selectObj(id); saveState(); const r=document.getElementById('overlayLayer').getBoundingClientRect(); drag={type:'drag',id,startX:e.clientX-r.left,startY:e.clientY-r.top,origX:o().x,origY:o().y}; e.target.setPointerCapture(e.pointerId); }
      function startResize(e,id){ selectObj(id); saveState(); drag={type:'resize',id,origW:o().width,origH:o().height,origX:o().x,origY:o().y,sX:e.clientX,sY:e.clientY}; e.target.setPointerCapture(e.pointerId); e.stopPropagation(); }
      function startRotate(e,id){ selectObj(id); saveState(); const r=document.getElementById('overlayLayer').getBoundingClientRect(); const cx=r.left+o().x+o().width/2, cy=r.top+o().y+o().height/2; drag={type:'rotate',id,cx,cy,origRot:o().rotation,startAng:Math.atan2(e.clientY-cy,e.clientX-cx)*180/Math.PI}; e.target.setPointerCapture(e.pointerId); e.stopPropagation(); }
      function o(){ return textObjs.find(x=>x.id===drag.id); }
      window.addEventListener('pointermove',(e)=>{
        if(!drag) return; const obj=o(); if(!obj) return;
        if(drag.type==='drag'){
          const r=document.getElementById('overlayLayer').getBoundingClientRect();
          obj.x=Math.max(0,Math.min(r.width-obj.width, drag.origX+(e.clientX-r.left-drag.startX)));
          obj.y=Math.max(0,Math.min(r.height-obj.height, drag.origY+(e.clientY-r.top-drag.startY)));
          renderAll();
        }else if(drag.type==='resize'){
          obj.width=Math.max(30, drag.origW+(e.clientX-drag.sX));
          obj.height=Math.max(20, drag.origH+(e.clientY-drag.sY));
          renderAll();
        }else if(drag.type==='rotate'){
          const ang=Math.atan2(e.clientY-drag.cy, e.clientX-drag.cx)*180/Math.PI;
          obj.rotation=drag.origRot+(ang-drag.startAng); renderAll();
        }
      });
      window.addEventListener('pointerup',()=>{ drag=null; });

      function updateLayers(){
        const list=document.getElementById('layerList'); list.innerHTML='';
        if(!textObjs.length){ list.innerHTML='<div style="color:var(--text-secondary);font-size:0.7rem;">Chưa có object</div>'; return; }
        textObjs.forEach(o=>{
          const item=document.createElement('div'); item.className='layer-item'+(selectedId===o.id?' selected':'');
          item.innerHTML=`<span style="flex:1;overflow:hidden;">${o.text.substring(0,15)}</span>
            <div class="layer-actions"><button class="tvis">${o.visible?'👁':'👁‍🗨'}</button><button class="tlock">${o.locked?'🔒':'🔓'}</button></div>`;
          item.addEventListener('click',(e)=>{ if(e.target.tagName!=='BUTTON') selectObj(o.id); });
          item.querySelector('.tvis').addEventListener('click',(e)=>{ e.stopPropagation(); saveState(); o.visible=!o.visible; renderAll(); updateLayers(); });
          item.querySelector('.tlock').addEventListener('click',(e)=>{ e.stopPropagation(); saveState(); o.locked=!o.locked; updateLayers(); });
          list.appendChild(item);
        });
      }

      function updateFrameOverlay(){
        const f=document.getElementById('frameSelect').value;
        const el=document.getElementById('frameOverlay'); el.innerHTML='';
        if(f==='cinematic') el.innerHTML='<div style="position:absolute;top:0;left:0;right:0;height:8%;background:rgba(0,0,0,0.8);"></div><div style="position:absolute;bottom:0;left:0;right:0;height:8%;background:rgba(0,0,0,0.8);"></div>';
        else if(f==='neon') el.innerHTML='<div style="position:absolute;inset:5px;border:3px solid var(--primary);border-radius:10px;box-shadow:0 0 20px var(--primary);"></div>';
        else if(f==='minimal') el.innerHTML='<div style="position:absolute;inset:10px;border:1px solid rgba(255,255,255,0.5);"></div>';
        else if(f==='livestream') el.innerHTML='<div style="position:absolute;top:10px;left:10px;background:rgba(255,0,0,0.8);padding:4px 12px;border-radius:20px;font-size:0.7rem;color:#fff;">🔴 LIVE</div><div style="position:absolute;bottom:10px;left:10px;right:10px;height:30px;background:rgba(0,0,0,0.5);border-radius:10px;display:flex;align-items:center;padding:0 10px;font-size:0.6rem;color:#ccc;">💬 Chat: ...</div>';
      }
      document.getElementById('frameSelect').addEventListener('change', updateFrameOverlay);

      // Editor listeners
      document.getElementById('textContentInput').addEventListener('input', function(){ updateProp('text',this.value); });
      document.getElementById('fontSelect').addEventListener('change', function(){ updateProp('font',this.value); });
      document.getElementById('fontSizeSlider').addEventListener('input', function(){ document.getElementById('fontSizeValue').textContent=this.value+'px'; updateProp('size',parseInt(this.value)); });
      document.getElementById('colorPicker').addEventListener('input', function(){ updateProp('color',this.value); });
      document.getElementById('opacitySlider').addEventListener('input', function(){ updateProp('opacity',parseFloat(this.value)); });
      document.getElementById('weightSelect').addEventListener('change', function(){ updateProp('fontWeight',this.value); });
      document.getElementById('shadowSlider').addEventListener('input', function(){ updateProp('shadow',parseInt(this.value)); });
      document.getElementById('glowSlider').addEventListener('input', function(){ updateProp('glow',parseInt(this.value)); });
      document.getElementById('letterSpacingSlider').addEventListener('input', function(){ updateProp('letterSpacing',parseFloat(this.value)); });
      document.getElementById('alignSelect').addEventListener('change', function(){ updateProp('align',this.value); });
      document.getElementById('uppercaseToggle').addEventListener('click', function(){
        const o=textObjs.find(x=>x.id===selectedId); if(o){ saveState(); o.uppercase=!o.uppercase; renderAll(); updateEditor(); }
      });
      document.getElementById('pasteTextBtn').addEventListener('click', async ()=>{
        try{ const t=await navigator.clipboard.readText(); if(t&&selectedId) updateProp('text',t); }catch{ showToast('Không thể paste'); }
      });
      document.getElementById('duplicateTextBtn').addEventListener('click', ()=>{
        const o=textObjs.find(x=>x.id===selectedId); if(o){ const n=createObj(o.text,o.x+20,o.y+20); Object.assign(n,{font:o.font,size:o.size,color:o.color,opacity:o.opacity,shadow:o.shadow,glow:o.glow,letterSpacing:o.letterSpacing,fontWeight:o.fontWeight,align:o.align,uppercase:o.uppercase}); renderAll(); updateLayers(); selectObj(n.id); }
      });
      document.getElementById('deleteTextBtn').addEventListener('click', ()=>{
        if(selectedId){ saveState(); textObjs=textObjs.filter(x=>x.id!==selectedId); selectedId=null; renderAll(); updateLayers(); updateEditor(); }
      });
      document.getElementById('addTextBtn').addEventListener('click', ()=>createObj());
      // Undo/Redo buttons
      document.getElementById('undoBtn').addEventListener('click', ()=>{
        const cur=textObjs.map(o=>({...o})); const prev=undoMgr.undo(cur); if(prev){ restoreState(prev); showToast('Undo'); }
      });
      document.getElementById('redoBtn').addEventListener('click', ()=>{
        const cur=textObjs.map(o=>({...o})); const next=undoMgr.redo(cur); if(next){ restoreState(next); showToast('Redo'); }
      });
      document.addEventListener('keydown',(e)=>{
        if(e.ctrlKey&&e.key==='z'){ e.preventDefault(); document.getElementById('undoBtn').click(); }
        if(e.ctrlKey&&e.key==='y'){ e.preventDefault(); document.getElementById('redoBtn').click(); }
      });

      // Camera & Canvas
      const canvas=document.getElementById('previewCanvas'), ctx=canvas.getContext('2d');
      const video=document.createElement('video'); video.autoplay=true; video.playsInline=true; video.muted=true;
      let stream=null, facing='user', ratio='16:9', orientation='landscape';
      const ratioMap={ '16:9':{w:16,h:9}, '3:4':{w:3,h:4}, '1:1':{w:1,h:1} };
      function updatePreviewSize(){
        const r=ratioMap[ratio]; let cw,ch;
        const maxW=Math.min(window.innerWidth*0.9,800), maxH=window.innerHeight*0.7;
        if(orientation==='portrait'){ ch=Math.min(maxH, maxW*(r.h/r.w)); cw=ch*(r.w/r.h); }
        else { cw=Math.min(maxW, maxH*(r.w/r.h)); ch=cw*(r.h/r.w); }
        canvas.width=cw; canvas.height=ch;
        document.getElementById('previewContainer').style.width=cw+'px';
        document.getElementById('previewContainer').style.height=ch+'px';
        document.getElementById('overlayLayer').style.width=cw+'px';
        document.getElementById('overlayLayer').style.height=ch+'px';
      }
      async function startCam(){
        if(stream){ stream.getTracks().forEach(t=>t.stop()); }
        stream=await navigator.mediaDevices.getUserMedia({ video:{facingMode:facing, width:{ideal:1920}, height:{ideal:1080}}, audio:true });
        video.srcObject=stream; await video.play();
        log(`Camera: ${facing}`); updatePreviewSize(); requestAnimationFrame(draw);
      }
      function draw(){
        if(!stream||video.readyState<2){ requestAnimationFrame(draw); return; }
        ctx.clearRect(0,0,canvas.width,canvas.height);
        ctx.save(); if(facing==='user'){ ctx.translate(canvas.width,0); ctx.scale(-1,1); }
        const vw=video.videoWidth, vh=video.videoHeight;
        if(vw&&vh){ const s=Math.max(canvas.width/vw, canvas.height/vh); ctx.drawImage(video, (vw-canvas.width/s)/2, (vh-canvas.height/s)/2, canvas.width/s, canvas.height/s, 0,0,canvas.width,canvas.height); }
        ctx.restore(); requestAnimationFrame(draw);
      }
      document.getElementById('switchCameraBtn').addEventListener('click',()=>{ facing=facing==='user'?'environment':'user'; startCam(); });
      document.getElementById('orientationBtn').addEventListener('click',()=>{ orientation=orientation==='landscape'?'portrait':'landscape'; updatePreviewSize(); });
      document.getElementById('ratioSelect').addEventListener('change',(e)=>{ ratio=e.target.value; updatePreviewSize(); });

      // Recorder
      let mediaRecorder=null, chunks=[], startTime=0, paused=false, pauseDur=0, pauseStart=0, blob=null;
      const timerEl=document.getElementById('timerDisplay'), fpsEl=document.getElementById('fpsDisplay'), sizeEl=document.getElementById('sizeDisplay');
      const recInd=document.getElementById('recIndicator');
      function updateRecUI(){
        if(!mediaRecorder||mediaRecorder.state==='inactive'){ recInd.style.display='none'; document.getElementById('startRecordBtn').style.display=''; document.getElementById('pauseRecordBtn').style.display='none'; document.getElementById('resumeRecordBtn').style.display='none'; document.getElementById('stopRecordBtn').style.display='none'; }
        else if(!paused){ recInd.style.display='inline-block'; document.getElementById('startRecordBtn').style.display='none'; document.getElementById('pauseRecordBtn').style.display=''; document.getElementById('resumeRecordBtn').style.display='none'; document.getElementById('stopRecordBtn').style.display=''; }
        else { recInd.style.display='none'; document.getElementById('startRecordBtn').style.display='none'; document.getElementById('pauseRecordBtn').style.display='none'; document.getElementById('resumeRecordBtn').style.display=''; document.getElementById('stopRecordBtn').style.display=''; }
      }
      function formatTime(s){ const m=Math.floor(s/60); return `${m.toString().padStart(2,'0')}:${Math.floor(s%60).toString().padStart(2,'0')}`; }
      function updateTimer(){
        if(!mediaRecorder||mediaRecorder.state==='inactive'||paused) return;
        const elapsed=(Date.now()-startTime-pauseDur)/1000; timerEl.textContent=formatTime(elapsed);
        const total=chunks.reduce((s,c)=>s+c.size,0); sizeEl.textContent=(total/(1024*1024)).toFixed(2)+' MB'; fpsEl.textContent='FPS: ~30';
      }
      document.getElementById('startRecordBtn').addEventListener('click',()=>{
        if(!stream) return; chunks=[]; pauseDur=0; paused=false;
        mediaRecorder=new MediaRecorder(stream,{mimeType:'video/webm;codecs=vp9', videoBitsPerSecond:5000000});
        mediaRecorder.ondataavailable=e=>{ if(e.data.size) chunks.push(e.data); };
        mediaRecorder.onstop=()=>{ blob=new Blob(chunks,{type:'video/webm'}); updateRecUI(); clearInterval(window.recInt); };
        mediaRecorder.start(1000); startTime=Date.now(); window.recInt=setInterval(updateTimer,200); updateRecUI(); showToast('Bắt đầu quay');
      });
      document.getElementById('pauseRecordBtn').addEventListener('click',()=>{ if(mediaRecorder&&!paused){ mediaRecorder.pause(); paused=true; pauseStart=Date.now(); updateRecUI(); } });
      document.getElementById('resumeRecordBtn').addEventListener('click',()=>{ if(mediaRecorder&&paused){ mediaRecorder.resume(); pauseDur+=Date.now()-pauseStart; paused=false; updateRecUI(); } });
      document.getElementById('stopRecordBtn').addEventListener('click',()=>{ if(mediaRecorder) mediaRecorder.stop(); });
      document.getElementById('downloadBtn').addEventListener('click',()=>{ if(!blob) return; const u=URL.createObjectURL(blob); const a=document.createElement('a'); a.href=u; a.download=`prorec_${new Date().toISOString().replace(/[:.]/g,'-')}.webm`; a.click(); URL.revokeObjectURL(u); });
      document.getElementById('deleteVideoBtn').addEventListener('click',()=>{ blob=null; chunks=[]; showToast('Đã xoá video'); });
      document.getElementById('playPreviewBtn').addEventListener('click',()=>{ if(!blob) return; const v=document.getElementById('previewVideo'); v.src=URL.createObjectURL(blob); document.getElementById('playerModal').style.display='flex'; });
      document.getElementById('closePlayerBtn').addEventListener('click',()=>{ document.getElementById('playerModal').style.display='none'; document.getElementById('previewVideo').pause(); });
      document.getElementById('fullscreenVideoBtn').addEventListener('click',()=>{ document.getElementById('previewVideo').requestFullscreen(); });
      // Export button
      document.getElementById('exportBtnUI').addEventListener('click',()=>{
        if(!blob){ showToast('Chưa có video'); return; }
        document.getElementById('exportModal').style.display='flex';
        let prog=0; const fill=document.getElementById('exportProgressFill'), status=document.getElementById('exportStatus');
        const int=setInterval(()=>{ prog+=Math.random()*25; if(prog>=100){ prog=100; clearInterval(int); fill.style.width='100%'; status.textContent='Hoàn tất!'; setTimeout(()=>{ document.getElementById('exportModal').style.display='none'; const u=URL.createObjectURL(blob); const a=document.createElement('a'); a.href=u; a.download=`prorec_${Date.now()}.webm`; a.click(); URL.revokeObjectURL(u); },500); } else { fill.style.width=prog+'%'; status.textContent=Math.floor(prog)+'%'; } },200);
      });

      // Sidebar toggle mobile
      document.getElementById('sidebarToggleBtn').addEventListener('click',()=>{ document.getElementById('sidebar').classList.toggle('open'); });
      document.getElementById('mobileSidebarToggle').addEventListener('click',()=>{ document.getElementById('sidebar').classList.add('open'); });
      document.getElementById('closeSidebarBtn').addEventListener('click',()=>{ document.getElementById('sidebar').classList.remove('open'); });

      // Init
      updatePreviewSize(); startCam().then(()=>{ setTimeout(()=>{ document.getElementById('loadingScreen').style.opacity='0'; setTimeout(()=>document.getElementById('loadingScreen').remove(),400); },600); });
      window.addEventListener('resize', updatePreviewSize);
    })();
  </script>
</body>
</html>
